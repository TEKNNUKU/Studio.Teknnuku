<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEKNNUKU OS — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--surface:#0f0f1a;--card:#131320;--raised:#1a1a2e;
  --border:rgba(200,155,20,.12);--borderB:rgba(200,155,20,.22);
  --gold:#C89B14;--goldL:#daa820;--cyan:#00BCD4;--white:#F2EDE4;
  --dim:rgba(242,237,228,.55);--dimmer:rgba(242,237,228,.28);
  --red:#ef4444;--green:#22c55e;--purple:#a855f7;--blue:#3b82f6;
  --orange:#f97316;--amber:#f59e0b;
  --sidebar-w:220px;--topbar-h:54px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
@media(max-width:900px){html,body{overflow:auto;}#app{height:auto;min-height:100dvh;overflow:visible;}.main-area{overflow:visible;}.content-area{overflow:visible;height:auto;padding-bottom:90px;}.tab-bar{max-width:calc(100vw - 32px);}}
body{font-family:var(--sans);background:var(--bg);color:var(--white);font-size:14px;line-height:1.5;}
a{text-decoration:none;color:inherit;}button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(200,155,20,.25);border-radius:2px;}
::selection{background:rgba(200,155,20,.25);}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-bg{position:absolute;inset:0;overflow:hidden;}
.login-bg::before{content:'';position:absolute;top:-40%;left:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(200,155,20,.06) 0%,transparent 70%);}
.login-bg::after{content:'';position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,188,212,.05) 0%,transparent 70%);}
.login-card{position:relative;z-index:1;width:380px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--goldL));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:18px;color:#080808;}
.login-logo-text{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);}
.login-logo-text em{color:var(--gold);font-style:normal;}
.login-eyebrow{font-family:var(--mono);font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.login-title{font-family:var(--display);font-weight:800;font-size:1.5rem;color:var(--white);margin-bottom:6px;}
.login-sub{font-size:.8rem;color:var(--dimmer);margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);}
.field input{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.08);border-radius:6px;padding:11px 14px;color:var(--white);font-size:.88rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.btn-login{width:100%;background:var(--gold);color:#080808;border:none;border-radius:6px;padding:13px;font-family:var(--display);font-weight:700;font-size:.88rem;letter-spacing:.04em;text-transform:uppercase;margin-top:8px;transition:background .2s,transform .15s;}
.btn-login:hover{background:var(--goldL);transform:translateY(-1px);}
.login-err{font-family:var(--mono);font-size:.7rem;color:var(--red);text-align:center;margin-top:12px;display:none;}
.login-note{font-size:.72rem;color:var(--dimmer);text-align:center;margin-top:20px;line-height:1.6;}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden;}
#app.visible{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--goldL));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:14px;color:#080808;flex-shrink:0;}
.sb-logo-text{font-family:var(--display);font-weight:700;font-size:.78rem;line-height:1.2;}
.sb-logo-text span{display:block;font-size:.52rem;color:var(--gold);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.nav-section-label{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dimmer);padding:10px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;margin-bottom:2px;color:var(--dim);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;position:relative;}
.nav-item:hover{background:rgba(200,155,20,.06);color:var(--white);}
.nav-item.active{background:rgba(200,155,20,.12);color:var(--gold);border:1px solid rgba(200,155,20,.18);}
.nav-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--gold);color:#080808;font-family:var(--mono);font-size:.5rem;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:11px;color:#080808;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.75rem;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-family:var(--mono);font-size:.52rem;color:var(--gold);letter-spacing:.08em;}
.btn-logout{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:5px;padding:7px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;}
.btn-logout:hover{background:rgba(239,68,68,.15);}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:var(--topbar-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;}
.topbar-title{font-family:var(--display);font-weight:700;font-size:1rem;color:var(--white);flex:1;}
.topbar-title span{color:var(--gold);}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:6px;padding:7px 12px;width:220px;transition:border-color .2s;}
.search-box:focus-within{border-color:rgba(200,155,20,.4);}
.search-box input{background:none;border:none;outline:none;color:var(--white);font-size:.82rem;width:100%;}
.search-box input::placeholder{color:var(--dimmer);}
.topbar-btn{background:rgba(200,155,20,.08);border:1px solid rgba(200,155,20,.18);color:var(--gold);border-radius:6px;padding:7px 14px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;gap:6px;}
.topbar-btn:hover{background:rgba(200,155,20,.16);}
.last-refresh{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);}
.content-area{flex:1;overflow-y:auto;padding:20px 24px;}
.panel{display:none;animation:panelIn .25s ease both;overflow-x:hidden;}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* COMPONENTS */
.panel-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.panel-title{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--white);}
.panel-sub{font-size:.78rem;color:var(--dimmer);margin-left:auto;font-family:var(--mono);}
.eyebrow{font-family:var(--mono);font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--gold);display:inline-block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi-card:hover{border-color:var(--borderB);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}
.kpi-card.cyan::before{background:linear-gradient(90deg,var(--cyan),transparent);}
.kpi-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}
.kpi-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent);}
.kpi-card.red::before{background:linear-gradient(90deg,var(--red),transparent);}
.kpi-card.orange::before{background:linear-gradient(90deg,var(--orange),transparent);}
.kpi-card.amber::before{background:linear-gradient(90deg,var(--amber),transparent);}
.kpi-label{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:10px;}
.kpi-value{font-family:var(--display);font-weight:800;font-size:2rem;color:var(--white);line-height:1;margin-bottom:4px;}
.kpi-meta{font-size:.72rem;color:var(--dimmer);}
.kpi-icon{position:absolute;top:16px;right:16px;font-size:1.4rem;opacity:.4;}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.table-toolbar-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);flex:1;}
.tbl-search{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:5px;padding:6px 10px;color:var(--white);font-size:.8rem;outline:none;width:180px;transition:border-color .2s;}
.tbl-search:focus{border-color:rgba(200,155,20,.4);}
.tbl-filter{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:5px;padding:6px 10px;color:var(--white);font-size:.78rem;outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(200,155,20,.04);}
th{font-family:var(--mono);font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 16px;border-bottom:1px solid rgba(200,155,20,.05);font-size:.82rem;vertical-align:middle;}
tbody tr:hover{background:rgba(200,155,20,.03);}
tbody tr:last-child td{border-bottom:none;}
.empty-state{text-align:center;padding:48px 20px;font-family:var(--mono);font-size:.7rem;color:var(--dimmer);letter-spacing:.1em;}
.empty-state .empty-icon{font-size:2rem;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.badge-gold{background:rgba(200,155,20,.15);color:var(--gold);}
.badge-cyan{background:rgba(0,188,212,.12);color:var(--cyan);}
.badge-green{background:rgba(34,197,94,.12);color:var(--green);}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);}
.badge-purple{background:rgba(168,85,247,.12);color:var(--purple);}
.badge-dim{background:rgba(242,237,228,.06);color:var(--dimmer);}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.badge-orange{background:rgba(249,115,22,.12);color:var(--orange);}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber);}
.row-actions{display:flex;align-items:center;gap:6px;}
.action-btn{background:none;border:1px solid rgba(242,237,228,.08);color:var(--dimmer);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.action-btn:hover{border-color:var(--gold);color:var(--gold);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}
.action-btn.success:hover{border-color:var(--green);color:var(--green);}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-family:var(--mono);font-weight:700;font-size:.72rem;position:relative;}
.score-ring.tier-a{background:rgba(34,197,94,.15);color:var(--green);border:1.5px solid var(--green);}
.score-ring.tier-b{background:rgba(200,155,20,.15);color:var(--gold);border:1.5px solid var(--gold);}
.score-ring.tier-c{background:rgba(59,130,246,.15);color:var(--blue);border:1.5px solid var(--blue);}

/* DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-640px;bottom:0;width:620px;max-width:95vw;background:var(--card);border-left:1px solid var(--border);z-index:801;overflow-y:auto;transition:right .3s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;}
@media(max-width:900px){.drawer{bottom:76px;}}
.drawer.open{right:0;}
.drawer-topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);}
.drawer-close{background:none;border:1px solid rgba(242,237,228,.08);color:var(--dimmer);border-radius:4px;padding:5px 12px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.drawer-close:hover{border-color:var(--red);color:var(--red);}
.drawer-body{padding:20px;flex:1;padding-bottom:32px;}
.detail-section{margin-bottom:24px;}
.detail-section h4{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-item{display:flex;flex-direction:column;gap:3px;}
.detail-label{font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);}
.detail-val{font-size:.82rem;color:var(--white);word-break:break-all;}
.detail-val.gold{color:var(--gold);font-family:var(--mono);}
.detail-val.mono{font-family:var(--mono);}
.drawer-form{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-label{font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.08);border-radius:5px;padding:10px 12px;color:var(--white);font-size:.82rem;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6;}
.form-select option{background:#1a1a2e;}
.btn-primary{background:var(--gold);color:#080808;border:none;border-radius:6px;padding:11px 20px;font-family:var(--display);font-weight:700;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;transition:background .2s,transform .15s;cursor:pointer;}
.btn-primary:hover{background:var(--goldL);transform:translateY(-1px);}
.btn-secondary{background:rgba(242,237,228,.05);color:var(--dim);border:1px solid rgba(242,237,228,.1);border-radius:6px;padding:10px 18px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);}
.btn-success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:10px 18px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.btn-success:hover{background:rgba(34,197,94,.2);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;padding-bottom:8px;}

/* PHASE TRACKER */
.phase-tracker{display:flex;flex-direction:column;gap:0;margin-bottom:20px;}
.phase-item{display:flex;gap:12px;position:relative;padding-bottom:0;}
.phase-item::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:1px;background:var(--border);}
.phase-item:last-child::before{display:none;}
.phase-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--border);background:var(--bg);position:relative;z-index:1;margin-top:2px;}
.phase-dot.done{background:rgba(34,197,94,.2);border-color:var(--green);}
.phase-dot.active{background:rgba(200,155,20,.2);border-color:var(--gold);}
.phase-dot.locked{opacity:.4;}
.phase-body{flex:1;padding-bottom:20px;}
.phase-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);}
.phase-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);margin-bottom:3px;}
.phase-pay{font-family:var(--mono);font-size:.68rem;color:var(--gold);margin-bottom:4px;}
.phase-date{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);}
.phase-note{font-size:.78rem;color:var(--dim);line-height:1.5;margin-top:4px;background:rgba(255,255,255,.03);border-radius:4px;padding:6px 10px;}
.phase-action-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* TEAM MEMBER CARD */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.team-card:hover{border-color:var(--borderB);}
.team-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#080808;flex-shrink:0;}
.team-info{flex:1;}
.team-name{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);}
.team-role-label{font-family:var(--mono);font-size:.6rem;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;}
.team-email{font-family:var(--mono);font-size:.62rem;color:var(--dimmer);}
.team-meta{text-align:right;font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}

/* VACANCY CARD */
.vacancy-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.vacancy-card:hover{border-color:var(--borderB);}
.vacancy-team-label{font-family:var(--mono);font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:2px;}
.vacancy-title{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);}
.vacancy-type{font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}
.vacancy-status-select{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.1);border-radius:5px;padding:5px 10px;color:var(--white);font-size:.72rem;outline:none;cursor:pointer;font-family:var(--mono);}

/* TABS */
.tab-bar{display:flex;gap:2px;margin-bottom:18px;background:var(--surface);border-radius:7px;padding:3px;border:1px solid var(--border);align-self:flex-start;flex-wrap:nowrap;overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FC = { apiKey:"AIzaSyAjovgyVtPJOWwyte8gwdesEHesF9AzJlM", authDomain:"teknnuku-intake-form.firebaseapp.com", projectId:"teknnuku-intake-form", storageBucket:"teknnuku-intake-form.firebasestorage.app", messagingSenderId:"661289555481", appId:"1:661289555481:web:f15b1f8983d5d460df3c88" };
const app = initializeApp(FC);
const auth = getAuth(app);
const db = getFirestore(app);

function tsVal(d) {
  var v = d.completedAt||d.submittedAt||d.sentAt||d.paidAt||d.assignedAt||d.createdAt||d.updatedAt||d.startedAt;
  if (!v) return 0;
  if (v.seconds) return v.seconds*1000;
  return new Date(v).getTime()||0;
}
async function getCol(name) {
  try {
    const snap = await getDocs(collection(db, name));
    const docs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    docs.sort((a,b) => tsVal(b)-tsVal(a));
    return docs;
  } catch(e) { console.error('❌',name,e.message); return []; }
}

window._signIn = (e,p) => signInWithEmailAndPassword(auth,e,p);
window._signOut = () => signOut(auth);
window._saveDoc = async (col, data) => { data.createdAt=serverTimestamp(); const r=await addDoc(collection(db,col),data); return r.id; };
window._setDoc = async (col, id, data) => { data.updatedAt=serverTimestamp(); await setDoc(doc(db,col,id),data); };
window._updateDoc = async (col, id, data) => { data.updatedAt=serverTimestamp(); await updateDoc(doc(db,col,id),data); };
window._deleteDoc = async (col, id) => { await deleteDoc(doc(db,col,id)); };

window._loadAll = async function() {
  const [leads,inquiries,messages,proposals,payments,assignments,applicants,team_members,careers_config,
         ventures,tasks,crm_leads,clients,financials,daily_reports,weekly_reports] = await Promise.all([
    getCol('intake_leads'), getCol('service_inquiries'), getCol('contact_messages'),
    getCol('proposals'), getCol('payments'), getCol('assignments'),
    getCol('applicants'), getCol('team_members'), getCol('careers_config'),
    getCol('ventures'), getCol('tasks'), getCol('crm_leads'),
    getCol('clients'), getCol('financials'), getCol('daily_reports'), getCol('weekly_reports')
  ]);
  window._data = { leads,inquiries,messages,proposals,payments,assignments,applicants,team_members,careers_config,
                   ventures,tasks,crm_leads,clients,financials,daily_reports,weekly_reports };
  document.getElementById('last-refresh').textContent = 'Updated '+new Date().toLocaleTimeString();
  window._renderAll();
};

function applyAuthState(user) {
  if (user) {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    window._currentUser = user;
    var nameEl=document.getElementById('user-name');
    var avatarEl=document.getElementById('user-avatar');
    if (nameEl) nameEl.textContent = user.email.split('@')[0];
    if (avatarEl) avatarEl.textContent = user.email[0].toUpperCase();
    window._loadAll().then(() => {
      window._initRBAC(user.email);
    });
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').classList.remove('visible');
    window._currentUser=null;
    window._userRole=null;
  }
}

onAuthStateChanged(auth, user => {
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>applyAuthState(user));
  else applyAuthState(user);
});
</script>

window._userRole = null;
window._userPermissions = [];

window._initRBAC = function(email) {
  var d = window._data;
  var tm = (d.team_members||[]).find(function(m){ return (m.email||'').toLowerCase() === email.toLowerCase(); });
  if (email.toLowerCase() === FOUNDER_EMAIL.toLowerCase()) {
    window._userRole = 'founder';
  } else if (tm && tm.role) {
    window._userRole = tm.role;
  } else {
    window._userRole = 'guest';
  }
  window._userPermissions = ROLE_PERMISSIONS[window._userRole] || ['overview'];
  // Notify role-resolved callbacks (for switcher visibility etc.)
  (window._onRoleResolved_callbacks||[]).forEach(function(cb){ try{cb(window._userRole);}catch(e){} });
  document.getElementById('user-role-label').textContent = window._userRole === 'founder' ? 'Founder & CEO' : (ROLE_LABELS[window._userRole] || window._userRole);
  _buildNav();
  _buildPanels();
  _buildBottomNav();
  window._renderAll();
  showPanel('overview', document.querySelector('.nav-item[data-panel="overview"]'));
};

function canAccess(panelId) {
  return window._userPermissions && window._userPermissions.indexOf(panelId) !== -1;
}

function _buildNav() {
  var nav = document.getElementById('sidebar-nav');
  var html = '';
  var lastSection = '';
  NAV_ITEMS.forEach(function(item) {
    if (!canAccess(item.id)) return;
    if (item.section !== lastSection) {
      html += '<div class="nav-section-label">' + item.section + '</div>';
      lastSection = item.section;
    }
    html += '<div class="nav-item" data-panel="' + item.id + '" onclick="showPanel(\'' + item.id + '\',this)">' +
      '<span class="nav-icon">' + item.icon + '</span> ' + item.label +
      (item.badge ? '<span class="nav-badge" id="' + item.badge + '">—</span>' : '') +
    '</div>';
  });
  nav.innerHTML = html;
}

function _buildBottomNav() {
  var inner = document.getElementById('bottom-nav-inner');
  var html = '';
  NAV_ITEMS.forEach(function(item) {
    if (!canAccess(item.id)) return;
    html += '<div class="bnav-item" data-panel="' + item.id + '" onclick="showPanelMob(\'' + item.id + '\',this)">' +
      '<span class="bnav-icon">' + item.icon + '</span>' + item.label.split(' ')[0] +
    '</div>';
  });
  inner.innerHTML = html;
}

function _buildPanels() {
  var ca = document.getElementById('content-area');
  ca.innerHTML = '';
  if (canAccess('overview'))    ca.innerHTML += _panelOverview();
  if (canAccess('leads'))       ca.innerHTML += _panelLeads();
  if (canAccess('inquiries'))   ca.innerHTML += _panelInquiries();
  if (canAccess('messages'))    ca.innerHTML += _panelMessages();

function _panelSOPs() {
  var SOPS = [
    {title:'🔁 Inbound System — Daily Flow',body:'Morning (8am–10am): Check new leads → Assign to closers → Follow up old leads\n\nMidday: Calls + WhatsApp conversions → Demo presentations → Send proposals\n\nEvening: Follow-ups → Close deals → Push urgency\n\nDaily Metrics: Leads received, Leads contacted, Calls booked, Deals closed'},
    {title:'🚀 Outbound System — Daily Flow',body:'Daily Targets per agent: 50–100 outreaches/day, 10–20 replies, 5–10 calls booked\n\nChannels: WhatsApp, Instagram DMs, LinkedIn, Phone calls\n\nScript Flow:\n1. Hook: "Are you managing guards manually or digitally?"\n2. Problem: "Most companies lose ₦500k+ monthly from attendance fraud"\n3. Offer: "We help you track guards and eliminate payroll leakage"\n4. CTA: "Can I show you in 10 minutes?"'},
    {title:'🎯 Lead Management SOP',body:'Lead Capture: All leads enter CRM via Forms, WhatsApp, DMs\n\nRouting Rules:\n• Segment A (Beginners) → Masterclass / Starter Package\n• Segment B (Business Owners) → Studio Packages\n• Segment C (Corporate/Security) → TEK1SECURITY\n\nAssignment: Sales Manager assigns immediately. No lead unassigned for more than 10 minutes.'},
    {title:'💰 Inbound Sales SOP',body:'Response: Within 5 minutes\n\nQualification Questions: What do you do? Do you get customers online? Do you accept payments? What is your goal?\n\nSales Flow: Identify problem → Explain solution → Recommend package → Handle objections → Close\n\nFollow-Up: Every 24 hours, minimum 5 follow-ups per lead'},
    {title:'🏆 Deal Closing — Authority System',body:'Tier 1 — ₦0 to ₦250k: Closers can close freely. No approval needed.\n\nTier 2 — ₦250k to ₦1M: Sales Manager must approve.\n\nTier 3 — ₦1M+: Handled by Sales Manager + Ops Lead.\n\nOFFSHORE HACK: Pre-record a Founder Pitch Video + TEK1SECURITY Authority Presentation. Closers use this during demos. Replaces your physical presence.'},
    {title:'⚙️ Delivery & Onboarding SOP',body:'Project Handoff (Sales → Onboarding Specialist):\nRequired info: Client details, Package purchased, Requirements\n\nTimelines:\n• Starter: 2–3 days\n• Growth: 5–7 days\n• Scale: 10–14 days\n\nOnboarding Steps:\n1. Welcome message\n2. Collect client assets\n3. Setup system\n4. Training session\n5. Go live'},
    {title:'🤝 Customer Success SOP',body:'Weekly Check-ins: Contact all active clients\n\nUpsell Process: Identify growth needs → Recommend upgrades\n\nRetention: Resolve issues quickly → Maintain relationship\n\nValue Ladder: Studio → GATA ecosystem → Enterprise tier'},
    {title:'💼 Finance SOP',body:'Payment Tracking: Log all payments, confirm transactions\n\nInvoicing: Send invoice immediately after deal\n\nReporting:\n• Daily: Revenue summary\n• Monthly: Revenue per venture\n\nNon-negotiables: No payment untracked. No lead ignored. No task undocumented.'},
    {title:'📋 Reporting — System Rules',body:'Daily Reports due by: 7:00 PM\nDaily Standup: 9:00 AM led by Operations Lead\n\nEvery report must include:\n• Leads generated / contacted\n• Deals closed + revenue\n• Tasks completed\n• Blockers\n\nNon-Negotiable Rules:\n✅ No lead is ignored\n✅ No payment is untracked\n✅ No task is undocumented\n✅ No role operates without KPIs'},
    {title:'📈 Performance Management',body:'Weekly Review:\n• Sales performance\n• Lead generation output\n• Delivery efficiency\n\nUnderperformance Action:\n1. Warning\n2. Retraining\n3. Replacement\n\nPerformance Score Formula:\n(Tasks Completed ÷ Tasks Assigned) × 100\n\n🟢 80–100%: Excellent\n🟡 50–79%: Needs Attention\n🔴 Below 50%: Action Required'},
    {title:'🔁 CRM Pipeline Stages',body:'1. New Lead — Just entered system\n2. Contacted — First touch made\n3. Qualified — Confirmed fit\n4. Proposal — Quote/package sent\n5. Won — Deal closed, payment received\n6. Lost — Not closing, reason logged\n\nRules:\n• No lead unassigned for more than 10 minutes\n• Minimum 5 follow-ups before marking Lost\n• Lost deals must have a reason logged'},
    {title:'🌍 New Venture Onboarding',body:'When launching a new venture — do NOT hire a new team.\n\nSteps:\n1. Plug into Lead Gen → Create content angle\n2. Train Sales Team → Add script for new segment\n3. Plug into Delivery → Assign execution owner\n4. Add to Finance tracking\n5. Add to CRM routing rules'}
  ];
  return '<div class="panel" id="panel-sops">' +
    '<div class="eyebrow">Procedures & Reference</div>' +
    '<div class="panel-header"><div class="panel-title">SOPs</div></div>' +
    '<div style="font-size:.8rem;color:var(--dimmer);margin-bottom:18px;padding:12px 16px;background:var(--raised);border:1px solid var(--border);border-radius:8px;">Click any SOP to expand. These are the operating procedures for TEKNNUKU and all ventures.</div>' +
    SOPS.map(function(s,i){
      return '<div class="sop-card" onclick="this.querySelector(\'.sop-body\').classList.toggle(\'open\');this.querySelector(\'.sop-arrow\').textContent=this.querySelector(\'.sop-body\').classList.contains(\'open\')?\'▲\':\'▼\'">' +

        '<div style="padding:16px;font-family:var(--mono);font-size:.72rem;color:var(--dim);line-height:2;">' +
          ['intake_leads','service_inquiries','contact_messages','proposals','payments','assignments','applicants','team_members','careers_config','ventures','tasks','crm_leads','clients','financials','daily_reports','weekly_reports'].map(function(c){
            return '<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:5px 0;"><span style="color:var(--cyan);">'+c+'</span><span id="col-count-'+c+'">—</span></div>';
          }).join('') +
        '</div>' +
      '</div>' +
    '</div></div>';
}
</script>

<script>
// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(window._tt);window._tt=setTimeout(function(){t.className='';},3200);}
function fmtDate(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}
function fmtTime(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function timeAgo(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);var diff=Date.now()-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return Math.floor(diff/86400000)+'d ago';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tierBadge(tier){if(!tier)return'<span class="badge badge-dim">—</span>';if(tier.includes('A'))return'<span class="badge badge-green">Tier A</span>';if(tier.includes('B'))return'<span class="badge badge-gold">Tier B</span>';return'<span class="badge badge-blue">Tier C</span>';}
function scoreBadge(score){var s=parseInt(score)||0;var cls=s>=70?'tier-a':s>=40?'tier-b':'tier-c';return'<div class="score-ring '+cls+'">'+s+'</div>';}
function statusBadge(status){var map={paid:'badge-green',pending:'badge-gold',partial:'badge-orange',overdue:'badge-red',draft:'badge-dim',sent:'badge-cyan',accepted:'badge-green',declined:'badge-red',active:'badge-cyan',completed:'badge-green',cancelled:'badge-red','in-progress':'badge-purple','on-hold':'badge-orange',interview:'badge-cyan',hired:'badge-green',rejected:'badge-red',phase1:'badge-amber',phase2:'badge-blue',phase3:'badge-green',employed:'badge-green',open:'badge-green',filled:'badge-red',closed:'badge-dim'};var cls=map[status]||'badge-dim';return'<span class="badge '+cls+'">'+escHtml(status||'—')+'</span>';}
function serviceLabel(svc){var map={brand_launch:'01 · Brand Launch',sales_system:'02 · Sales System',systemization:'03 · Systemization',platform_dev:'04 · Platform Dev',web3_dev:'05 · Web3 Dev',gata_onboard:'06 · GATA',venture_build:'07 · Venture Build',enterprise_sw:'08 · Enterprise SW'};return map[svc]||svc||'—';}
function initials(name){if(!name)return'?';var p=name.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function phaseBadge(a){
  var s=a.status||'pending';
  if(s==='phase1')return'<span class="badge badge-amber">Phase 1</span>';
  if(s==='phase2')return'<span class="badge badge-blue">Phase 2</span>';
  if(s==='phase3')return'<span class="badge badge-green">Phase 3</span>';
  if(s==='hired'||s==='employed')return'<span class="badge badge-green">Confirmed</span>';
  if(s==='interview')return'<span class="badge badge-cyan">Interview</span>';
  if(s==='rejected')return'<span class="badge badge-red">Rejected</span>';
  return'<span class="badge badge-dim">Pending</span>';
}

// ═══════════════════════════════════════
// NAV & PANEL ROUTING
// ═══════════════════════════════════════
function toggleSidebar(){var sb=document.getElementById('main-sidebar');var ov=document.getElementById('mob-overlay');sb.classList.toggle('open');ov.classList.toggle('open');}
function closeSidebar(){document.getElementById('main-sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('open');}
function showPanelMob(name,el){showPanel(name,document.querySelector('.nav-item[data-panel="'+name+'"]'));document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.remove('active');});if(el)el.classList.add('active');}

var PANEL_TITLES={overview:'Overview → Dashboard',leads:'Intake Leads → Diagnostic Results',inquiries:'Inquiries → Service Forms',messages:'Messages → Contact Inbox',applicants:'Applicants → Careers Portal',crm:'CRM Pipeline → Lead Kanban',people:'People → Unified Profiles',proposals:'Proposals → Quotes & Offers',payments:'Payments → Revenue Tracking',assignments:'Assignments → Routing',ventures:'Ventures → Portfolio',tasks:'Task Board → Kanban',clients:'Clients → Onboarding',finance:'Finance → P&L Intelligence',team:'Team Members → Active Staff',vacancies:'Vacancies → Role Management',reports:'Daily Reports → Accountability',sops:'SOPs → Procedures & Reference',settings:'Settings → Configuration'};

function showPanel(name,el){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var panel=document.getElementById('panel-'+name);
  if(panel)panel.classList.add('active');
  if(el)el.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.toggle('active',b.dataset.panel===name);});
  var title=PANEL_TITLES[name]||name;var parts=title.split(' → ');
  document.getElementById('panel-title').innerHTML=escHtml(parts[0])+(parts[1]?' <span>→ '+escHtml(parts[1])+'</span>':'');
  closeSidebar();
}

// ═══════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════
function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var pass=document.getElementById('login-pass').value;
  var err=document.getElementById('login-err');
  var btn=document.getElementById('login-btn');
  err.style.display='none';btn.textContent='Authenticating…';btn.disabled=true;
  window._signIn(email,pass).then(function(){btn.textContent='Access Dashboard →';btn.disabled=false;}).catch(function(){err.textContent='Access denied. Check your credentials.';err.style.display='block';btn.textContent='Access Dashboard →';btn.disabled=false;});
}
function doLogout(){window._signOut().then(function(){toast('Signed out successfully');});}
function refreshAll(){if(!window._loadAll){toast('Still initialising','error');return;}toast('Refreshing data…');window._loadAll().then(function(){toast('Data refreshed ✓','success');}).catch(function(){toast('Refresh failed','error');});}

// ═══════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════
window._renderAll = function(){
  var d=window._data;if(!d)return;
  // Settings collection counts
  ['intake_leads','service_inquiries','contact_messages','proposals','payments','assignments','applicants','team_members','careers_config','ventures','tasks','crm_leads','clients','financials','daily_reports','weekly_reports'].forEach(function(c){var el=document.getElementById('col-count-'+c);if(el)el.textContent=(d[c.replace(/-/g,'_')]||[]).length;});
  // Overview
  var ovLeads=document.getElementById('kpi-leads');if(ovLeads)ovLeads.textContent=d.leads.length;
  var ovInq=document.getElementById('kpi-inquiries');if(ovInq)ovInq.textContent=d.inquiries.length;
  var ovMsg=document.getElementById('kpi-messages');if(ovMsg)ovMsg.textContent=d.messages.length;
  var ovProp=document.getElementById('kpi-proposals');if(ovProp)ovProp.textContent=d.proposals.length;
  var ovPay=document.getElementById('kpi-payments');if(ovPay)ovPay.textContent=d.payments.length;
  var ovTA=document.getElementById('kpi-tiera');if(ovTA)ovTA.textContent=d.leads.filter(function(l){return(parseInt(l.score)||0)>=70;}).length;
  var ovApp=document.getElementById('kpi-applicants');if(ovApp)ovApp.textContent=(d.applicants||[]).length;
  var ovTeam=document.getElementById('kpi-team');if(ovTeam)ovTeam.textContent=(d.team_members||[]).length;
  var upd=document.getElementById('overview-updated');if(upd)upd.textContent='As of '+new Date().toLocaleTimeString();
  // Badges
  var nbL=document.getElementById('nb-leads');if(nbL)nbL.textContent=d.leads.length;
  var nbI=document.getElementById('nb-inquiries');if(nbI)nbI.textContent=d.inquiries.length;
  var nbM=document.getElementById('nb-messages');if(nbM)nbM.textContent=d.messages.length;
  var nbA=document.getElementById('nb-applicants');if(nbA)nbA.textContent=(d.applicants||[]).length;

  renderActivity(d);
  renderTierBreakdown(d.leads);
  if(canAccess('leads'))renderLeads(d.leads);
  if(canAccess('inquiries'))renderInquiries(d.inquiries);
  if(canAccess('messages'))renderMessages(d.messages);
  if(canAccess('applicants'))renderApplicants(d.applicants||[]);
  if(canAccess('people'))renderPeople(d);
  if(canAccess('proposals'))renderProposals(d.proposals);
  if(canAccess('payments'))renderPayments(d.payments);
  if(canAccess('assignments'))renderAssignments(d.assignments);
  if(canAccess('team'))renderTeam(d.team_members||[]);
  if(canAccess('vacancies'))renderVacancies(d.careers_config||[],d.applicants||[],d.team_members||[]);
  // OS panels
  var ovCRM=document.getElementById('kpi-crm');if(ovCRM)ovCRM.textContent=(d.crm_leads||[]).length;
  var ovVen=document.getElementById('kpi-ventures');if(ovVen)ovVen.textContent=(d.ventures||[]).length+VENTURES_SEED.length;
  var ovTsk=document.getElementById('kpi-tasks');if(ovTsk)ovTsk.textContent=(d.tasks||[]).filter(function(t){return t.status!=='done';}).length;
  var ovCl=document.getElementById('kpi-clients');if(ovCl)ovCl.textContent=(d.clients||[]).filter(function(c){return c.status!=='churned';}).length;
  var nbCRM=document.getElementById('nb-crm');if(nbCRM)nbCRM.textContent=(d.crm_leads||[]).filter(function(l){return l.status==='new_lead';}).length;
  var nbTsk=document.getElementById('nb-tasks');if(nbTsk)nbTsk.textContent=(d.tasks||[]).filter(function(t){return t.status!=='done'&&t.deadline&&new Date(t.deadline)<new Date();}).length;
  if(canAccess('crm'))renderCRM(d.crm_leads||[]);
  if(canAccess('ventures'))renderVentures(d.ventures||[],d.tasks||[],d.crm_leads||[],d.clients||[],d.financials||[]);
  if(canAccess('tasks'))renderTasks(d.tasks||[],d.team_members||[]);
  if(canAccess('clients'))renderClients(d.clients||[],d.team_members||[]);
  if(canAccess('finance'))renderFinance(d.financials||[],d.clients||[]);
  if(canAccess('reports'))renderReports(d.daily_reports||[]);
};

function renderActivity(d){
  var feed=document.getElementById('activity-feed');if(!feed)return;
  var items=[];
  d.leads.forEach(function(l){items.push({icon:'📥',bg:'rgba(200,155,20,.1)',title:(l.firstName||'?')+' '+(l.lastName||'')+' completed diagnostic',meta:'Tier '+(l.tier||'?')+' · Score '+(l.score||0),time:l.completedAt||l.createdAt,onClick:function(){openLeadDrawer(l);}});});
  d.inquiries.forEach(function(i){items.push({icon:'📋',bg:'rgba(0,188,212,.1)',title:(i.name||'?')+' — '+serviceLabel(i.service),meta:i.email||'',time:i.submittedAt||i.createdAt,onClick:function(){openInquiryDrawer(i);}});});
  d.messages.forEach(function(m){items.push({icon:'💬',bg:'rgba(168,85,247,.1)',title:(m.name||'?')+' sent a message',meta:m.subject||'General',time:m.sentAt||m.createdAt,onClick:function(){openMessageDrawer(m);}});});
  (d.applicants||[]).forEach(function(a){var info=a.personalInfo||{};items.push({icon:'🎯',bg:'rgba(249,115,22,.1)',title:(info.name||a.name||'?')+' applied for '+(ROLE_LABELS[a.positionApplied]||a.positionTitle||'—'),meta:'Score: '+(a.score||0)+' · Status: '+(a.status||'pending'),time:a.submittedAt||a.createdAt,onClick:function(){openApplicantDrawer(a);}});});
  items.sort(function(a,b){var at=a.time&&a.time.seconds?a.time.seconds:(new Date(a.time||0)/1000);var bt=b.time&&b.time.seconds?b.time.seconds:(new Date(b.time||0)/1000);return bt-at;});
  if(!items.length){feed.innerHTML='<div class="empty-state"><div class="empty-icon">⬡</div>No activity yet</div>';return;}
  feed.innerHTML=items.slice(0,14).map(function(item){return'<div class="activity-item"><div class="activity-icon" style="background:'+item.bg+'">'+item.icon+'</div><div class="activity-body"><div class="activity-title">'+escHtml(item.title)+'</div><div class="activity-meta">'+escHtml(item.meta)+'</div></div><div class="activity-time">'+timeAgo(item.time)+'</div></div>';}).join('');
  feed.querySelectorAll('.activity-item').forEach(function(el,i){if(items[i])el.onclick=items[i].onClick;});
}

function renderTierBreakdown(leads){
  var el=document.getElementById('tier-breakdown');if(!el)return;
  var tiers={A:0,B:0,C:0};leads.forEach(function(l){var s=parseInt(l.score)||0;if(s>=70)tiers.A++;else if(s>=40)tiers.B++;else tiers.C++;});
  var total=leads.length||1;
  el.innerHTML=['A','B','C'].map(function(t){var count=tiers[t];var pct=Math.round(count/total*100);var color=t==='A'?'var(--green)':t==='B'?'var(--gold)':'var(--blue)';return'<div style="margin-bottom:18px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-family:var(--mono);font-size:.7rem;color:'+color+';">Tier '+t+'</span><span style="font-family:var(--mono);font-size:.7rem;color:var(--dimmer);">'+count+' ('+pct+'%)</span></div><div style="background:rgba(255,255,255,.05);border-radius:3px;height:8px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:3px;transition:width .6s ease;"></div></div></div>';}).join('');
}

// ═══════════════════════════════════════
// LEADS
// ═══════════════════════════════════════
function renderLeads(leads){
  var tbody=document.getElementById('leads-tbody');if(!tbody)return;
  if(!leads||!leads.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📥</div>No leads yet</div></td></tr>';return;}
  tbody.innerHTML=leads.map(function(l){var name=escHtml((l.firstName||'')+' '+(l.lastName||''));var budget=escHtml((l.responses&&l.responses.q6_budget&&l.responses.q6_budget[0])||'—');var stage=escHtml((l.responses&&l.responses.q2_stage&&l.responses.q2_stage[0])||'—');return'<tr data-search="'+escHtml((name+' '+l.email).toLowerCase())+'" data-tier="'+escHtml(l.tier||'')+'"><td><div style="font-weight:600;">'+name+'</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+escHtml(l.email||'')+'</div></td><td>'+scoreBadge(l.score)+'</td><td>'+tierBadge(l.tier)+'</td><td><span style="font-family:var(--mono);font-size:.68rem;color:var(--dim);">'+budget+'</span></td><td><span style="font-family:var(--mono);font-size:.68rem;color:var(--dim);">'+stage+'</span></td><td><span style="font-family:var(--mono);font-size:.68rem;color:var(--cyan);">'+escHtml(l.primaryRoute||'—')+'</span></td><td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+fmtTime(l.completedAt||l.createdAt)+'</td><td><div class="row-actions"><button class="action-btn" onclick="openLeadDrawer(window._data.leads.find(function(x){return x.id===\''+l.id+'\'}))">View</button><button class="action-btn success" onclick="quickProposal(\''+l.id+'\',\''+escHtml((l.firstName||'')+' '+(l.lastName||''))+'\',\''+escHtml(l.email||'')+'\')">Propose</button></div></td></tr>';}).join('');
}

// ═══════════════════════════════════════
// INQUIRIES
// ═══════════════════════════════════════
function renderInquiries(inquiries){
  var tbody=document.getElementById('inquiries-tbody');if(!tbody)return;
  if(!inquiries||!inquiries.length){tbody.innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📋</div>No inquiries yet</div></td></tr>';return;}
  tbody.innerHTML=inquiries.map(function(i){return'<tr data-search="'+escHtml((i.name+' '+i.email).toLowerCase())+'" data-service="'+escHtml(i.service||'')+'"><td><div style="font-weight:600;">'+escHtml(i.name||'—')+'</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+escHtml(i.email||'')+'</div></td><td><span class="badge badge-cyan">'+escHtml(serviceLabel(i.service))+'</span></td><td>'+escHtml(i.businessName||'—')+'</td><td style="font-family:var(--mono);font-size:.72rem;">'+escHtml(i.phone||'—')+'</td><td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+fmtTime(i.submittedAt||i.createdAt)+'</td><td><div class="row-actions"><button class="action-btn" onclick="openInquiryDrawer(window._data.inquiries.find(function(x){return x.id===\''+i.id+'\'}))">View</button><button class="action-btn success" onclick="quickProposal(\''+i.id+'\',\''+escHtml(i.name||'')+'\',\''+escHtml(i.email||'')+'\')">Propose</button></div></td></tr>';}).join('');
}

// ═══════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════
function renderMessages(messages){
  var tbody=document.getElementById('messages-tbody');if(!tbody)return;
  if(!messages||!messages.length){tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">💬</div>No messages yet</div></td></tr>';return;}
  tbody.innerHTML=messages.map(function(m){var preview=(m.message||'').substring(0,60)+(m.message&&m.message.length>60?'…':'');return'<tr data-search="'+escHtml((m.name+' '+m.email+' '+(m.subject||'')).toLowerCase())+'"><td><div style="font-weight:600;">'+escHtml(m.name||'—')+'</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+escHtml(m.email||'')+'</div></td><td><span class="badge badge-purple">'+escHtml(m.subject||'general')+'</span></td><td style="color:var(--dim);font-size:.78rem;">'+escHtml(preview)+'</td><td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+fmtTime(m.sentAt||m.createdAt)+'</td><td><div class="row-actions"><button class="action-btn" onclick="openMessageDrawer(window._data.messages.find(function(x){return x.id===\''+m.id+'\'}))">Read</button></div></td></tr>';}).join('');
}

// ═══════════════════════════════════════
// APPLICANTS — Enhanced with Phase Tracking
// ═══════════════════════════════════════
function renderApplicants(list){
  var tierA=list.filter(function(a){return(parseInt(a.score)||0)>=70;}).length;
  var interview=list.filter(function(a){return a.status==='interview';}).length;
  var probation=list.filter(function(a){return['phase1','phase2','phase3'].indexOf(a.status)>-1;}).length;
  var hired=list.filter(function(a){return a.status==='hired'||a.status==='employed';}).length;
  var elT=document.getElementById('app-kpi-total');if(elT)elT.textContent=list.length;
  var elA=document.getElementById('app-kpi-tiera');if(elA)elA.textContent=tierA;
  var elI=document.getElementById('app-kpi-interview');if(elI)elI.textContent=interview;
  var elP=document.getElementById('app-kpi-probation');if(elP)elP.textContent=probation;
  var elH=document.getElementById('app-kpi-hired');if(elH)elH.textContent=hired;
  var tbody=document.getElementById('applicants-tbody');if(!tbody)return;
  if(!list.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🎯</div>No applicants yet</div></td></tr>';return;}
  tbody.innerHTML=list.map(function(a){
    var info=a.personalInfo||{};
    var name=escHtml(info.name||a.name||'—');
    var email=escHtml(info.email||a.email||'');
    var role=ROLE_LABELS[a.positionApplied]||escHtml(a.positionTitle||a.positionApplied||'—');
    var team=TEAM_FOR_ROLE[a.positionApplied]||'';
    var exp=a.experienceYears!==undefined?a.experienceYears+'yr':'—';
    var phases=a.phases||[];
    var currentPhaseLabel=phases.length?phases[phases.length-1].phase:'—';
    var searchStr=((info.name||'')+(info.email||'')+(a.positionApplied||'')).toLowerCase();
    return '<tr data-search="'+escHtml(searchStr)+'" data-role="'+escHtml(a.positionApplied||'')+'" data-status="'+escHtml(a.status||'')+'">' +
      '<td><div style="font-weight:600;">'+name+'</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+email+'</div></td>' +
      '<td><div style="font-size:.78rem;font-weight:500;">'+escHtml(role)+'</div><div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">'+escHtml(team)+'</div></td>' +
      '<td>'+scoreBadge(a.score)+'</td>' +

function filterApplicantsByRole(role){document.querySelectorAll('#applicants-tbody tr[data-role]').forEach(function(r){r.style.display=!role||r.dataset.role===role?'':'none';});}
function filterApplicantsByStatus(status){document.querySelectorAll('#applicants-tbody tr[data-status]').forEach(function(r){r.style.display=!status||r.dataset.status===status?'':'none';});}

function updateApplicantStatus(id,status){
  var labels={interview:'Shortlisted for interview',hired:'Marked as hired',rejected:'Application rejected',phase1:'Probation Phase 1 started',phase2:'Advanced to Phase 2',phase3:'Advanced to Phase 3',employed:'Confirmed as employee'};
  window._updateDoc('applicants',id,{status:status}).then(function(){toast(labels[status]||'Status updated','success');window._loadAll();}).catch(function(e){toast('Update failed: '+(e.message||e),'error');});
}

function startProbation(id){
  var a=window._data.applicants.find(function(x){return x.id===id;});if(!a)return;
  var phases=a.phases||[];
  phases.push({phase:'phase1',label:'Phase 1 · Activation',startedAt:new Date().toISOString(),note:'Probation started'});
  window._updateDoc('applicants',id,{status:'phase1',phases:phases}).then(function(){
    toast('Phase 1 started — Activation period begins','success');window._loadAll();
  });
}

function advancePhase(id,currentPhase){
  var a=window._data.applicants.find(function(x){return x.id===id;});if(!a)return;
  var map={phase1:'phase2',phase2:'phase3',phase3:'employed'};
  var labels={phase2:'Phase 2 · Proof period started',phase3:'Phase 3 · Transition period started',employed:'🎉 Employee confirmed!'};
  var next=map[currentPhase];if(!next)return;
  var phases=a.phases||[];
  phases.push({phase:next,label:PROBATION_PHASES.find(function(p){return p.key===next;})?PROBATION_PHASES.find(function(p){return p.key===next;}).label:next,startedAt:new Date().toISOString()});
  window._updateDoc('applicants',id,{status:next,phases:phases}).then(function(){
    toast(labels[next]||'Advanced','success');
    if(next==='employed'){
      var info=a.personalInfo||{};
      promoteToTeamMember(a);
    }
    window._loadAll();
  });
}

function promoteToTeamMember(a){
  var info=a.personalInfo||{};
  var data={
    name:info.name||a.name||'',
    email:info.email||a.email||'',
    phone:info.phone||a.phone||'',
    role:a.positionApplied,
    roleLabel:ROLE_LABELS[a.positionApplied]||a.positionTitle||'',
    team:TEAM_FOR_ROLE[a.positionApplied]||'',
    status:'probation',
    employmentStage:'employed',
    applicantId:a.id,
    portfolioURL:(info.portfolioURL||''),
    cvLink:(info.cvLink||''),
    score:a.score,
    joinedAt:new Date().toISOString()
  };
  window._saveDoc('team_members',data).then(function(){
    toast('✅ Added to Team Members','success');
  }).catch(function(e){toast('Team member add failed: '+(e.message||e),'error');});
}

    '<div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+escHtml(email)+'</div>' +
    '<div style="font-family:var(--mono);font-size:.6rem;color:var(--gold);margin-top:2px;">'+escHtml(role)+' · '+escHtml(team)+'</div>' +
    '<div style="margin-top:6px;">'+phaseBadge(a)+' '+statusBadge(a.status||'pending')+'</div></div></div>' +
    '<div class="detail-grid">' +
      '<div class="detail-item"><div class="detail-label">Phone</div><div class="detail-val mono">'+escHtml(phone)+'</div></div>' +
      '<div class="detail-item"><div class="detail-label">Experience</div><div class="detail-val">'+(a.experienceYears!==undefined?a.experienceYears+' years':'—')+'</div></div>' +
      '<div class="detail-item"><div class="detail-label">Applied</div><div class="detail-val">'+fmtTime(a.submittedAt||a.createdAt)+'</div></div>' +
      '<div class="detail-item"><div class="detail-label">Agreement Signed</div><div class="detail-val">'+(a.agreementSigned?'✅ '+fmtDate(a.agreementSigned):'⏳ Not yet signed')+'</div></div>' +
    '</div>' +
    (a.agreementSignature?'<div style="margin-top:10px;padding:10px 14px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:6px;font-family:var(--mono);font-size:.7rem;color:var(--green);">✍️ Signed as: "'+escHtml(a.agreementSignature)+'"</div>':'') +

      '<div><div style="font-family:var(--display);font-weight:700;font-size:.9rem;">'+(a.scoreTier||'—')+'</div><div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);margin-top:3px;">out of 100</div></div>' +

    '</div>' +

    (a.coverLetter?'<div class="detail-section"><h4>✍️ Cover Letter</h4><div style="padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--dim);line-height:1.7;white-space:pre-wrap;">'+escHtml(a.coverLetter)+'</div></div>':'') +

    '<div class="btn-row">' +
      (a.status==='pending'?'<button class="btn-success" onclick="updateApplicantStatus(&quot;'+a.id+'&quot;,&quot;interview&quot;);closeDrawer();">✓ Shortlist</button>':'') +
      (a.status==='interview'?'<button class="btn-primary" onclick="startProbation(&quot;'+a.id+'&quot;);closeDrawer();">🚀 Start Phase 1</button>':'') +
      (a.status!=='rejected'&&a.status!=='hired'&&a.status!=='employed'?'<button class="btn-secondary" style="border-color:rgba(239,68,68,.3);color:var(--red);" onclick="updateApplicantStatus(&quot;'+a.id+'&quot;,&quot;rejected&quot;);closeDrawer();">✕ Reject</button>':'') +
      (email?'<a href="mailto:'+escHtml(email)+'" class="btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">✉️ Email</a>':'') +
      '<button class="action-btn danger" onclick="deleteRecord(\'applicants\',\''+a.id+'\')">🗑 Delete</button>' +
    '</div>';

  openDrawer('Applicant Profile',escHtml(name),html);

function openPhaseNoteModal(id,phase){
  var note=prompt('Add a note for this phase (optional):');if(note===null)return;
  var a=window._data.applicants.find(function(x){return x.id===id;});if(!a)return;
  var phases=(a.phases||[]).map(function(p){if(p.phase===phase){p.note=note;p.noteAddedAt=new Date().toISOString();}return p;});
  window._updateDoc('applicants',id,{phases:phases}).then(function(){toast('Note added','success');window._loadAll();});
}

<script>

function renderTeam(members){
  var total=members.length;
  var probation=members.filter(function(m){return m.employmentStage==='probation'||['phase1','phase2','phase3'].indexOf(m.status)>-1;}).length;
  var confirmed=members.filter(function(m){return m.employmentStage==='employed'||m.status==='employed';}).length;

    teams[team].forEach(function(m){

        '<div class="team-avatar">'+initials(m.name||m.email||'?')+'</div>' +

        '<div class="team-role-label">'+escHtml(m.roleLabel||ROLE_LABELS[m.role]||m.role||'—')+'</div>' +

function renderVacancies(config,applicants,teamMembers){
  var el=document.getElementById('vacancies-list');if(!el)return;

  var statusMap={};
  config.forEach(function(c){if(c.roleId)statusMap[c.roleId]={status:c.status||'open',id:c.id};});
  var allRoles=[
    {team:'Operations',roles:['ops_lead']},
    {team:'Sales',roles:['sales_manager','inbound_closer','outbound_closer']},

function updateVacancyStatus(select){

function buildPeopleMap(d){
  var map={};
  function addP(email,name,rec,type){if(!email)return;var k=email.toLowerCase();if(!map[k])map[k]={email:email,name:name||email,records:[]};if(name&&name.length>map[k].name.length)map[k].name=name;map[k].records.push({type:type,data:rec});}
  (d.leads||[]).forEach(function(l){addP(l.email,(l.firstName||'')+' '+(l.lastName||''),l,'lead');});
  (d.inquiries||[]).forEach(function(i){addP(i.email,i.name,i,'inquiry');});
  (d.messages||[]).forEach(function(m){addP(m.email,m.name,m,'message');});
  (d.proposals||[]).forEach(function(p){addP(p.personEmail,p.personName,p,'proposal');});
  (d.payments||[]).forEach(function(py){addP(py.personEmail,py.personName,py,'payment');});
  (d.assignments||[]).forEach(function(a){addP(a.personEmail,a.personName,a,'assignment');});
  (d.applicants||[]).forEach(function(a){var info=a.personalInfo||{};addP(info.email||a.email,info.name||a.name,a,'applicant');});
  return Object.values(map);
}
window._peopleCache=[];
function renderPeople(d){window._peopleCache=buildPeopleMap(d);displayPeople(window._peopleCache);}
function displayPeople(people){
  var el=document.getElementById('people-list');if(!el)return;
  if(!people||!people.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div>No people yet</div>';return;}
  el.innerHTML=people.map(function(p){
    var types=p.records.map(function(r){return r.type;});
    var badges=[...new Set(types)].map(function(t){var map={lead:'badge-gold',inquiry:'badge-cyan',message:'badge-purple',proposal:'badge-green',payment:'badge-green',assignment:'badge-blue',applicant:'badge-orange'};return'<span class="badge '+(map[t]||'badge-dim')+'">'+t+'</span>';}).join(' ');
    var lead=p.records.find(function(r){return r.type==='lead';});
    var score=lead?scoreBadge(lead.data.score):'';
    return'<div class="person-card" onclick="openPersonDrawer(\''+escHtml(p.email)+'\')">' +
      '<div class="person-avatar">'+initials(p.name)+'</div>' +
      '<div class="person-info"><div class="person-name">'+escHtml(p.name.trim()||p.email)+'</div><div class="person-email">'+escHtml(p.email)+'</div><div class="person-tags" style="margin-top:6px;">'+badges+'</div></div>' +
      '<div class="person-meta">'+score+'<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);margin-top:4px;">'+p.records.length+' record'+(p.records.length!==1?'s':'')+'</div></div>' +
    '</div>';
  }).join('');
}
function filterPeople(q){var ql=q.toLowerCase();displayPeople(window._peopleCache.filter(function(p){return p.email.toLowerCase().includes(ql)||p.name.toLowerCase().includes(ql);}));}
function openPersonDrawer(email){
  var p=window._peopleCache.find(function(x){return x.email.toLowerCase()===email.toLowerCase();});if(!p)return;
  var d=window._data;
  var lead=(d.leads||[]).find(function(l){return(l.email||'').toLowerCase()===email.toLowerCase();});
  var html='<div class="detail-section"><div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;"><div class="person-avatar" style="width:52px;height:52px;font-size:20px;">'+initials(p.name)+'</div><div><div style="font-family:var(--display);font-weight:700;font-size:1.1rem;">'+escHtml(p.name)+'</div><div style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+escHtml(p.email)+'</div></div></div></div>';
  if(lead)html+='<div class="detail-section"><h4>📥 Diagnostic Lead</h4><div class="detail-grid"><div class="detail-item"><div class="detail-label">Score</div><div class="detail-val gold">'+(lead.score||0)+'/100</div></div><div class="detail-item"><div class="detail-label">Tier</div><div class="detail-val">'+tierBadge(lead.tier)+'</div></div></div></div>';
  var myApp=(d.applicants||[]).filter(function(a){var info=a.personalInfo||{};return(info.email||a.email||'').toLowerCase()===email.toLowerCase();});
  if(myApp.length)html+='<div class="detail-section"><h4>🎯 Applications ('+myApp.length+')</h4>'+myApp.map(function(a){return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="badge badge-orange">'+escHtml(ROLE_LABELS[a.positionApplied]||'—')+'</span>'+phaseBadge(a)+'<span style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">'+fmtDate(a.submittedAt)+'</span></div>';}).join('')+'</div>';
  html+='<div class="btn-row"><button class="btn-primary" onclick="quickProposal(null,\''+escHtml(p.name)+'\',\''+escHtml(p.email)+'\')">📄 New Proposal</button><button class="btn-secondary" onclick="openNewPaymentFor(\''+escHtml(p.name)+'\',\''+escHtml(p.email)+'\')">💰 Log Payment</button><button class="btn-secondary" onclick="openNewAssignmentFor(\''+escHtml(p.name)+'\',\''+escHtml(p.email)+'\')">🗂️ Assign</button><a href="mailto:'+escHtml(p.email)+'" class="btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">✉️ Email</a></div>';
  openDrawer('Person Profile',escHtml(p.name),html);
}

// ── CRM Pipeline ──────────────────────────────────────────────
var _crmFilter = {venture:'', segment:''};
function filterCRM(){
  _crmFilter.venture = document.getElementById('crm-vfilter') ? document.getElementById('crm-vfilter').value : '';
  _crmFilter.segment = document.getElementById('crm-sfilter') ? document.getElementById('crm-sfilter').value : '';
  renderCRM(window._data.crm_leads||[]);
}

function renderCRM(list){
  var vf = _crmFilter.venture, sf = _crmFilter.segment;
  var filtered = list.filter(function(l){return(!vf||l.ventureId===vf)&&(!sf||l.segment===sf);});
  var newL=filtered.filter(function(l){return l.status==='new_lead';}).length;
  var hot=filtered.filter(function(l){return l.status==='qualified'||l.status==='proposal';}).length;
  var won=filtered.filter(function(l){return l.status==='won';}).length;
  var pipelineVal=filtered.filter(function(l){return l.status!=='won'&&l.status!=='lost';}).reduce(function(s,l){return s+(parseFloat(l.dealValue)||0);},0);
  var elN=document.getElementById('crm-kpi-new');if(elN)elN.textContent=newL;
  var elH=document.getElementById('crm-kpi-hot');if(elH)elH.textContent=hot;
  var elW=document.getElementById('crm-kpi-won');if(elW)elW.textContent=won;
  var elV=document.getElementById('crm-kpi-value');if(elV)elV.textContent='₦'+pipelineVal.toLocaleString();
  var board = document.getElementById('crm-board'); if(!board)return;
  var cols = [
    {k:'new_lead',  l:'New Lead',  dot:'var(--blue)'},
    {k:'contacted', l:'Contacted', dot:'var(--purple)'},
    {k:'qualified', l:'Qualified', dot:'var(--amber)'},
    {k:'proposal',  l:'Proposal',  dot:'var(--gold)'},
    {k:'won',       l:'Won ✅',    dot:'var(--green)'},
    {k:'lost',      l:'Lost ❌',   dot:'var(--red)'}
  ];
  board.innerHTML = cols.map(function(col){
    var ct = filtered.filter(function(l){return l.status===col.k;});
    return '<div class="kanban-col"><div class="kanban-col-header">' +
      '<div class="kanban-col-title"><div class="col-dot" style="background:'+col.dot+'"></div>'+col.l+'</div>' +
      '<div class="col-count">'+ct.length+'</div></div>' +
      '<div class="kanban-col-body">' +
      (ct.length ? ct.map(function(l){
        var v=V_MAP[l.ventureId]||{};
        var tier=parseFloat(l.dealValue||0)>=1000000?3:parseFloat(l.dealValue||0)>=250000?2:1;
        return '<div class="kanban-item" onclick="openCRMLeadDrawer(\''+l.id+'\')">' +
          '<div class="kanban-item-title">'+escHtml(l.name||'—')+'</div>' +
          '<div style="font-size:.7rem;color:var(--dimmer);margin-bottom:7px;">'+escHtml(l.contact||'')+'</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:5px;">' +
            (l.ventureId?'<span class="venture-tag">'+escHtml(v.name||l.ventureId)+'</span>':'') +
            (l.dealValue?'<span style="font-family:var(--mono);font-size:.58rem;color:var(--gold);">₦'+Number(l.dealValue).toLocaleString()+'</span>':'') +
            '<span class="badge badge-dim" style="font-size:.52rem;">T'+tier+'</span>' +
          '</div>' +
        '</div>';
      }).join('') : '<div class="empty-state" style="padding:16px;"><div class="empty-icon" style="font-size:1.4rem;">📭</div></div>') +
      '</div></div>';
  }).join('');
}

// ── Ventures ──────────────────────────────────────────────────
function renderVentures(dbVentures,tasks,crm_leads,clients,financials){
  var elT=document.getElementById('ven-kpi-total');
  var allV=[...VENTURES_SEED.filter(function(v){return!dbVentures.find(function(dv){return dv.id===v.id;});}),...dbVentures];
  if(elT)elT.textContent=allV.length;
  var elR=document.getElementById('ven-kpi-revenue');if(elR)elR.textContent=allV.filter(function(v){return(v.stage||'').toLowerCase()==='revenue';}).length;
  var elB=document.getElementById('ven-kpi-building');if(elB)elB.textContent=allV.filter(function(v){return(v.stage||'').toLowerCase()==='building';}).length;
  var grid=document.getElementById('ventures-grid');if(!grid)return;
  var finMap={},taskMap={},leadMap={},clientMap={};
  financials.forEach(function(f){if(!finMap[f.ventureId])finMap[f.ventureId]={i:0,e:0};if(f.type==='income')finMap[f.ventureId].i+=f.amount;else finMap[f.ventureId].e+=f.amount;});
  tasks.forEach(function(t){if(!taskMap[t.ventureId])taskMap[t.ventureId]={tot:0,done:0};taskMap[t.ventureId].tot++;if(t.status==='done')taskMap[t.ventureId].done++;});
  crm_leads.forEach(function(l){leadMap[l.ventureId]=(leadMap[l.ventureId]||0)+1;});
  clients.forEach(function(c){clientMap[c.ventureId]=(clientMap[c.ventureId]||0)+1;});
  grid.innerHTML = allV.map(function(v){
    var f=finMap[v.id]||{i:0,e:0},tm=taskMap[v.id]||{tot:0,done:0};
    var profit=f.i-f.e,h=tm.tot>0?Math.round(tm.done/tm.tot*100):(v.health||0);
    var hc=h>=70?'hf-green':h>=40?'hf-yellow':'hf-red';
    var sc=(v.stage||'idea').toLowerCase();
    var stageColors={idea:'badge-dim',building:'badge-amber',revenue:'badge-green',scaling:'badge-cyan'};
    return '<div class="venture-card">' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">' +
        '<div style="width:38px;height:38px;border-radius:8px;background:'+escHtml(v.color||'var(--gold)')+';display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#080808;flex-shrink:0;">'+escHtml((v.name||'?')[0])+'</div>' +
        '<div style="flex:1;"><div style="font-family:var(--display);font-weight:700;font-size:.95rem;">'+escHtml(v.name)+'</div>' +
        '<div style="font-size:.72rem;color:var(--dimmer);">'+escHtml(v.focus||'')+'</div></div>' +
        '<span class="badge '+(stageColors[sc]||'badge-dim')+'">'+escHtml(v.stage||'Idea')+'</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;text-align:center;">' +
        '<div><div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;">Leads</div><div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--gold);">'+(leadMap[v.id]||0)+'</div></div>' +
        '<div><div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;">Clients</div><div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--cyan);">'+(clientMap[v.id]||0)+'</div></div>' +
        '<div><div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;">Revenue</div><div style="font-family:var(--display);font-weight:700;font-size:.85rem;color:var(--green);">₦'+f.i.toLocaleString()+'</div></div>' +
        '<div><div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;">Net</div><div style="font-family:var(--display);font-weight:700;font-size:.85rem;color:'+(profit>=0?'var(--green)':'var(--red)')+';">₦'+Math.abs(profit).toLocaleString()+'</div></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<div class="health-bar" style="flex:1;margin-top:0;"><div class="health-fill '+hc+'" style="width:'+h+'%;"></div></div>' +
        '<span style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+h+'%</span>' +
      '</div>' +
      (canAccess('settings')&&dbVentures.find(function(dv){return dv.id===v.id;}) ?
        '<div class="btn-row" style="margin-top:10px;"><button class="action-btn" onclick="openEditVenture(\''+v.id+'\')">Edit</button><button class="action-btn danger" onclick="deleteRecord(\'ventures\',\''+v.id+'\')">Delete</button></div>' : '') +
    '</div>';
  }).join('');
}

function saveVenture(id){
  var name=document.getElementById('ven-name').value.trim();if(!name){toast('Name required','error');return;}
