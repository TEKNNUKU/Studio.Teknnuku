  var date=document.getElementById('rpt-date').value;var summary=document.getElementById('rpt-summary').value.trim();
  var tm=window._data&&window._data.team_members?window._data.team_members.find(function(m){return window._currentUser&&(m.email||'').toLowerCase()===(window._currentUser.email||'').toLowerCase();}):null;
  window._saveDoc('daily_reports',{userId:window._currentUser?window._currentUser.uid:'',userName:tm?tm.name:window._currentUser?window._currentUser.email:'',role:role,reportType:role,date:date,data:data,summary:summary,submittedAt:new Date().toISOString()})
    .then(function(){
      toast('Daily report submitted ✓','success');
      tmpl.fields.forEach(function(f){var el=document.getElementById('rpt-f-'+f.id);if(el)el.value='';});
      var sumEl=document.getElementById('rpt-summary');if(sumEl)sumEl.value='';
      window._loadAll();
    }).catch(function(e){toast('Submit failed: '+(e.message||e),'error');});
}
function renderReports(list){
  var el=document.getElementById('reports-list');if(!el)return;
  var role=window._userRole||'developer';
  var isLeader=(role==='founder'||role==='ops_lead');
  var roleFilter=document.getElementById('rpt-role-filter')?document.getElementById('rpt-role-filter').value:'';
  var uid=window._currentUser?window._currentUser.uid:'';
  var filtered=isLeader?list:list.filter(function(r){return r.userId===uid;});
  if(roleFilter)filtered=filtered.filter(function(r){return r.reportType===roleFilter;});
  filtered=filtered.slice().sort(function(a,b){return new Date(b.submittedAt||0)-new Date(a.submittedAt||0);});
  if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>No reports yet</div>';return;}
  el.innerHTML='<div class="table-wrap"><div class="table-toolbar"><div class="table-toolbar-title">daily_reports</div></div><div class="table-scroll"><table><thead><tr>' +
    (isLeader?'<th>Member</th>':'') +
    '<th>Date</th><th>Role</th><th>Summary</th><th>Submitted</th><th>Actions</th></tr></thead><tbody>' +
    filtered.slice(0,40).map(function(r){
      return '<tr>' +
        (isLeader?'<td style="font-weight:600;font-size:.82rem;">'+escHtml(r.userName||'—')+'</td>':'') +
        '<td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+fmtDate(r.date)+'</td>' +
        '<td><span class="badge badge-cyan" style="font-size:.52rem;">'+escHtml((r.reportType||'report').replace(/_/g,' '))+'</span></td>' +
        '<td style="font-size:.78rem;color:var(--dim);">'+escHtml((r.summary||'—').substring(0,60))+'</td>' +
        '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+fmtTime(r.submittedAt)+'</td>' +
        '<td><button class="action-btn" onclick="viewReport(\''+r.id+'\')">View</button></td>' +
      '</tr>';
    }).join('') +
  '</tbody></table></div></div>';
}
function viewReport(id){
  var r=(window._data.daily_reports||[]).find(function(x){return x.id===id;});if(!r)return;
  var entries=Object.entries(r.data||{}).filter(function(e){return e[1]!==undefined&&e[1]!==0&&e[1]!=='';});
  var html='<div class="detail-section"><div class="detail-grid">' +
    '<div class="detail-item"><div class="detail-label">Member</div><div class="detail-val">'+escHtml(r.userName||'—')+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Date</div><div class="detail-val">'+fmtDate(r.date)+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Role</div><div class="detail-val gold">'+escHtml((r.reportType||'').replace(/_/g,' '))+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Submitted</div><div class="detail-val">'+fmtTime(r.submittedAt)+'</div></div>' +
    '</div>' +
    (r.summary?'<div style="margin-top:10px;padding:10px 14px;background:rgba(200,155,20,.06);border:1px solid rgba(200,155,20,.18);border-radius:6px;font-family:var(--mono);font-size:.7rem;color:var(--gold);">'+escHtml(r.summary)+'</div>':'') +
    '</div>' +
    '<div class="detail-section"><h4>Report Data</h4><div style="display:flex;flex-direction:column;gap:8px;">' +
    entries.map(function(e){var isNum=typeof e[1]==='number';return'<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(200,155,20,.05);">' +
      '<div style="font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;color:var(--dimmer);text-transform:uppercase;min-width:140px;flex-shrink:0;padding-top:2px;">'+escHtml(e[0].replace(/([A-Z])/g,' $1').trim())+'</div>' +
      '<div style="font-size:.82rem;color:var(--white);'+(isNum?'font-family:var(--mono);font-weight:600;color:var(--gold);':'')+'">'+escHtml(String(e[1]))+'</div>' +
    '</div>';}).join('') +
    '</div></div>' +
    '<div class="btn-row"><button class="action-btn danger" onclick="deleteRecord(\'daily_reports\',\''+r.id+'\');closeDrawer();">Delete</button></div>';
  openDrawer('Daily Report',escHtml(r.userName||'Report'),html);
}


// ═══════════════════════════════════════
// FILTERS & UTILS
// ═══════════════════════════════════════
function filterTable(tbodyId,query){var q=query.toLowerCase();document.querySelectorAll('#'+tbodyId+' tr[data-search]').forEach(function(row){row.style.display=!q||row.dataset.search.includes(q)?'':'none';});}
function filterByTier(tier){document.querySelectorAll('#leads-tbody tr[data-tier]').forEach(function(row){row.style.display=!tier||row.dataset.tier===tier?'':'none';});}
function filterInquiryByService(svc){document.querySelectorAll('#inquiries-tbody tr[data-service]').forEach(function(row){row.style.display=!svc||row.dataset.service===svc?'':'none';});}
function filterPaymentsByStatus(status){document.querySelectorAll('#payments-tbody tr[data-status]').forEach(function(row){row.style.display=!status||row.dataset.status===status?'':'none';});}
function filterAssignmentsByVenture(venture){document.querySelectorAll('#assignments-tbody tr[data-venture]').forEach(function(row){row.style.display=!venture||row.dataset.venture===venture?'':'none';});}
function globalSearch(q){if(!q)return;var ql=q.toLowerCase();var people=window._peopleCache||[];var match=people.find(function(p){return p.email.toLowerCase().includes(ql)||p.name.toLowerCase().includes(ql);});if(match){showPanel('people',document.querySelector('[data-panel="people"]'));filterPeople(q);}}
function deleteRecord(col,id){if(!confirm('Delete this record? This cannot be undone.'))return;window._deleteDoc(col,id).then(function(){toast('Deleted ✓','success');window._loadAll();}).catch(function(){toast('Delete failed','error');});}

function _bindKeydown(){
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')closeDrawer();
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();var gs=document.getElementById('global-search');if(gs)gs.focus();}
  });
}

// Wire up cross-app switcher links
(function() {
  var siteLink = document.getElementById('sw-site-link');
  var osLink   = document.getElementById('sw-os-link');
  if (siteLink) siteLink.href = (window.TEKNNUKU_URLS||{}).mainSite || 'https://teknnuku-studio.vercel.app';
  if (osLink)   osLink.href   = (window.TEKNNUKU_URLS||{}).commandCenter || 'https://teknnuku-os.vercel.app';
  // Hide OS link for roles that don't need it
  window._onRoleResolved_callbacks = window._onRoleResolved_callbacks || [];
  window._onRoleResolved_callbacks.push(function(role) {
    if (osLink && ['founder','ops_lead','sales_manager','tech_product_lead','developer','admin_finance_officer'].indexOf(role) === -1) {
      osLink.style.display = 'none';
    }
  });
})();

document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-pass').focus();});
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
