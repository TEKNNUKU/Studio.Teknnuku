// PEOPLE
// ═══════════════════════════════════════
function buildPeopleMap(d) {
  var map = {};
  function addP(email, name, rec, type) {
    if (!email) return;
    var k = email.toLowerCase();
    if (!map[k]) map[k] = { email:email, name:name||email, records:[] };
    if (name && name.length > map[k].name.length) map[k].name = name;
    map[k].records.push({ type:type, data:rec });
  }
  (d.leads      ||[]).forEach(function(l){ addP(l.email,(l.firstName||'')+' '+(l.lastName||''),l,'lead'); });
  (d.inquiries  ||[]).forEach(function(i){ addP(i.email,i.name,i,'inquiry'); });
  (d.messages   ||[]).forEach(function(m){ addP(m.email,m.name,m,'message'); });
  (d.proposals  ||[]).forEach(function(p){ addP(p.personEmail,p.personName,p,'proposal'); });
  (d.payments   ||[]).forEach(function(py){ addP(py.personEmail,py.personName,py,'payment'); });
  (d.assignments||[]).forEach(function(a){ addP(a.personEmail,a.personName,a,'assignment'); });

  // Only add applicants if this user can see them
  if (canSeeApplicants()) {
    (d.applicants||[]).forEach(function(a){
      var info = a.personalInfo||{};
      addP(info.email||a.email, info.name||a.name, a, 'applicant');
    });
  }
  return Object.values(map);
}

function renderPeople(d) {
  window._peopleCache = buildPeopleMap(d);
  buildPeopleCatTabs(window._peopleCache);
  displayPeople(window._peopleCache);
}

function buildPeopleCatTabs(people) {
  var tabsEl = document.getElementById('people-cat-tabs'); if (!tabsEl) return;
  var counts  = { all:people.length, lead:0, prospect:0, client:0, applicant:0, team:0, contact:0 };
  people.forEach(function(p) {
    var cats = getPersonCategories(p);
    cats.forEach(function(c){ if (counts[c] !== undefined) counts[c]++; });
  });

  var TABS = [
    { key:'',          label:'All',        icon:'⬡' },
    { key:'lead',      label:'Leads',      icon:'📥' },
    { key:'prospect',  label:'Prospects',  icon:'🔍' },
    { key:'client',    label:'Clients',    icon:'🤝' },
    { key:'team',      label:'Team',       icon:'👤' },
    { key:'contact',   label:'Contacts',   icon:'💬' }
  ];
  if (canSeeApplicants()) TABS.splice(4, 0, { key:'applicant', label:'Applicants', icon:'🎯' });

  var cur = _peopleFilters.category;
  tabsEl.innerHTML = TABS.map(function(t) {
    var cnt   = t.key === '' ? counts.all : (counts[t.key] || 0);
    var isAct = t.key === cur;
    return '<button onclick="setPeopleCatTab(\'' + t.key + '\')" style="' +
      'display:flex;align-items:center;gap:5px;' +
      'padding:5px 12px;border-radius:20px;font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;' +
      'cursor:pointer;transition:all .15s;white-space:nowrap;' +
      (isAct
        ? 'background:rgba(200,155,20,.15);border:1px solid rgba(200,155,20,.3);color:var(--gold);'
        : 'background:rgba(255,255,255,.03);border:1px solid rgba(242,237,228,.08);color:var(--dimmer);') +
      '">' +
      t.icon + ' ' + t.label +
      '<span style="background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px;font-size:.52rem;margin-left:3px;">' + cnt + '</span>' +
    '</button>';
  }).join('');
}

function setPeopleCatTab(cat) {
  _peopleFilters.category = cat;
  var sel = document.getElementById('pf-cat'); if (sel) sel.value = cat;
  buildPeopleCatTabs(window._peopleCache || []);
  displayPeople(window._peopleCache || []);
}

function displayPeople(people) {
  var el = document.getElementById('people-list'); if (!el) return;
  var f  = _peopleFilters;
  var d  = window._data || {};

  // Apply filters
  var filtered = people.filter(function(p) {
    var cats = getPersonCategories(p);

    // Category filter
    if (f.category && cats.indexOf(f.category) === -1) return false;

    // Venture filter — match against CRM lead or client ventureId
    if (f.venture) {
      var crm    = (d.crm_leads||[]).find(function(l){ return (l.email||'').toLowerCase() === p.email.toLowerCase(); });
      var client = (d.clients  ||[]).find(function(c){ return (c.email||c.contact||'').toLowerCase() === p.email.toLowerCase(); });
      var vId    = (crm && crm.ventureId) || (client && client.ventureId) || '';
      if (vId !== f.venture) return false;
    }

    // Search
    if (f.search) {
      var hay = (p.name + ' ' + p.email + ' ' + p.records.map(function(r){
        var data = r.data || {};
        return (data.phone||'') + ' ' + (data.businessName||'') + ' ' + ((data.personalInfo||{}).phone||'');
      }).join(' ')).toLowerCase();
      if (!hay.includes(f.search)) return false;
    }

    return true;
  });

  // Count label
  var lbl = document.getElementById('people-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + people.length + ' people';

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div>' +
      '<div>No people match your filters</div>' +
      '<div style="margin-top:8px;"><button class="action-btn" onclick="clearPeopleFilters()">Clear Filters</button></div>' +
    '</div>';
    return;
  }

  // Group by primary category
  var CAT_ORDER = ['client','lead','prospect','team','applicant','contact'];
  if (!canSeeApplicants()) CAT_ORDER = CAT_ORDER.filter(function(c){ return c !== 'applicant'; });

  var groups = {};
  CAT_ORDER.forEach(function(c){ groups[c] = []; });

  filtered.forEach(function(p) {
    var cats = getPersonCategories(p);
    var primary = CAT_ORDER.find(function(c){ return cats.indexOf(c) !== -1; }) || 'contact';
    groups[primary].push(p);
  });

  // If a specific category is filtered, show flat list with no group headers
  var showGroups = !f.category;

  var html = '';

  CAT_ORDER.forEach(function(cat) {
    var group = groups[cat]; if (!group || !group.length) return;
    var cs    = getCatStyle(cat);

    if (showGroups) {
      var tc = { lead:'#C89B14', prospect:'#00BCD4', client:'#22c55e', applicant:'#f97316', team:'#a855f7', contact:'rgba(242,237,228,.28)' };
      html += '<div style="display:flex;align-items:center;gap:8px;margin:20px 0 10px;">' +
        '<div style="font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:' + (tc[cat]||'var(--dimmer)') + ';">' +
          cs.icon + ' ' + cs.label + 's' +
        '</div>' +
        '<div style="flex:1;height:1px;background:rgba(200,155,20,.08);"></div>' +
        '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);">' + group.length + '</div>' +
      '</div>';
    }

    group.forEach(function(p) {
      html += buildPersonCard(p, cat, d);
    });
  });

  el.innerHTML = html;
}

function buildPersonCard(p, primaryCat, d) {
  var cats    = getPersonCategories(p);
  var cs      = getCatStyle(primaryCat);
  var crmLead = (d.crm_leads||[]).find(function(l){ return (l.email||'').toLowerCase() === p.email.toLowerCase(); });
  var client  = (d.clients  ||[]).find(function(c){ return (c.email||c.contact||'').toLowerCase() === p.email.toLowerCase(); });
  var teamMbr = (d.team_members||[]).find(function(m){ return (m.email||'').toLowerCase() === p.email.toLowerCase(); });
  var leadRec = p.records.find(function(r){ return r.type === 'lead'; });
  var appRec  = p.records.find(function(r){ return r.type === 'applicant'; });

  // Avatar gradient by category
  var GRAD = {
    client:'linear-gradient(135deg,#22c55e,#006633)', lead:'linear-gradient(135deg,#C89B14,#daa820)',
    prospect:'linear-gradient(135deg,#00BCD4,#006688)', applicant:'linear-gradient(135deg,#f97316,#aa4400)',
    team:'linear-gradient(135deg,#a855f7,#3d2080)', contact:'linear-gradient(135deg,var(--gold),var(--cyan))'
  };

  // CRM status badge
  var crmBadge = '';
  if (crmLead) {
    var SL = {new_lead:'New Lead',contacted:'Contacted',qualified:'Qualified',proposal:'Proposal',won:'Won ✅',lost:'Lost'};
    var SB = {new_lead:'badge-dim',contacted:'badge-purple',qualified:'badge-amber',proposal:'badge-gold',won:'badge-green',lost:'badge-red'};
    crmBadge = '<span class="badge ' + (SB[crmLead.status]||'badge-dim') + '" style="font-size:.5rem;">' + (SL[crmLead.status]||crmLead.status) + '</span>';
  }

  // Score badge if they're a lead
  var scorePart = leadRec ? '<div style="text-align:right;">' + scoreBadge(leadRec.data.score) + '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);margin-top:3px;">Intake Score</div></div>' : '';

  // All category badges
  var catBadges = cats.map(function(c) {
    if (c === 'applicant' && !canSeeApplicants()) return '';
    var s = getCatStyle(c);
    return '<span class="badge ' + s.badge + '" style="font-size:.52rem;">' + s.icon + ' ' + s.label + '</span>';
  }).filter(Boolean).join(' ');

  // Record count (excluding applicant for non-privileged)
  var visibleRecs = p.records.filter(function(r) {
    return r.type !== 'applicant' || canSeeApplicants();
  }).length;

  return '<div class="person-card" onclick="openPersonDrawer(\'' + escHtml(p.email) + '\')" style="position:relative;">' +
    // Primary category accent strip
    '<div style="position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:10px 0 0 10px;background:' + (GRAD[primaryCat]||'var(--gold)') + ';"></div>' +

    '<div style="display:flex;align-items:flex-start;gap:14px;width:100%;">' +

      // Avatar
      '<div style="width:42px;height:42px;border-radius:50%;background:' + (GRAD[primaryCat]||'var(--gold)') + ';display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#080808;flex-shrink:0;">' +
        escHtml(initials(p.name)) +
      '</div>' +

      // Info
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">' +
          '<div class="person-name">' + escHtml((p.name||'').trim() || p.email) + '</div>' +
          crmBadge +
        '</div>' +
        '<div class="person-email">' + escHtml(p.email) + '</div>' +
        '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;">' +
          catBadges +
        '</div>' +
        (teamMbr ? '<div style="font-family:var(--mono);font-size:.54rem;color:var(--purple);margin-top:4px;">' + escHtml(ROLE_LABELS[teamMbr.role]||teamMbr.role||'') + ' · ' + escHtml(teamMbr.team||'') + '</div>' : '') +
        (client  ? '<div style="font-family:var(--mono);font-size:.54rem;color:var(--green);margin-top:3px;">Active Client · ' + escHtml((V_MAP[client.ventureId]||{}).name||'') + '</div>' : '') +
      '</div>' +

      // Right side
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">' +
        scorePart +
        '<div style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);">' + visibleRecs + ' record' + (visibleRecs !== 1 ? 's' : '') + '</div>' +
      '</div>' +

    '</div>' +
  '</div>';
}

function filterPeople(q) {
  _peopleFilters.search = (q||'').toLowerCase().trim();
  var searchEl = document.getElementById('pf-search');
  if (searchEl) searchEl.value = q || '';
  displayPeople(window._peopleCache || []);
}

function openPersonDrawer(email) {
  var p = (window._peopleCache||[]).find(function(x){ return x.email.toLowerCase() === email.toLowerCase(); });
  if (!p) return;
  var d = window._data || {};

  var leadRec  = p.records.find(function(r){ return r.type === 'lead'; });
  var appRec   = canSeeApplicants() ? p.records.find(function(r){ return r.type === 'applicant'; }) : null;
  var propRecs = p.records.filter(function(r){ return r.type === 'proposal'; });
  var payRecs  = p.records.filter(function(r){ return r.type === 'payment'; });
  var msgRecs  = p.records.filter(function(r){ return r.type === 'message'; });
  var inqRecs  = p.records.filter(function(r){ return r.type === 'inquiry'; });

  var crmLead  = (d.crm_leads   ||[]).find(function(l){ return (l.email||'').toLowerCase()===email.toLowerCase(); });
  var client   = (d.clients     ||[]).find(function(c){ return (c.email||c.contact||'').toLowerCase()===email.toLowerCase(); });
  var teamMbr  = (d.team_members||[]).find(function(m){ return (m.email||'').toLowerCase()===email.toLowerCase(); });

  var cats = getPersonCategories(p);
  var isLead      = cats.indexOf('lead')      !== -1;
  var isApplicant = cats.indexOf('applicant') !== -1 && canSeeApplicants();
  var isBoth      = isLead && isApplicant;

  var html = '';

  // ── Header ────────────────────────────────────────────────
  html += '<div class="detail-section">' +
    '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;">' +
      '<div class="person-avatar" style="width:52px;height:52px;font-size:20px;">' + initials(p.name) + '</div>' +
      '<div style="flex:1;">' +
        '<div style="font-family:var(--display);font-weight:700;font-size:1.1rem;">' + escHtml(p.name) + '</div>' +
        '<div style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">' + escHtml(p.email) + '</div>' +
        (teamMbr ? '<div style="font-family:var(--mono);font-size:.6rem;color:var(--purple);margin-top:3px;">' + escHtml(ROLE_LABELS[teamMbr.role]||teamMbr.role||'') + ' · ' + escHtml(teamMbr.team||'') + '</div>' : '') +
        (client  ? '<div style="font-family:var(--mono);font-size:.6rem;color:var(--green);margin-top:3px;">✅ Active Client · ' + escHtml((V_MAP[client.ventureId]||{}).name||'') + '</div>' : '') +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">' +
          cats.filter(function(c){ return c !== 'applicant' || canSeeApplicants(); }).map(function(c){
            var s = getCatStyle(c); return '<span class="badge ' + s.badge + '">' + s.icon + ' ' + s.label + '</span>';
          }).join('') +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // ── CRM Pipeline card ─────────────────────────────────────
  if (crmLead) {
    var v = V_MAP[crmLead.ventureId] || {};
    var SL = {new_lead:'New Lead',contacted:'Contacted',qualified:'Qualified',proposal:'Proposal',won:'Won ✅',lost:'Lost ❌'};
    html += '<div class="detail-section"><h4>🔄 CRM Pipeline</h4>' +
      '<div style="background:rgba(200,155,20,.05);border:1px solid rgba(200,155,20,.15);border-radius:8px;padding:12px 14px;">' +
        '<div class="detail-grid">' +
          '<div class="detail-item"><div class="detail-label">Status</div><div class="detail-val">' + statusBadge(crmLead.status) + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Venture</div><div class="detail-val gold">' + escHtml(v.name||crmLead.ventureId||'—') + '</div></div>' +
          (crmLead.dealValue ? '<div class="detail-item"><div class="detail-label">Deal Value</div><div class="detail-val gold">₦' + Number(crmLead.dealValue).toLocaleString() + '</div></div>' : '') +
          '<div class="detail-item"><div class="detail-label">Assigned</div><div class="detail-val">' + escHtml(crmLead.assignedName||'Unassigned') + '</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ── Intake Lead data ──────────────────────────────────────
  if (isLead && leadRec) {
    var l = leadRec.data;
    html += '<div class="detail-section"><h4>📥 Intake Diagnostic</h4>' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">' +
        scoreBadge(l.score) + tierBadge(l.tier) +
        '<span style="font-family:var(--mono);font-size:.68rem;color:var(--dim);">Route: ' + escHtml(l.primaryRoute||'—') + '</span>' +
      '</div>';
    if (l.responses) {
      var r = l.responses;
      html += '<div class="detail-grid">' +
        (r.q6_budget&&r.q6_budget[0]  ? '<div class="detail-item"><div class="detail-label">Budget</div><div class="detail-val">' + escHtml(r.q6_budget[0].replace(/_/g,' ')) + '</div></div>' : '') +
        (r.q2_stage &&r.q2_stage[0]   ? '<div class="detail-item"><div class="detail-label">Stage</div><div class="detail-val">' + escHtml(r.q2_stage[0].replace(/_/g,' ')) + '</div></div>' : '') +
      '</div>';
    }
    html += '</div>';
  }

  // ── Applicant data (privileged only) ──────────────────────
  if (isApplicant && appRec) {
    var a    = appRec.data;
    var info = a.personalInfo || {};
    html += '<div class="detail-section"><h4>🎯 Applicant Record</h4>' +
      '<div style="background:rgba(249,115,22,.05);border:1px solid rgba(249,115,22,.15);border-radius:8px;padding:12px 14px;">' +
        '<div class="detail-grid">' +
          '<div class="detail-item"><div class="detail-label">Applied For</div><div class="detail-val">' + escHtml(ROLE_LABELS[a.positionApplied]||a.positionTitle||'—') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Status</div><div class="detail-val">' + phaseBadge(a) + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Score</div><div class="detail-val gold">' + (a.score||0) + '/100</div></div>' +
          '<div class="detail-item"><div class="detail-label">Applied</div><div class="detail-val">' + fmtDate(a.submittedAt||a.createdAt) + '</div></div>' +
        '</div>' +
        (isBoth ? '<div style="margin-top:10px;padding:7px 10px;background:rgba(255,255,255,.03);border-radius:5px;font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">⬡ This person is both a Lead and an Applicant.</div>' : '') +
      '</div>' +
    '</div>';
  }

  // ── Client record ─────────────────────────────────────────
  if (client) {
    html += '<div class="detail-section"><h4>🤝 Client Record</h4>' +
      '<div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:8px;padding:12px 14px;">' +
        '<div class="detail-grid">' +
          '<div class="detail-item"><div class="detail-label">Package</div><div class="detail-val">' + escHtml(client.package||'—') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Onboarding</div><div class="detail-val">' + escHtml(client.onboardingStatus||'—') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Contract Value</div><div class="detail-val gold">₦' + Number(client.monthlyValue||0).toLocaleString() + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">Payment</div><div class="detail-val">' + statusBadge(client.paymentStatus||'pending') + '</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ── Proposals ─────────────────────────────────────────────
  if (propRecs.length) {
    html += '<div class="detail-section"><h4>📄 Proposals (' + propRecs.length + ')</h4>' +
      propRecs.map(function(r) {
        var pr = r.data;
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;">' +
          '<div><div style="font-size:.8rem;color:var(--white);">' + escHtml(pr.title||'Untitled') + '</div>' +
          '<div style="font-family:var(--mono);font-size:.6rem;color:var(--gold);">₦' + Number(pr.amount||0).toLocaleString() + '</div></div>' +
          statusBadge(pr.status||'draft') +
        '</div>';
      }).join('') +
    '</div>';
  }

  // ── Inquiries ─────────────────────────────────────────────
  if (inqRecs.length) {
    html += '<div class="detail-section"><h4>📋 Inquiries (' + inqRecs.length + ')</h4>' +
      inqRecs.map(function(r) {
        var inq = r.data;
        return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(200,155,20,.05);">' +
          '<span class="badge badge-cyan">' + escHtml(serviceLabel(inq.service)) + '</span>' +
          '<span style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">' + fmtDate(inq.submittedAt||inq.createdAt) + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  // ── Messages ─────────────────────────────────────────────
  if (msgRecs.length) {
    html += '<div class="detail-section"><h4>💬 Messages (' + msgRecs.length + ')</h4>' +
      msgRecs.map(function(r) {
        var m = r.data;
        return '<div style="padding:7px 0;border-bottom:1px solid rgba(200,155,20,.05);">' +
          '<div style="font-size:.78rem;color:var(--white);">' + escHtml(m.subject||'general') + '</div>' +
          '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);margin-top:2px;">' + escHtml((m.message||'').substring(0,60)) + (m.message&&m.message.length>60?'…':'') + '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  // ── Action buttons — split by context ────────────────────
  var leadActions = '';
  if (isLead || crmLead || inqRecs.length) {
    leadActions =
      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">' +
        '<div style="font-family:var(--mono);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;">Lead Actions</div>' +
        '<div class="btn-row" style="margin-top:0;">' +
          '<button class="btn-primary" style="font-size:.72rem;padding:7px 14px;" onclick="quickProposal(null,\'' + escHtml(p.name) + '\',\'' + escHtml(p.email) + '\')">📄 New Proposal</button>' +
          '<button class="btn-secondary" style="font-size:.72rem;padding:7px 12px;" onclick="openNewPaymentFor(\'' + escHtml(p.name) + '\',\'' + escHtml(p.email) + '\')">💰 Log Payment</button>' +
          '<button class="btn-secondary" style="font-size:.72rem;padding:7px 12px;" onclick="openNewAssignmentFor(\'' + escHtml(p.name) + '\',\'' + escHtml(p.email) + '\')">🗂️ Assign</button>' +
        '</div>' +
      '</div>';
  }

  var appActions = '';
  if (isApplicant && appRec) {
    var a = appRec.data;
    appActions =
      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">' +
        '<div style="font-family:var(--mono);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:2px;">Applicant Actions</div>' +
        '<div class="btn-row" style="margin-top:0;">' +
          (a.status==='pending'   ? '<button class="btn-success" style="font-size:.72rem;padding:7px 12px;" onclick="updateApplicantStatus(\'' + a.id + '\',\'interview\');closeDrawer();">✓ Shortlist</button>' : '') +
          (a.status==='interview' ? '<button class="btn-primary" style="font-size:.72rem;padding:7px 12px;" onclick="startProbation(\'' + a.id + '\');closeDrawer();">🚀 Start Phase 1</button>' : '') +
          (['phase1','phase2','phase3'].indexOf(a.status)>-1 ? '<button class="btn-success" style="font-size:.72rem;padding:7px 12px;" onclick="advancePhase(\'' + a.id + '\',\'' + a.status + '\');closeDrawer();">Advance →</button>' : '') +
          (a.status!=='rejected'&&a.status!=='hired'&&a.status!=='employed' ? '<button class="btn-secondary" style="font-size:.72rem;padding:7px 12px;border-color:rgba(239,68,68,.3);color:var(--red);" onclick="updateApplicantStatus(\'' + a.id + '\',\'rejected\');closeDrawer();">✕ Reject</button>' : '') +
          '<button class="action-btn" style="font-size:.68rem;" onclick="openApplicantDrawer(window._data.applicants.find(function(x){return x.id===\'' + a.id + '\'}))">Full Profile →</button>' +
        '</div>' +
      '</div>';
  }

  var sharedActions =
    '<div class="btn-row" style="margin-top:4px;">' +
      (p.email ? '<a href="mailto:' + escHtml(p.email) + '" class="btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:.72rem;padding:7px 12px;">✉️ Email</a>' : '') +
    '</div>';

  if (leadActions || appActions) {
    html += '<div class="detail-section"><h4>⚡ Actions</h4>' +
      (isBoth ? '<div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:10px;font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">⬡ Dual record — lead and applicant actions are shown separately below.</div>' : '') +
      leadActions + appActions + sharedActions +
    '</div>';
  } else {
    html += '<div class="btn-row">' + sharedActions + '</div>';
  }

  openDrawer('Person Profile', escHtml(p.name), html);
}

// ═══════════════════════════════════════
// PROPOSALS
// ═══════════════════════════════════════
var _proposalFilter = 'all';

function renderProposals(proposals) {
  displayProposals(proposals);
}

function filterProposals(status, btn) {
  _proposalFilter = status;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  displayProposals(window._data ? window._data.proposals : []);
}

function displayProposals(proposals) {
  var el = document.getElementById('proposals-list');
  if (!el) return;
  var q = ((document.getElementById('prop-search') || {}).value || '').toLowerCase().trim();
  var filtered = proposals.filter(function(p) {
    if (_proposalFilter !== 'all' && p.status !== _proposalFilter) return false;
    if (q) {
      var hay = ((p.personName||'') + (p.personEmail||'') + (p.title||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div>No proposals found</div>';
    return;
  }

  el.innerHTML = filtered.map(function(p) {
    var lead      = window._data ? (window._data.crm_leads||[]).find(function(l){ return l.id === p.leadId; }) : null;
    var v         = lead ? (V_MAP[lead.ventureId] || {}) : {};
    var hasPaidPay= window._data ? (window._data.payments||[]).some(function(pay){ return pay.leadId === p.leadId && pay.status === 'paid'; }) : false;
    var methods   = p.paymentMethods || [];
    var dv        = parseFloat(p.amount) || 0;
    var phone     = p.personPhone || (lead ? lead.phone : '') || '';

    // Payment breakdown display
    var breakdown = '';
    if (p.duration) {
      if (p.duration.includes('2 instal') || p.duration.includes('50/50')) {
        var half = Math.round(dv / 2);
        breakdown = '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">₦' + half.toLocaleString() + ' now · ₦' + (dv - half).toLocaleString() + ' on delivery</div>';
      } else if (p.duration.includes('3')) {
        var third = Math.round(dv / 3);
        breakdown = '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">₦' + third.toLocaleString() + ' × 3 payments</div>';
      } else if (p.duration.toLowerCase().includes('monthly')) {
        breakdown = '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">₦' + dv.toLocaleString() + '/month</div>';
      }
    }

    return '<div class="proposal-card">' +

      // ── Header ────────────────────────────────────────────
      '<div class="proposal-header">' +
        '<div style="flex:1;">' +
          '<div class="proposal-title">' + escHtml(p.title || 'Untitled Proposal') + '</div>' +
          '<div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);margin-top:3px;">' +
            'To: ' + escHtml(p.personName || p.personEmail || '—') +
            (v.name ? ' <span style="color:var(--gold);">· ' + escHtml(v.name) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">' +
          statusBadge(p.status || 'draft') +
          (hasPaidPay && p.status !== 'accepted' ? '<span class="badge badge-green" style="font-size:.5rem;">💰 Payment Confirmed</span>' : '') +
        '</div>' +
      '</div>' +

      // ── Financial info ────────────────────────────────────
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">' +
        (p.service ? '<span class="badge badge-cyan">' + serviceLabel(p.service) + '</span>' : '') +
        '<span style="font-family:var(--mono);font-size:.75rem;color:var(--gold);font-weight:700;">₦' + dv.toLocaleString() + '</span>' +
        (p.duration ? '<span style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);padding:2px 8px;border-radius:3px;">' + escHtml(p.duration) + '</span>' : '') +
        (p.contractDuration ? '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">· ' + escHtml(p.contractDuration) + '</span>' : '') +
      '</div>' +
      breakdown +

      // ── Payment methods ───────────────────────────────────
      (methods.length ? '<div style="display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 10px;">' +
        (methods.indexOf('card')           !== -1 ? '<span style="font-size:.68rem;background:rgba(59,130,246,.1);color:var(--blue);padding:2px 8px;border-radius:3px;font-family:var(--mono);">💳 Card</span>' : '') +
        (methods.indexOf('bank_transfer')  !== -1 ? '<span style="font-size:.68rem;background:rgba(34,197,94,.08);color:var(--green);padding:2px 8px;border-radius:3px;font-family:var(--mono);">🏦 Bank Transfer</span>' : '') +
        (methods.indexOf('ussd')           !== -1 ? '<span style="font-size:.68rem;background:rgba(245,158,11,.08);color:var(--amber);padding:2px 8px;border-radius:3px;font-family:var(--mono);">📱 USSD</span>' : '') +
        (methods.indexOf('mobile_money')   !== -1 ? '<span style="font-size:.68rem;background:rgba(168,85,247,.08);color:var(--purple);padding:2px 8px;border-radius:3px;font-family:var(--mono);">📲 Mobile Money</span>' : '') +
        (methods.indexOf('crypto')         !== -1 ? '<span style="font-size:.68rem;background:rgba(200,155,20,.1);color:var(--gold);padding:2px 8px;border-radius:3px;font-family:var(--mono);">₿ Crypto</span>' : '') +
      '</div>' : '') +

      // ── Proposal body preview ─────────────────────────────
      (p.body ? '<div class="proposal-body">' + escHtml(p.body) + '</div>' : '') +

      // ── Bank info strip ───────────────────────────────────
      (p.bankAccountNumber ? '<div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.12);border-radius:5px;padding:8px 12px;margin:8px 0;font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">🏦 ' +
        escHtml(p.bankName||'') + ' · Acct: ' + escHtml(p.bankAccountNumber||'') + ' · ' + escHtml(p.bankAccountName||'') +
      '</div>' : '') +

      // ── Footer / actions ──────────────────────────────────
      '<div class="proposal-footer" style="gap:6px;">' +
        '<span class="proposal-meta">' + fmtDate(p.sentAt || p.createdAt) + (p.validUntil ? ' · Valid: ' + fmtDate(p.validUntil) : '') + '</span>' +
        '<div class="row-actions" style="margin-left:auto;flex-wrap:wrap;">' +
          (p.personEmail ? '<button class="action-btn" style="border-color:rgba(200,155,20,.3);color:var(--gold);" onclick="sendProposalEmail(\'' + p.id + '\')">✉ Email</button>' : '') +
          (phone ? '<button class="action-btn" style="border-color:rgba(34,197,94,.3);color:var(--green);" onclick="sendProposalWhatsApp(\'' + p.id + '\')">💬 WhatsApp</button>' : '') +
          (p.paymentLink ? '<a href="' + escHtml(p.paymentLink) + '" target="_blank" class="action-btn" style="border-color:rgba(0,188,212,.3);color:var(--cyan);text-decoration:none;">💳 Pay Link</a>' : '') +
          (p.status !== 'accepted' ? '<button class="action-btn success" onclick="updateProposalStatus(\'' + p.id + '\',\'accepted\')">✓ Accept</button>' : '') +
          '<button class="action-btn" onclick="openProposalDrawer(window._data.proposals.find(function(x){return x.id===\'' + p.id + '\'}),\'\')">Edit</button>' +
          '<button class="action-btn danger" onclick="deleteRecord(\'proposals\',\'' + p.id + '\')">Del</button>' +
        '</div>' +
      '</div>' +

    '</div>';
  }).join('');
}

function updateProposalStatus(id, status) {
  window._updateDoc('proposals', id, {status: status}).then(function() {
    toast('Proposal marked ' + status, 'success');
    window._loadAll().then(function() {
      if (status === 'accepted') {
        var prop = (window._data.proposals || []).find(function(p) { return p.id === id; });

          var pay = (window._data.payments || []).find(function(p) { return p.leadId === prop.leadId && p.status === 'paid'; });
          if (pay) autoWinLead(prop.leadId, pay);

    });

}

// ── Instalment breakdown live preview ─────────────────────────
function updateInstalmentsBreakdown() {
  var div = document.getElementById('prop-instal-breakdown');
  if (!div) return;
  var dur = (document.getElementById('prop-duration') || {}).value || '';
  var amt = parseFloat((document.getElementById('prop-amount') || {}).value) || 0;
  if (!dur || !amt) { div.style.display = 'none'; return; }
  var html = '';
  var sep = '<span style="color:var(--dimmer);margin:0 6px;">·</span>';
  if (dur.includes('2 instal') || dur.includes('50/50')) {
    var h = Math.round(amt / 2);
    html = '<div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;">Payment Breakdown</div>' +
      '<div style="display:flex;gap:20px;flex-wrap:wrap;">' +
        '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">1st payment:</span> <strong style="color:var(--white);">₦' + h.toLocaleString() + '</strong> <span style="color:var(--dimmer);font-size:.7rem;">(on signing)</span></div>' +
        '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">2nd payment:</span> <strong style="color:var(--white);">₦' + (amt - h).toLocaleString() + '</strong> <span style="color:var(--dimmer);font-size:.7rem;">(on delivery)</span></div>' +
      '</div>';
  } else if (dur.includes('3 month') || dur.includes('3 milestone') || dur.includes('× 3')) {
    var t = Math.round(amt / 3);
    html = '<div style="font-family:var(--mono);font-size:.58rem;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;">Payment Breakdown</div>' +
      '<div style="display:flex;gap:20px;flex-wrap:wrap;">' +
        '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">1st:</span> <strong style="color:var(--white);">₦' + t.toLocaleString() + '</strong></div>' +
        '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">2nd:</span> <strong style="color:var(--white);">₦' + t.toLocaleString() + '</strong></div>' +
        '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">3rd:</span> <strong style="color:var(--white);">₦' + (amt - t * 2).toLocaleString() + '</strong></div>' +
      '</div>';
  } else if (dur.toLowerCase().includes('milestone')) {
    html = '<div style="font-size:.78rem;color:var(--amber);">Milestone-based — define payment schedule in proposal body above.</div>';
  } else if (dur.toLowerCase().includes('month') || dur.toLowerCase().includes('retainer')) {
    html = '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">Monthly billing:</span> <strong style="color:var(--white);">₦' + amt.toLocaleString() + '/month</strong></div>';
  } else if (dur.toLowerCase().includes('annual') || dur.toLowerCase().includes('year')) {
    var monthly = Math.round(amt / 12);
    html = '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">Annual total:</span> <strong style="color:var(--white);">₦' + amt.toLocaleString() + '</strong>' + sep + '<span style="color:var(--dimmer);">≈ ₦' + monthly.toLocaleString() + '/month</span></div>';
  } else {
    html = '<div style="font-size:.8rem;"><span style="color:var(--dimmer);">Full payment on signing:</span> <strong style="color:var(--white);">₦' + amt.toLocaleString() + '</strong></div>';
  }
  if (html) { div.style.display = 'block'; div.innerHTML = html; }
  else div.style.display = 'none';
}

// ── Generate full proposal message text ───────────────────────
function generateProposalMessage(p) {
  var lead   = window._data ? (window._data.crm_leads || []).find(function(l) { return l.id === p.leadId; }) : null;
  var cn     = FW_CONFIG.companyName || 'TEKNNUKU Studio';
  var ce     = FW_CONFIG.companyEmail || 'hello@teknnuku.xyz';
  var cp     = FW_CONFIG.companyPhone || '';
  var line   = '═'.repeat(38);
  var subline= '─'.repeat(38);
  var dv     = parseFloat(p.amount) || 0;

  var paySection = '\n\n💰 PAYMENT DETAILS\n' + subline + '\n';
  paySection += '• Total Amount:    ₦' + dv.toLocaleString() + '\n';
  if (p.duration)         paySection += '• Payment Terms:   ' + p.duration + '\n';
  if (p.contractDuration) paySection += '• Contract Period: ' + p.contractDuration + '\n';
  if (p.validUntil)       paySection += '• Offer Valid Until: ' + new Date(p.validUntil).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) + '\n';

  // Instalment breakdown
  if (p.duration && p.duration.includes('50/50')) {
    var h = Math.round(dv / 2);
    paySection += '\nInstalment Schedule:\n  • Instalment 1: ₦' + h.toLocaleString() + ' (due on signing)\n  • Instalment 2: ₦' + (dv - h).toLocaleString() + ' (due on delivery)\n';
  } else if (p.duration && p.duration.includes('3')) {
    var t = Math.round(dv / 3);
    paySection += '\nInstalment Schedule:\n  • Payment 1: ₦' + t.toLocaleString() + '\n  • Payment 2: ₦' + t.toLocaleString() + '\n  • Payment 3: ₦' + (dv - t * 2).toLocaleString() + '\n';
  }

  var methods = p.paymentMethods || ['bank_transfer'];
  if (methods.indexOf('bank_transfer') !== -1 && p.bankAccountNumber) {
    paySection += '\n🏦 BANK TRANSFER\n';
    paySection += '   Bank: ' + (p.bankName || '') + '\n';
    paySection += '   Account Number: ' + (p.bankAccountNumber || '') + '\n';
    paySection += '   Account Name: ' + (p.bankAccountName || '') + '\n';
  }
  if ((methods.indexOf('card') !== -1 || methods.indexOf('ussd') !== -1) && p.paymentLink) {
    paySection += '\n💳 ONLINE PAYMENT\n';
    paySection += '   Payment Link: ' + p.paymentLink + '\n';
  } else if (p.paymentLink) {
    paySection += '\n💳 PAYMENT LINK: ' + p.paymentLink + '\n';
  }
  if (p.paymentNotes) {
    paySection += '\n📌 Important: ' + p.paymentNotes + '\n';
  }

  var msg = 'PROPOSAL FROM ' + cn.toUpperCase() + '\n' + line + '\n\n' +
    'Dear ' + (p.personName || 'Valued Client') + ',\n\n' +
    'Thank you for your interest in our services. Please find below our formal proposal:\n\n' +
    '📋 ' + (p.title || 'Service Proposal').toUpperCase() + '\n' + subline + '\n\n' +
    (p.body || '') +
    paySection +
    '\n\n✍️ TO ACCEPT THIS PROPOSAL\n' + subline + '\n' +
    'To accept this proposal:\n' +
    '1. Reply to confirm your acceptance\n' +
    '2. Proceed with the deposit payment to begin work\n' +
    '3. We will send you a formal invoice upon receipt\n\n' +
    '📞 QUESTIONS OR CLARIFICATIONS\n' + subline + '\n' +
    'Email: ' + ce + '\n' +
    (cp ? 'WhatsApp/Phone: ' + cp + '\n' : '') +
    '\nWe look forward to working with you.\n\n' +
    'Kind regards,\n' + cn + ' Team\n' + line;

  return msg;
}

// ── Send via Email ────────────────────────────────────────────
function sendProposalEmail(propId) {
  var p = (window._data.proposals || []).find(function(x) { return x.id === propId; });
  if (!p) { toast('Proposal not found', 'error'); return; }
  var msg     = generateProposalMessage(p);
  var subject = encodeURIComponent((p.title || 'Service Proposal') + ' — ' + (FW_CONFIG.companyName || 'TEKNNUKU Studio'));
  var body    = encodeURIComponent(msg);
  var email   = encodeURIComponent(p.personEmail || '');
  window.open('mailto:' + email + '?subject=' + subject + '&body=' + body, '_blank');
  if (p.status === 'draft') {
    window._updateDoc('proposals', propId, {status: 'sent'}).then(function() { window._loadAll(); });
    toast('Proposal marked as Sent ✓', 'success');
  }
}

// ── Send via WhatsApp ─────────────────────────────────────────
function sendProposalWhatsApp(propId) {
  var p = (window._data.proposals || []).find(function(x) { return x.id === propId; });
  if (!p) { toast('Proposal not found', 'error'); return; }
  var lead  = window._data ? (window._data.crm_leads || []).find(function(l) { return l.id === p.leadId; }) : null;
  var phone = p.personPhone || (lead ? lead.phone : '') || '';
  if (!phone) { toast('No phone number linked to this lead. Add a phone number via CRM.', 'error'); return; }
  var msg = generateProposalMessage(p);
  phone   = phone.replace(/\s+/g, '').replace(/[^0-9+]/g, '');
  if (phone.startsWith('0')) phone = '+234' + phone.slice(1);
  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
  if (p.status === 'draft') {
    window._updateDoc('proposals', propId, {status: 'sent'}).then(function() { window._loadAll(); });
    toast('Proposal sent via WhatsApp ✓', 'success');
  }
}

// ── Save then send ────────────────────────────────────────────
function saveAndSendProposalEmail() {
  var leadId = (document.getElementById('prop-lead') || {}).value || '';
  if (!leadId) { toast('Please select a recipient first', 'error'); return; }
  var title  = (document.getElementById('prop-title') || {}).value || '';
  var amount = parseFloat((document.getElementById('prop-amount') || {}).value) || 0;
  if (!title || !amount) { toast('Title and amount are required', 'error'); return; }

  var lead    = (window._data.crm_leads || []).find(function(l) { return l.id === leadId; });
  var methods = [];
  document.querySelectorAll('.prop-method-cb').forEach(function(cb) { if (cb.checked) methods.push(cb.value); });
  var data    = buildProposalData(leadId, lead, title, amount, methods);
  data.status = 'sent';

  // Capture editing ID before it's cleared
  var capturedEditId = _editingProposalId;
  var fn = capturedEditId
    ? window._updateDoc('proposals', capturedEditId, data)
    : window._saveDoc('proposals', data);

  fn.then(function(newId) {
    _editingProposalId = null;
    closeDrawer();
    window._loadAll().then(function() {
      var pid   = capturedEditId || newId;
      var saved = (window._data.proposals || []).find(function(p) {
        return p.id === pid || (p.leadId === leadId && p.title === title);
      });
      if (saved) sendProposalEmail(saved.id);
    });
  }).catch(function(e) { toast('Save failed: ' + (e.message || e), 'error'); });
}

// PAYMENTS
// ═══════════════════════════════════════
function applyPaymentFilters() {
  var fS = (document.getElementById('pf-status')  || {}).value || '';
  var fV = (document.getElementById('pf-venture') || {}).value || '';
  var fM = (document.getElementById('pf-method')  || {}).value || '';
  var fQ = ((document.getElementById('pf-search') || {}).value || '').toLowerCase().trim();
  var payments = window._data ? window._data.payments || [] : [];
  var filtered = payments.filter(function(p) {
    if (fS && p.status !== fS) return false;
    if (fV && p.ventureId !== fV) return false;
    if (fM && p.paymentMethod !== fM) return false;
    if (fQ && !((p.personName||'')+(p.personEmail||'')+(p.invoiceRef||'')+(p.fwRef||'')).toLowerCase().includes(fQ)) return false;
    return true;
  });
  renderPaymentsTable(filtered);
}

function renderPayments(payments) {
  renderPaymentsTable(payments);
  var totalPaid = 0, pendingV = 0, overdueV = 0, pendingC = 0, overdueC = 0, pipeline = 0;
  payments.forEach(function(p) {
    var amt = parseFloat(p.amount) || 0;
    if (p.status === 'paid')    totalPaid += amt;
    if (p.status === 'pending') { pendingV += amt; pendingC++; pipeline += amt; }
    if (p.status === 'partial') { pipeline += amt; }
    if (p.status === 'overdue') { overdueV += amt; overdueC++; }
  });
  setText('pay-total',        '₦' + totalPaid.toLocaleString());
  setText('pay-pending-val',  '₦' + pendingV.toLocaleString());
  setText('pay-pending-count', pendingC + ' payment' + (pendingC !== 1 ? 's' : ''));
  setText('pay-overdue-val',  '₦' + overdueV.toLocaleString());
  setText('pay-overdue-count', overdueC + ' payment' + (overdueC !== 1 ? 's' : ''));
  setText('pay-pipeline',     '₦' + pipeline.toLocaleString());
}

function renderPaymentsTable(payments) {
  var tbody = document.getElementById('payments-tbody'); if (!tbody) return;
  if (!payments || !payments.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">💰</div>No payments logged yet</div></td></tr>';
    return;
  }
  var invoices = window._data ? window._data.invoices || [] : [];
  var receipts = window._data ? window._data.receipts || [] : [];
  tbody.innerHTML = payments.map(function(p) {
    var v        = V_MAP[p.ventureId] || {};
    var svc      = TEKNNUKU_SERVICES.find(function(s){ return s.id === p.serviceId; });
    var hasInv   = invoices.some(function(i){ return i.paymentId === p.id; });
    var hasRct   = receipts.some(function(r){ return r.paymentId === p.id; });
    var linkedProp = window._data ? (window._data.proposals||[]).find(function(pr){ return pr.id === p.proposalId; }) : null;
    return '<tr>' +
      '<td><div style="font-weight:600;font-size:.82rem;">' + escHtml(p.personName || '—') + '</div>' +
        '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">' + escHtml(p.personEmail || '') + '</div></td>' +
      '<td style="font-size:.78rem;color:var(--dim);">' + escHtml(svc ? svc.label : (p.service || p.serviceId || '—')) + '</td>' +
      '<td><span class="venture-tag">' + escHtml(v.name || p.ventureId || '—') + '</span></td>' +
      '<td style="font-family:var(--mono);font-weight:700;color:var(--gold);">₦' + Number(p.amount || 0).toLocaleString() + '</td>' +
      '<td>' + statusBadge(p.status || 'pending') + (p.autoVerified ? '<div style="font-family:var(--mono);font-size:.5rem;color:var(--green);margin-top:2px;">⚡ FW Verified</div>' : '') + '</td>' +
      '<td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">' + escHtml(p.paymentMethod || '—') + '</td>' +
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">' + fmtDate(p.paidAt || p.createdAt) + '</td>' +
      '<td><div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">' + escHtml(p.invoiceRef || '—') + '</div>' +
        (p.fwRef ? '<div style="font-family:var(--mono);font-size:.54rem;color:var(--cyan);">FW: ' + escHtml(p.fwRef) + '</div>' : '') + '</td>' +
      '<td><div class="row-actions" style="flex-wrap:wrap;gap:4px;">' +
        '<button class="action-btn" onclick="openPaymentDrawer(window._data.payments.find(function(x){return x.id===\'' + p.id + '\'}),\'\',\'\')">Edit</button>' +
        (p.status !== 'paid' ? '<button class="action-btn success" onclick="markPaid(\'' + p.id + '\')">✓ Paid</button>' : '') +
        '<button class="action-btn" style="color:var(--gold);border-color:rgba(200,155,20,.3);" onclick="' + (hasInv ? 'openInvoiceFromPayment(\'' + p.id + '\')' : 'createAndOpenInvoice(\'' + p.id + '\')') + '">📄 ' + (hasInv ? 'Invoice' : 'Gen Invoice') + '</button>' +
        (p.status === 'paid' ? '<button class="action-btn" style="color:var(--cyan);border-color:rgba(0,188,212,.3);" onclick="' + (hasRct ? 'openReceiptFromPayment(\'' + p.id + '\')' : 'createAndOpenReceipt(\'' + p.id + '\')') + '">🧾 ' + (hasRct ? 'Receipt' : 'Gen Receipt') + '</button>' : '') +
        '<button class="action-btn danger" onclick="deleteRecord(\'payments\',\'' + p.id + '\')">Del</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function markPaid(id) {
  var invRef = generateDocNumber('INV', window._data ? window._data.invoices || [] : []);
  window._updateDoc('payments', id, {
    status:     'paid',
    paidAt:     new Date().toISOString().split('T')[0],
    invoiceRef: invRef
  }).then(function() {
    toast('Payment marked as paid ✓', 'success');
    window._loadAll().then(function() {
      var pay = (window._data.payments||[]).find(function(p){ return p.id === id; });
      if (pay) {
        reconcilePaymentWithFinance(pay, id);
        if (pay.proposalId) autoAcceptProposal(pay);
        if (pay.leadId)     autoWinLead(pay.leadId, pay);
        var hasInv = (window._data.invoices||[]).some(function(i){ return i.paymentId === id; });
        var hasRct = (window._data.receipts||[]).some(function(r){ return r.paymentId === id; });
        if (!hasInv) createAndSaveInvoice(pay, id);
        if (!hasRct) createAndSaveReceipt(pay, id);
      }

function reconcilePaymentWithFinance(pay, payId) {
  var fin = window._data ? window._data.financials || [] : [];
  var exists = fin.some(function(f){ return f.paymentId === payId; });
  if (exists) return;
  var v = V_MAP[pay.ventureId] || {};
  window._saveDoc('financials', {
    type:        'income',
    ventureId:   pay.ventureId || 'studio',
    amount:      parseFloat(pay.amount) || 0,
    category:    'Client Payment',
    description: (pay.service || pay.serviceId || 'Payment') + (pay.personName ? ' — ' + pay.personName : ''),
    date:        pay.paidAt || new Date().toISOString().split('T')[0],
    paymentId:   payId,
    leadId:      pay.leadId || '',
    invoiceRef:  pay.invoiceRef || '',
    autoCreated: true,
    createdAt:   new Date().toISOString()
  }).then(function() {
    toast('₦' + Number(pay.amount||0).toLocaleString() + ' auto-reconciled to Finance ✓', 'success');
  });
}

function autoAcceptProposal(pay) {
  if (!pay.proposalId) return;
  var prop = (window._data.proposals || []).find(function(p){ return p.id === pay.proposalId; });
  if (prop && prop.status !== 'accepted') {
    window._updateDoc('proposals', pay.proposalId, {status: 'accepted'}).then(function() {
      toast('Proposal auto-accepted ✓', 'success');
    });
  }
}

function createAndSaveInvoice(pay, payId) {
  var invoices = window._data ? window._data.invoices || [] : [];
  var existing = invoices.find(function(i){ return i.paymentId === payId; });
  if (existing) return Promise.resolve(existing.id);
  var invNum = generateDocNumber('INV', invoices);
  var v      = V_MAP[pay.ventureId] || {};
  var svc    = TEKNNUKU_SERVICES.find(function(s){ return s.id === pay.serviceId; });
  var now    = new Date().toISOString().split('T')[0];
  var due    = new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0];
  var data   = {
    invoiceNumber: invNum,
    paymentId:     payId,
    leadId:        pay.leadId     || '',
    proposalId:    pay.proposalId || '',
    ventureId:     pay.ventureId  || '',
    ventureName:   v.name         || '',
    clientName:    pay.personName  || '',
    clientEmail:   pay.personEmail || '',
    clientPhone:   pay.personPhone || '',
    businessName:  pay.businessName|| '',
    serviceId:     pay.serviceId   || '',
    serviceLabel:  svc ? svc.label : (pay.service || ''),
    amount:        parseFloat(pay.amount) || 0,
    status:        pay.status === 'paid' ? 'paid' : 'unpaid',
    issueDate:     now,
    dueDate:       due,
    paymentMethod: pay.paymentMethod || '',
    paymentMethods:(pay.paymentMethods || []),
    bankName:      FW_CONFIG.bankName      || '',
    bankAcctNum:   FW_CONFIG.accountNumber || '',
    bankAcctName:  FW_CONFIG.accountName   || '',
    paymentLink:   '',
    notes:         pay.notes || '',
    invoiceRef:    pay.invoiceRef || invNum,
    createdAt:     new Date().toISOString()
  };
  // try to pull payment link from linked proposal
  if (pay.proposalId && window._data) {
    var prop = (window._data.proposals||[]).find(function(p){ return p.id === pay.proposalId; });
    if (prop) {
      data.paymentLink   = prop.paymentLink || '';
      data.bankName      = prop.bankName         || data.bankName;
      data.bankAcctNum   = prop.bankAccountNumber|| data.bankAcctNum;
      data.bankAcctName  = prop.bankAccountName  || data.bankAcctName;
    }
  }
  return window._saveDoc('invoices', data).then(function(id) {
    window._loadAll();
    return id;
  });
}

function createAndSaveReceipt(pay, payId) {
  var receipts = window._data ? window._data.receipts || [] : [];
  var existing = receipts.find(function(r){ return r.paymentId === payId; });
  if (existing) return Promise.resolve(existing.id);
  var rctNum = generateDocNumber('RCT', receipts);
  var v   = V_MAP[pay.ventureId] || {};
  var svc = TEKNNUKU_SERVICES.find(function(s){ return s.id === pay.serviceId; });
  var inv = (window._data ? window._data.invoices||[] : []).find(function(i){ return i.paymentId === payId; });
  var data = {
    receiptNumber: rctNum,
    paymentId:     payId,
    invoiceId:     inv ? inv.id : '',
    invoiceNumber: inv ? inv.invoiceNumber : '',
    leadId:        pay.leadId      || '',
    proposalId:    pay.proposalId  || '',
    ventureId:     pay.ventureId   || '',
    ventureName:   v.name          || '',
    clientName:    pay.personName  || '',
    clientEmail:   pay.personEmail || '',
    clientPhone:   pay.personPhone || '',
    businessName:  pay.businessName|| '',
    serviceId:     pay.serviceId   || '',
    serviceLabel:  svc ? svc.label : (pay.service||''),
    amountPaid:    parseFloat(pay.amount) || 0,
    paymentMethod: pay.paymentMethod || '',
    paymentDate:   pay.paidAt || new Date().toISOString().split('T')[0],
    fwRef:         pay.fwRef || '',
    invoiceRef:    pay.invoiceRef || '',
    createdAt:     new Date().toISOString()
  };

function confirmFWPayment() {
  var fwRef   = (document.getElementById('fw-verify-ref')    || {}).value || '';
  var amount  = parseFloat((document.getElementById('fw-verify-amt') || {}).value) || 0;
  var clientV = (document.getElementById('fw-verify-client') || {}).value || '';
  var svcId   = (document.getElementById('fw-verify-svc')    || {}).value || '';
  if (!fwRef)    { toast('Flutterwave reference required', 'error'); return; }
  if (!amount)   { toast('Amount required', 'error'); return; }
  if (!clientV)  { toast('Select the client this payment is for', 'error'); return; }
  var info    = resolvePayClient(clientV);
  var svc     = TEKNNUKU_SERVICES.find(function(s){ return s.id === svcId; });
  var invRef  = generateDocNumber('INV', window._data ? window._data.invoices || [] : []);
  var data    = {
    clientRef:     clientV,
    personName:    info.name  || '',
    personEmail:   info.email || '',
    personPhone:   info.phone || '',
    leadId:        info.leadId    || '',
    ventureId:     info.ventureId || svc && svc.venture || 'studio',
    serviceId:     svcId,
    service:       svc ? svc.label : '',
    proposalId:    '',
    amount:        amount,
    status:        'paid',
    paidAt:        new Date().toISOString().split('T')[0],
    paymentMethods:['card'],
    paymentMethod: 'card',
    invoiceRef:    invRef,
    fwRef:         fwRef,
    autoVerified:  true,
    notes:         'Auto-created from FW verification · Ref: ' + fwRef
  };
  window._saveDoc('payments', data).then(function(newId) {
    toast('FW payment record created ✓', 'success');
    closeDrawer();
    window._loadAll().then(function() {
      var pay = (window._data.payments||[]).find(function(p){ return p.id === newId; });
      if (pay) {
        reconcilePaymentWithFinance(pay, newId);
        if (pay.leadId) autoWinLead(pay.leadId, pay);
        createAndSaveInvoice(pay, newId);
        createAndSaveReceipt(pay, newId);
      }
    });
  });
}

function buildAsnSubjectOptions(currentVal) {
  var d = window._data || {};
  var html = '<option value="">— Select person / client —</option>';

  // CRM pipeline leads
  var crm = d.crm_leads || [];
  if (crm.length) {
    html += '<optgroup label="── CRM Pipeline ──">';
    crm.forEach(function(l) {
      var v   = V_MAP[l.ventureId] || {};
      var SL  = {new_lead:'New Lead',contacted:'Contacted',qualified:'Qualified',proposal:'Proposal',won:'Won ✅',lost:'Lost'};
      var val = 'crm|' + l.id;
      html += '<option value="' + val + '"' + (currentVal === val ? ' selected' : '') + '>' +
        escHtml(l.name||'—') + ' — ' + escHtml(v.name||l.ventureId||'—') +
        ' [' + (SL[l.status]||l.status) + ']' +
      '</option>';
    });
    html += '</optgroup>';
  }

  // Active clients
  var clients = d.clients || [];
  if (clients.length) {
    html += '<optgroup label="── Clients ──">';
    clients.forEach(function(c) {
      var v   = V_MAP[c.ventureId] || {};
      var val = 'client|' + c.id;
      html += '<option value="' + val + '"' + (currentVal === val ? ' selected' : '') + '>' +
        escHtml(c.name||'—') + ' — ' + escHtml(v.name||'—') +
      '</option>';
    });
    html += '</optgroup>';
  }

  // Intake leads not yet in CRM
  var crmSrcIds = new Set(crm.map(function(l){ return l.sourceId; }).filter(Boolean));
  var intakes   = (d.leads||[]).filter(function(l){ return !crmSrcIds.has(l.id); });
  if (intakes.length) {
    html += '<optgroup label="── Intake Leads ──">';
    intakes.forEach(function(l) {
      var nm  = ((l.firstName||'')+' '+(l.lastName||'')).trim() || l.email || '—';
      var val = 'intake|' + l.id;
      html += '<option value="' + val + '"' + (currentVal === val ? ' selected' : '') + '>' +
        escHtml(nm) + ' — ' + escHtml(l.email||'') +
      '</option>';
    });
    html += '</optgroup>';
  }

  // Inquiries not yet in CRM
  var inquiries = (d.inquiries||[]).filter(function(i){ return !crmSrcIds.has(i.id); });
  if (inquiries.length) {
    html += '<optgroup label="── Service Inquiries ──">';
    inquiries.forEach(function(i) {
      var val = 'inquiry|' + i.id;
      html += '<option value="' + val + '"' + (currentVal === val ? ' selected' : '') + '>' +
        escHtml(i.name||'—') + ' — ' + escHtml(serviceLabel(i.service)) +
      '</option>';
    });
    html += '</optgroup>';
  }

  return html;
}

function resolveAsnSubject(val) {
  if (!val) return {};
  var parts = val.split('|'), type = parts[0], id = parts[1];
  var d = window._data || {};
  if (type === 'crm') {
    var l = (d.crm_leads||[]).find(function(x){ return x.id === id; });
    if (!l) return {};
    var v = V_MAP[l.ventureId] || {};
    return { name:l.name||'', email:l.email||'', phone:l.phone||'', business:l.businessName||'', venture:v.name||l.ventureId||'', ventureId:l.ventureId||'' };
  }
  if (type === 'client') {
    var c = (d.clients||[]).find(function(x){ return x.id === id; });
    if (!c) return {};
    var v = V_MAP[c.ventureId] || {};
    return { name:c.name||'', email:c.email||c.contact||'', phone:c.phone||'', business:c.businessName||'', venture:v.name||'', ventureId:c.ventureId||'' };
  }
  if (type === 'intake') {
    var l = (d.leads||[]).find(function(x){ return x.id === id; });
    if (!l) return {};
    return { name:((l.firstName||'')+' '+(l.lastName||'')).trim(), email:l.email||'', phone:l.phone||'', business:'', venture:'TEKNNUKU Studio', ventureId:'studio' };
  }
  if (type === 'inquiry') {
    var i = (d.inquiries||[]).find(function(x){ return x.id === id; });
    if (!i) return {};
    var vm={brand_launch:'studio',sales_system:'studio',systemization:'studio',platform_dev:'studio',web3_dev:'gata',gata_onboard:'gata',venture_build:'studio',enterprise_sw:'studio'};

    return { name:i.name||'', email:i.email||'', phone:i.phone||'', business:i.businessName||'', venture:(V_MAP[vId]||{}).name||'', ventureId:vId };
  }
  return {};
}

function renderAssignments(assignments) {
  // Populate assigned-to filter
  var asnFlt = document.getElementById('asf-assignedto');
  if (asnFlt) {
    var cur = asnFlt.value;
    asnFlt.innerHTML = buildAsnTeamFilterOptions(cur);
    if (cur) asnFlt.value = cur;
  }

  // Build member lookup
  var members = window._data ? window._data.team_members || [] : [];
  var memberMap = {};
  members.forEach(function(m){ memberMap[m.id] = m; });

  // KPIs — always from full list
  var total  = assignments.length;
  var active = assignments.filter(function(a){ return a.status === 'active' || a.status === 'in-progress'; }).length;
  var high   = assignments.filter(function(a){ return a.priority === 'high'; }).length;
  var done   = assignments.filter(function(a){ return a.status === 'completed'; }).length;
  setText('asn-kpi-total',  total);
  setText('asn-kpi-active', active);
  setText('asn-kpi-high',   high);
  setText('asn-kpi-done',   done);

  // Apply filters
  var f = _asnFilters;
  var filtered = assignments.filter(function(a) {
    if (f.status   && a.status   !== f.status)   return false;
    if (f.priority && a.priority !== f.priority) return false;
    if (f.venture  && a.ventureId !== f.venture) return false;
    if (f.assignedTo === '__unassigned__' && a.assignedTo) return false;
    if (f.assignedTo && f.assignedTo !== '__unassigned__' && a.assignedTo !== f.assignedTo) return false;
    if (f.search) {
      var hay = ((a.personName||'')+(a.personEmail||'')+(a.venture||'')+(a.notes||'')).toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    return true;
  });

  // Count label
  var lbl = document.getElementById('asn-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + total + ' assignment' + (total !== 1 ? 's' : '');

  var tbody = document.getElementById('assignments-tbody'); if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">' +
      '<div class="empty-icon">🗂️</div>' +
      '<div>No assignments match your filters</div>' +
      '<div style="margin-top:8px;"><button class="action-btn" onclick="clearAsnFilters()">Clear Filters</button></div>' +
    '</div></td></tr>';
    return;
  }

  var PRIORITY_STYLE = {
    high:   { badge:'badge-red',    icon:'🔥', label:'High'   },
    medium: { badge:'badge-amber',  icon:'🟡', label:'Medium' },
    low:    { badge:'badge-dim',    icon:'⚪', label:'Low'    }
  };

  tbody.innerHTML = filtered.map(function(a) {
    var assignee = a.assignedTo ? memberMap[a.assignedTo] : null;
    var v        = V_MAP[a.ventureId] || {};
    var pri      = PRIORITY_STYLE[a.priority] || PRIORITY_STYLE.low;
    var isOverdue = a.targetDate && new Date(a.targetDate) < new Date() && a.status !== 'completed';

    return '<tr>' +
      // Person
      '<td>' +
        '<div style="font-weight:600;font-size:.82rem;">' + escHtml(a.personName||'—') + '</div>' +
        (a.personEmail ? '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">' + escHtml(a.personEmail) + '</div>' : '') +
        (a.businessName ? '<div style="font-size:.68rem;color:var(--dimmer);">' + escHtml(a.businessName) + '</div>' : '') +
      '</td>' +
      // Venture
      '<td><span class="venture-tag">' + escHtml(v.name || a.venture || a.ventureId || '—') + '</span></td>' +
      // Assigned to
      '<td>' +
        (assignee
          ? '<div style="display:flex;align-items:center;gap:7px;">' +
              '<div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:9px;color:#080808;flex-shrink:0;">' +
                escHtml(initials(assignee.name||assignee.email||'?')) +
              '</div>' +
              '<div>' +
                '<div style="font-size:.78rem;font-weight:600;">' + escHtml(assignee.name||assignee.email||'—') + '</div>' +
                '<div style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);">' + escHtml(ROLE_LABELS[assignee.role]||assignee.role||'') + '</div>' +
              '</div>' +
            '</div>'
          : '<span style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">Unassigned</span>'
        ) +
      '</td>' +
      // Status
      '<td>' + statusBadge(a.status||'active') + '</td>' +
      // Priority
      '<td>' +
        '<span class="badge ' + pri.badge + '" style="font-size:.56rem;">' + pri.icon + ' ' + pri.label + '</span>' +
      '</td>' +
      // Target date
      '<td style="font-family:var(--mono);font-size:.62rem;color:' + (isOverdue ? 'var(--red)' : 'var(--dimmer)') + ';">' +
        (a.targetDate ? (isOverdue ? '⚠ ' : '') + fmtDate(a.targetDate) : '—') +
      '</td>' +
      // Assigned date
      '<td style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">' +
        fmtDate(a.assignedAt||a.createdAt) +
      '</td>' +
      // Actions
      '<td><div class="row-actions">' +
        '<button class="action-btn" onclick="openAssignmentDrawer(window._data.assignments.find(function(x){return x.id===\'' + a.id + '\'}))">Edit</button>' +
        (a.status !== 'completed' ? '<button class="action-btn success" onclick="markAssignmentDone(\'' + a.id + '\')">✓ Done</button>' : '') +
        '<button class="action-btn danger" onclick="deleteRecord(\'assignments\',\'' + a.id + '\')">Del</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function markAssignmentDone(id) {
  window._updateDoc('assignments', id, { status:'completed', completedAt:new Date().toISOString() })
    .then(function(){ toast('Assignment marked complete ✓','success'); window._loadAll(); })
    .catch(function(e){ toast('Update failed: '+(e.message||e),'error'); });
}

function savePayment() {
  var clientVal = (document.getElementById('pay-client-sel') || {}).value || '';
  if (!clientVal) { toast('Please select a client or lead', 'error'); return; }
  var amount = parseFloat((document.getElementById('pay-amount') || {}).value) || 0;
  if (!amount) { toast('Amount is required', 'error'); return; }

  var clientInfo = resolvePayClient(clientVal);
  var methods    = [];
  document.querySelectorAll('.pay-method-cb').forEach(function(cb) { if (cb.checked) methods.push(cb.value); });

  var invRef = (document.getElementById('pay-ref')    || {}).value || '';
  var status = (document.getElementById('pay-status') || {}).value || 'pending';
  if (!invRef && status === 'paid') {
    invRef = generateDocNumber('INV', window._data ? window._data.invoices || [] : []);
  }

  var data = {
    clientRef:     clientVal,
    personName:    clientInfo.name  || '',
    personEmail:   clientInfo.email || '',
    personPhone:   clientInfo.phone || '',
    businessName:  clientInfo.biz   || '',
    leadId:        clientInfo.leadId || '',
    ventureId:     (document.getElementById('pay-venture')       || {}).value || clientInfo.ventureId || '',
    serviceId:     (document.getElementById('pay-service-sel')   || {}).value || '',
    service:       (function(){ var s=TEKNNUKU_SERVICES.find(function(x){return x.id===((document.getElementById('pay-service-sel')||{}).value||'');}); return s?s.label:''; })(),
    proposalId:    (document.getElementById('pay-proposal-link') || {}).value || '',
    amount:        amount,
    status:        status,
    paidAt:        (document.getElementById('pay-date')    || {}).value || '',
    paymentMethods: methods,
    paymentMethod:  methods[0] || '',
    invoiceRef:     invRef,
    fwRef:          (document.getElementById('pay-fw-ref') || {}).value || '',
    notes:          (document.getElementById('pay-notes')  || {}).value || ''
  };

  var isNew = !_editingPaymentId;
  var fn = _editingPaymentId
    ? window._updateDoc('payments', _editingPaymentId, data)
    : window._saveDoc('payments', data);

  fn.then(function(newId) {
    var payId = _editingPaymentId || newId;
    toast('Payment saved ✓', 'success');
    closeDrawer();
    window._loadAll().then(function() {
      var pay = (window._data.payments||[]).find(function(p){ return p.id === payId; });
      if (pay && pay.status === 'paid') {
        reconcilePaymentWithFinance(pay, payId);
        if (pay.proposalId) autoAcceptProposal(pay);
        if (pay.leadId)     autoWinLead(pay.leadId, pay);
        if (isNew) createAndSaveInvoice(pay, payId);
        if (isNew) createAndSaveReceipt(pay, payId);
      }
    });
  }).catch(function(e) { toast('Save failed: ' + (e.message || e), 'error'); });
}

  _crmFilters.assigned = (document.getElementById('crm-sf-assigned') || {}).value || '';
  _crmFilters.source   = (document.getElementById('crm-sf-source')   || {}).value || '';
  _crmFilters.search   = ((document.getElementById('crm-sf-search')  || {}).value || '').toLowerCase().trim();
  renderCRM(window._data ? window._data.crm_leads || [] : []);
}

function renderCRM(list) {
  // Populate assigned filter dynamically
  var asel = document.getElementById('crm-sf-assigned');
  if (asel && window._data && window._data.team_members) {
    var cur = asel.value;
    var opts = '<option value="">All Assigned</option><option value="__unassigned__">Unassigned</option>';
    (window._data.team_members || []).forEach(function(m) {
      opts += '<option value="' + m.id + '"' + (cur === m.id ? ' selected' : '') + '>' + escHtml(m.name || m.email || '') + '</option>';
    });
    asel.innerHTML = opts;
    if (cur) asel.value = cur;
  }

  // Schedule auto-win check (non-blocking)
  setTimeout(function() { autoCheckWins(list); }, 80);

  // Apply filters
  var filtered = list.filter(function(l) {
    if (_crmFilters.status   && l.status !== _crmFilters.status) return false;
    if (_crmFilters.venture  && l.ventureId !== _crmFilters.venture) return false;
    if (_crmFilters.source   && l.sourceType !== _crmFilters.source) return false;
    if (_crmFilters.assigned === '__unassigned__' && l.assignedTo) return false;
    if (_crmFilters.assigned && _crmFilters.assigned !== '__unassigned__' && l.assignedTo !== _crmFilters.assigned) return false;
    if (!canAccessVentureData(l.ventureId)) return false;
    if (_crmFilters.search) {
      var hay = ((l.name||'')+(l.email||'')+(l.businessName||'')+(l.phone||'')+(l.assignedName||'')).toLowerCase();
      if (!hay.includes(_crmFilters.search)) return false;
    }
    return true;
  });

  // KPIs
  var newC = filtered.filter(function(l){return l.status==='new_lead';}).length;
  var hotC = filtered.filter(function(l){return l.status==='qualified'||l.status==='proposal';}).length;
  var wonC = filtered.filter(function(l){return l.status==='won';}).length;
  var pipeV= filtered.filter(function(l){return l.status!=='won'&&l.status!=='lost';})
              .reduce(function(s,l){return s+(parseFloat(l.dealValue)||0);},0);
  var elN=document.getElementById('crm-kpi-new');   if(elN)elN.textContent=newC;
  var elH=document.getElementById('crm-kpi-hot');   if(elH)elH.textContent=hotC;
  var elW=document.getElementById('crm-kpi-won');   if(elW)elW.textContent=wonC;
  var elV=document.getElementById('crm-kpi-value'); if(elV)elV.textContent='₦'+pipeV.toLocaleString();

  var board=document.getElementById('crm-board');if(!board)return;
  var COLS=[
    {k:'new_lead',  l:'New Lead',   dot:'var(--blue)',   color:'#3b82f6'},
    {k:'contacted', l:'Contacted',  dot:'var(--purple)', color:'#a855f7'},
    {k:'qualified', l:'Qualified',  dot:'var(--amber)',  color:'#f59e0b'},
    {k:'proposal',  l:'Proposal',   dot:'var(--gold)',   color:'#C89B14'},
    {k:'won',       l:'Won ✅',     dot:'var(--green)',  color:'#22c55e'},
    {k:'lost',      l:'Lost ❌',    dot:'var(--red)',    color:'#ef4444'}
  ];

  board.innerHTML = COLS.map(function(col) {
    var ct  = filtered.filter(function(l){return l.status===col.k;});
    var tot = ct.reduce(function(s,l){return s+(parseFloat(l.dealValue)||0);},0);
    var SRC = {intake:'badge-gold',inquiry:'badge-cyan',message:'badge-purple',direct:'badge-blue'};
    var SLB = {intake:'Intake',inquiry:'Inquiry',message:'Message',direct:'Direct'};

    return '<div class="kanban-col">' +
      '<div class="kanban-col-header">' +
        '<div class="kanban-col-title"><div class="col-dot" style="background:'+col.dot+'"></div>'+col.l+'</div>' +
        '<div style="display:flex;align-items:center;gap:5px;">' +
          (tot>0?'<span style="font-family:var(--mono);font-size:.5rem;color:var(--gold);">₦'+(tot>=1000000?(tot/1000000).toFixed(1)+'M':tot>=1000?Math.round(tot/1000)+'k':tot)+'</span>':'') +
          '<div class="col-count">'+ct.length+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="kanban-col-body">' +
      (ct.length ? ct.map(function(l) {
        var v   = V_MAP[l.ventureId]||{};
        var dv  = parseFloat(l.dealValue)||0;
        var tier= dv>=1000000?3:dv>=250000?2:1;
        var tc  = tier===3?'var(--red)':tier===2?'var(--amber)':'var(--green)';
        var ai  = (l.assignedName||'Unassigned').substring(0,2).replace(/[^A-Za-z]/g,'').toUpperCase()||'??';
        var hasPaid = crmLeadHasPaidPayment(l.id);
        return '<div class="kanban-item" onclick="openCRMLeadDrawer(\''+l.id+'\')">' +
          '<div class="kanban-item-title">'+escHtml(l.name||'—')+'</div>' +
          (l.businessName?'<div style="font-size:.67rem;color:var(--dimmer);margin-bottom:3px;">'+escHtml(l.businessName)+'</div>':'') +
          '<div style="font-size:.67rem;color:var(--dimmer);margin-bottom:6px;">'+escHtml(l.email||l.phone||'')+'</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">' +
            (l.ventureId?'<span class="venture-tag">'+escHtml(v.name||l.ventureId)+'</span>':'') +
            '<span class="badge '+(SRC[l.sourceType]||'badge-dim')+'" style="font-size:.5rem;">'+(SLB[l.sourceType]||'—')+'</span>' +
            '<span style="font-family:var(--mono);font-size:.5rem;color:'+tc+';background:rgba(255,255,255,.04);padding:2px 5px;border-radius:3px;border:1px solid rgba(255,255,255,.06);">T'+tier+'</span>' +
          '</div>' +
          (dv?'<div style="font-family:var(--mono);font-size:.62rem;color:var(--gold);margin-bottom:5px;">₦'+dv.toLocaleString()+'</div>':'') +
          '<div style="display:flex;align-items:center;justify-content:space-between;">' +
            '<div style="display:flex;align-items:center;gap:5px;">' +
              '<div style="width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:7px;color:#080808;flex-shrink:0;">'+ai+'</div>' +
              '<span style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);">'+escHtml((l.assignedName||'Unassigned').substring(0,15))+'</span>' +
            '</div>' +
            (hasPaid&&l.status!=='won'?'<span style="font-family:var(--mono);font-size:.52rem;color:var(--green);background:rgba(34,197,94,.1);padding:2px 6px;border-radius:3px;">💰 Paid</span>':'') +
          '</div>' +
        '</div>';
      }).join('') : '<div class="empty-state" style="padding:16px;font-size:.65rem;"><div style="font-size:1.2rem;margin-bottom:4px;">📭</div>Empty</div>') +
      '</div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  CRM — HELPERS
// ═══════════════════════════════════════════════════════════════
function crmLeadHasPaidPayment(leadId) {
  return (window._data.payments || []).some(function(p) {
    return p.leadId === leadId && p.status === 'paid';
  });
}

function crmLinkedProposal(leadId) {
  return (window._data.proposals || []).find(function(p) { return p.leadId === leadId; });
}

function crmLinkedPayment(leadId) {
  return (window._data.payments || []).find(function(p) { return p.leadId === leadId; });
}

function crmLinkedClient(leadId) {
  return (window._data.clients || []).find(function(c) { return c.leadId === leadId; });
}

// ── Auto-win check (runs after render, non-blocking) ──────────
async function autoCheckWins(list) {
  var payments = window._data.payments || [];
  var toWin = list.filter(function(l) {
    if (l.status !== 'proposal') return false;
    return payments.some(function(p) { return p.leadId === l.id && p.status === 'paid'; });
  });
  for (var i = 0; i < toWin.length; i++) {
    var l = toWin[i];
    var paid = payments.find(function(p) { return p.leadId === l.id && p.status === 'paid'; });
    if (paid) await autoWinLead(l.id, paid);
  }
}

async function autoWinLead(leadId, paidPayment) {
  if (_autoWinBusy.has(leadId)) return;
  _autoWinBusy.add(leadId);

  var l = (window._data.crm_leads || []).find(function(x) { return x.id === leadId; });
  if (!l || l.status === 'won') { _autoWinBusy.delete(leadId); return; }

  try {
    var linkedProp  = crmLinkedProposal(leadId);
    var linkedPay   = paidPayment;
    var v           = V_MAP[l.ventureId] || {};

    // Resolve service details from proposal
    var propSvcId   = linkedProp ? linkedProp.service || '' : '';
    var propSvcObj  = TEKNNUKU_SERVICES.find(function(s) { return s.id === propSvcId; });
    var packageLabel= linkedProp ? (linkedProp.title || (propSvcObj ? propSvcObj.label : '') || '') : '';
    var packageAmt  = linkedProp ? parseFloat(linkedProp.amount) || 0 : (parseFloat((linkedPay||{}).amount) || 0);
    var propDuration= linkedProp ? linkedProp.duration || '' : '';
    var propBody    = linkedProp ? linkedProp.body    || '' : '';
    var propMethods = linkedProp ? linkedProp.paymentMethods || [] : [];

    // 1. Move lead to Won
    await window._updateDoc('crm_leads', leadId, {
      status:    'won',
      wonAt:     new Date().toISOString(),
      paymentId: linkedPay ? linkedPay.id || '' : ''
    });

    // 2. Accept proposal
    if (linkedProp) {
      await window._updateDoc('proposals', linkedProp.id, { status: 'accepted' });
    }

    // 3. Create client if none exists
    var existingClient = crmLinkedClient(leadId);
    if (!existingClient) {
      await window._saveDoc('clients', {
        // Identity
        name:             l.name           || '',
        email:            l.email          || '',
        contact:          l.phone          || l.email || '',
        phone:            l.phone          || '',
        businessName:     l.businessName   || '',
        // Venture
        ventureId:        l.ventureId      || '',
        ventureName:      v.name           || '',
        // Package — pulled directly from proposal
        package:          packageLabel,
        serviceId:        propSvcId,
        serviceLabel:     propSvcObj ? propSvcObj.label : packageLabel,
        // Financial
        monthlyValue:     packageAmt,
        proposalAmount:   packageAmt,
        paymentDuration:  propDuration,
        paymentMethods:   propMethods,
        proposalScope:    propBody,
        // Status
        onboardingStatus: 'pending',
        paymentStatus:    'paid',
        status:           'active',
        // Links
        leadId:           leadId,
        proposalId:       linkedProp ? linkedProp.id  : '',
        paymentId:        linkedPay  ? linkedPay.id || '' : '',
        // CRM context
        intakeScore:      l.intakeScore     || 0,
        intakeTier:       l.intakeTier      || '',
        sourceType:       l.sourceType      || '',
        assignedName:     l.assignedName    || '',
        // Staff
        csManager:        '',
        onboardingNotes:  '',
        // Dates
        startDate:        new Date().toISOString().split('T')[0],
        wonAt:            new Date().toISOString(),
        createdAt:        new Date().toISOString()
      });
    }

    toast('🎉 Lead Won! Proposal accepted · Client record created.', 'success');
    await window._loadAll();
  } catch(e) {
    console.error('autoWinLead error:', e);
    toast('Error completing win: ' + (e.message || e), 'error');
  }
  _autoWinBusy.delete(leadId);
}
  
async function markLeadWon(leadId) {
  var paid = (window._data.payments || []).find(function(p) { return p.leadId === leadId && p.status === 'paid'; });
  if (!paid) {
    toast('Cannot mark Won — no verified paid payment linked to this lead','error');
    return;
  }
  closeDrawer();
  await autoWinLead(leadId, paid);
}

function moveCRMStatus(id, newStatus) {
  var upd = { status:newStatus };
  if (newStatus==='contacted') upd.contactedAt = new Date().toISOString();
  if (newStatus==='qualified') upd.qualifiedAt  = new Date().toISOString();
  if (newStatus==='lost')      upd.lostAt       = new Date().toISOString();
  window._updateDoc('crm_leads', id, upd).then(function() {
    toast('Lead → ' + newStatus.replace(/_/g,' '),'success');
    closeDrawer();
    window._loadAll();
  });
}
