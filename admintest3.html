function saveProposal() {
  var leadId = (document.getElementById('prop-lead') || {}).value || '';
  if (!leadId) { toast('Please select a recipient from the CRM Pipeline', 'error'); return; }
  var title  = (document.getElementById('prop-title') || {}).value || '';
  var amount = parseFloat((document.getElementById('prop-amount') || {}).value) || 0;
  if (!title)  { toast('Proposal title is required', 'error'); return; }
  if (!amount) { toast('Amount is required', 'error'); return; }

  var lead    = (window._data.crm_leads || []).find(function(l) { return l.id === leadId; });
  var methods = getCheckedProposalMethods();

  var existingProp = _editingProposalId ? (window._data.proposals||[]).find(function(x){return x.id===_editingProposalId;}) : null;
  var proposalRef   = existingProp && existingProp.proposalRef ? existingProp.proposalRef : generateDocNumber('PROP', window._data ? window._data.proposals||[] : []);

  var data = {
    leadId:            leadId,
    proposalRef:       proposalRef,
    personName:        lead ? lead.name || '' : '',
    personEmail:       lead ? lead.email || '' : '',
    personPhone:       lead ? lead.phone || '' : '',
    ventureId:         lead ? lead.ventureId || '' : '',
    title:             title,
    service:           (document.getElementById('prop-service')       || {}).value || '',
    amount:            amount,
    duration:          (document.getElementById('prop-duration')       || {}).value || '',
    contractDuration:  (document.getElementById('prop-contract-dur')   || {}).value || '',
    validUntil:        (document.getElementById('prop-valid')          || {}).value || '',
    pricingType:      (document.getElementById('prop-pricing-type') || {}).value || 'fixed',
    paymentStructure: (document.getElementById('prop-pay-structure')|| {}).value || 'one_time',
    renewalTerms:     (document.getElementById('prop-renewal')      || {}).value || '',
    deliverables:     getListItems('prop-deliv-item'),
    services:         window._propSelectedServices || [],
    body:              (document.getElementById('prop-body')           || {}).value || '',
    slaTerms:          (document.getElementById('prop-sla')            || {}).value || '',
    paymentMethods:    methods,
    bankName:          FW_CONFIG.bankName      || '',
    bankAccountNumber: FW_CONFIG.accountNumber || '',
    bankAccountName:   FW_CONFIG.accountName   || '',
    cryptoNetwork:     FW_CONFIG.cryptoNetwork || '',
    cryptoAddress:     FW_CONFIG.cryptoAddress || '',
    paymentLink:       window._propLastLink || (existingProp ? existingProp.paymentLink||'' : ''),
    paymentNotes:      (document.getElementById('prop-pay-notes')      || {}).value || '',
    status:            (document.getElementById('prop-status')         || {}).value || 'draft',
    sentAt:            new Date().toISOString()
  };

  var needsFWLink = (methods.indexOf('card')!==-1 || methods.indexOf('ussd')!==-1) && !data.paymentLink && FW_CONFIG.secretKey;

  var fn = _editingProposalId
    ? window._updateDoc('proposals', _editingProposalId, data)
    : window._saveDoc('proposals', data);

  fn.then(function(newId) {
    var savedId = _editingProposalId || newId;
    toast('Proposal saved ✓ (Ref: ' + proposalRef + ')', 'success');
    closeDrawer();
    window._loadAll().then(function() {
      if (needsFWLink && savedId) generateFWPaymentLink(savedId);
    });
  }).catch(function(e) { toast('Save failed: ' + (e.message || e), 'error'); });
}

function acceptProposalManual(propId) {
  var ref = (document.getElementById('prop-payref')||{}).value || '';
  if (!ref) { toast('Select a verified payment reference to accept this proposal','error'); return; }

  // Enforce uniqueness
  var clash = (window._data.proposals||[]).some(function(other){ return other.id!==propId && other.paymentRef===ref; });
  if (clash) { toast('That payment is already linked to another proposal','error'); return; }

  window._updateDoc('proposals', propId, { status:'accepted', paymentRef:ref, acceptedAt:new Date().toISOString() }).then(function(){
    toast('Proposal marked Accepted ✓','success');
    closeDrawer();
    window._loadAll().then(function(){
      var pay = (window._data.payments||[]).find(function(p){return p.id===ref;});
      var prop = (window._data.proposals||[]).find(function(p){return p.id===propId;});
      if (pay && prop && prop.leadId) {
        autoWinLead(prop.leadId, pay).then(function(){
          // Move accepted+paid proposal to "active" so it stops appearing as a linkable proposal
          window._updateDoc('proposals', propId, { status:'active' }).then(window._loadAll);
        });
      }
    });
  }).catch(function(e){ toast('Failed: '+(e.message||e),'error'); });
}

function declineProposalManual(propId) {
  if (!confirm('Mark this proposal as Declined? It will be auto-deleted in 30 days.')) return;
  window._updateDoc('proposals', propId, { status:'declined', declinedAt:new Date().toISOString() }).then(function(){
    toast('Proposal marked Declined','success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e){ toast('Failed: '+(e.message||e),'error'); });
}

async function savePayment() {
  var existing = _editingPaymentId ? (window._data.payments||[]).find(function(x){return x.id===_editingPaymentId;}) : null;
  if (existing && existing.status === 'paid') { toast('This payment is locked and cannot be edited', 'error'); return; }

  var status = (document.getElementById('pay-status') || {}).value || 'pending';
  var proofRef  = (document.getElementById('pay-proof-ref')  || {}).value || '';
  var proofLink = (document.getElementById('pay-proof-link') || {}).value || '';
  var proofFileInput  = document.getElementById('pay-proof-file');
  var hasNewProofFile = proofFileInput && proofFileInput.files && proofFileInput.files[0];

  if (status === 'paid') {
    var hasExistingProof = existing && (existing.proofRef || existing.proofLink || existing.proofFile);
    if (!proofRef.trim() && !proofLink.trim() && !hasNewProofFile && !hasExistingProof) {
      toast('Proof of payment is required to mark this as fully Paid (transaction ref, link, or uploaded file)', 'error');
      return;
    }
  }

  var proofFileData = null, proofFileName = '';
  if (hasNewProofFile) {
    var res = await readFileAsBase64(proofFileInput.files[0]);
    if (res.tooBig) { toast('Proof file too large (max 200KB) — use a link instead', 'error'); return; }
    proofFileData = res.data; proofFileName = res.name;
  }

  // ── EDITING AN EXISTING, NOT-YET-PAID PAYMENT — status-only update ──
  if (existing) {
    var upd = { status: status };
    var paidAtEl = document.getElementById('pay-date');
    if (status === 'paid') {
      upd.paidAt    = (paidAtEl && paidAtEl.value) || new Date().toISOString().split('T')[0];
      upd.proofRef  = proofRef  || existing.proofRef  || '';
      upd.proofLink = proofLink || existing.proofLink || '';
      if (proofFileData) { upd.proofFile = proofFileData; upd.proofFileName = proofFileName; }
    }
    var capturedId = _editingPaymentId;
    window._updateDoc('payments', capturedId, upd).then(function() {
      toast('Payment status updated ✓', 'success');
      closeDrawer();
      window._loadAll().then(function() {
        if (status === 'paid') {
          var pay = (window._data.payments||[]).find(function(p){ return p.id === capturedId; });
          if (pay) finalizePaidPayment(pay, capturedId);
        }
      });
    }).catch(function(e) { toast('Update failed: ' + (e.message || e), 'error'); });
    return;
  }

  // ── NEW PAYMENT ──
  var clientVal = (document.getElementById('pay-client-sel') || {}).value || '';
  if (!clientVal) { toast('Please select a client or lead', 'error'); return; }
  var amount = parseFloat((document.getElementById('pay-amount') || {}).value) || 0;
  if (!amount) { toast('Amount is required', 'error'); return; }

  var clientInfo = resolvePayClient(clientVal);
  var methods    = [];
  document.querySelectorAll('.pay-method-cb').forEach(function(cb) { if (cb.checked) methods.push(cb.value); });

  var linkedProposalId = (document.getElementById('pay-proposal-link') || {}).value || '';
  var linkedProposal    = linkedProposalId ? (window._data.proposals||[]).find(function(x){return x.id===linkedProposalId;}) : null;

  var data = {
    clientRef:     clientVal,
    personName:    clientInfo.name  || '',
    personEmail:   clientInfo.email || '',
    personPhone:   clientInfo.phone || '',
    businessName:  clientInfo.biz   || '',
    leadId:        clientInfo.leadId || '',
    ventureId:     (document.getElementById('pay-venture')       || {}).value || clientInfo.ventureId || '',
    serviceId:     (document.getElementById('pay-service-sel')   || {}).value || '',
    service:       (function(){ var s=TEKNNUKU_SERVICES.find(function(x){return x.id===((document.getElementById('pay-service-sel')||{}).value||'');}); return s?s.label:''; })(),
    proposalId:    linkedProposalId,
    proposalRef:   linkedProposal ? (linkedProposal.proposalRef || '') : '',
    amount:        amount,
    status:        status,
    paidAt:        (document.getElementById('pay-date') || {}).value || (status==='paid' ? new Date().toISOString().split('T')[0] : ''),
    paymentMethods: methods,
    paymentMethod:  methods[0] || '',
    fwRef:          (document.getElementById('pay-fw-ref') || {}).value || '',
    notes:          (document.getElementById('pay-notes')  || {}).value || ''
  };

  if (status === 'paid') {
    data.proofRef  = proofRef;
    data.proofLink = proofLink;
    if (proofFileData) { data.proofFile = proofFileData; data.proofFileName = proofFileName; }
  }

  window._saveDoc('payments', data).then(function(newId) {
    toast('Payment saved ✓', 'success');
    closeDrawer();
    window._loadAll().then(function() {
      if (status === 'paid') {
        var pay = (window._data.payments||[]).find(function(p){ return p.id === newId; });
        if (pay) finalizePaidPayment(pay, newId);
      }
    });
  }).catch(function(e) { toast('Save failed: ' + (e.message || e), 'error'); });
}

async function finalizePaidPayment(pay, payId) {
  reconcilePaymentWithFinance(pay, payId);
  if (typeof autoAcceptProposalsForPayment === 'function') autoAcceptProposalsForPayment(pay);
  else if (pay.proposalId && typeof autoAcceptProposal === 'function') autoAcceptProposal(pay);
  if (pay.leadId) autoWinLead(pay.leadId, pay);

  var existingRct = (window._data.receipts||[]).find(function(r){ return r.paymentId === payId; });
  if (!existingRct) {
    var rctId = await createAndSaveReceipt(pay, payId);
    await window._loadAll();
    var rct = (window._data.receipts||[]).find(function(r){ return r.id === rctId; });
    if (rct) {
      toast('🧾 Receipt ' + rct.receiptNumber + ' generated — ready to print, save as PDF, or email', 'success');
      openReceiptDrawer(rct.id);
    }
  }
}

function generateProposalFromQualification(leadId) {
  var l = (window._data.crm_leads||[]).find(function(x){return x.id===leadId;});

  var q = l.qualification;

  var svcIds = [];
  q.recommended_packages.forEach(function(pkg) {
    var svc = QUALIFIER_PROPOSAL_FALLBACK[pkg] || pkg;
    if (PROPOSAL_TEMPLATES[svc] && svcIds.indexOf(svc) === -1) svcIds.push(svc);
  });
  if (!svcIds.length) svcIds = ['sales_system'];
  // Cap at 3 services to keep proposals manageable
  svcIds = svcIds.slice(0, 3);

  closeDrawer();
  setTimeout(function(){
    openProposalDrawer(null, leadId);

      var bodyEl = document.getElementById('prop-body');

          '══════════════════════════════════════\n\n';
        bodyEl.value = pre + bodyEl.value;
      }
      toast('Proposal pre-filled from qualification ('+svcIds.length+' service'+(svcIds.length!==1?'s':'')+') ✓','success');
    }, 150);
    showPanel('proposals', document.querySelector('[data-panel="proposals"]'));
  }, 200);
}

function applyCRMQuickDate(val) {
  if (!val) return;
  var now = new Date(), fmt = function(d){ return d.toISOString().split('T')[0]; };
  var from = '', to = fmt(now);
  if (val==='today') { from = to; }
  else if (val==='yesterday') { var y=new Date(now); y.setDate(now.getDate()-1); from=to=fmt(y); }
  else if (val==='week') { var m=new Date(now); m.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1)); from=fmt(m); }
  else if (val==='lastweek') { var tm=new Date(now); tm.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1)); var lm=new Date(tm); lm.setDate(tm.getDate()-7); var ls=new Date(tm); ls.setDate(tm.getDate()-1); from=fmt(lm); to=fmt(ls); }
  else if (val==='month') { from=fmt(new Date(now.getFullYear(),now.getMonth(),1)); }
  else if (val==='lastmonth') { from=fmt(new Date(now.getFullYear(),now.getMonth()-1,1)); to=fmt(new Date(now.getFullYear(),now.getMonth(),0)); }
  else if (val==='year') { from=fmt(new Date(now.getFullYear(),0,1)); }
  else if (val==='lastyear') { from=fmt(new Date(now.getFullYear()-1,0,1)); to=fmt(new Date(now.getFullYear()-1,11,31)); }
  var fEl=document.getElementById('crm-sf-from'), tEl=document.getElementById('crm-sf-to');
  if (fEl) fEl.value=from; if (tEl) tEl.value=to;
  applyCRMFilters();
}

function crmLeadHasPaidPayment(leadId) {
  return (window._data.payments || []).some(function(p) {
    return p.leadId === leadId && p.status === 'paid';
  });
}

function crmLinkedProposal(leadId) {
  var props = (window._data.proposals || []).filter(function(p) { return p.leadId === leadId; });
  return props.find(function(p){ return p.status!=='active'; }) || props[0];
}

function recalcProposalPaymentStatuses() {
  var proposals = window._data.proposals || [];
  var payments  = window._data.payments  || [];
  var now       = new Date();

  proposals.forEach(function(p) {
    if (['draft'].indexOf(p.status) !== -1) return; // not sent yet, no status
    var linkedPayments = payments.filter(function(pay){
      return pay.status==='paid' && (pay.proposalId===p.id || pay.leadId===p.leadId);
    });
    var paidTotal = linkedPayments.reduce(function(s,pay){ return s+(parseFloat(pay.amount)||0); }, 0);
    var amount    = parseFloat(p.amount)||0;
    var newStatus;
    if (paidTotal >= amount && amount > 0)       newStatus = 'paid';
    else if (paidTotal > 0)                       newStatus = 'partial';
    else if (p.validUntil && new Date(p.validUntil) < now) newStatus = 'overdue';
    else                                           newStatus = 'pending';

    var updates = {};
    if (p.paymentStatus !== newStatus) updates.paymentStatus = newStatus;
    if (newStatus === 'paid' && p.status === 'sent') {
      updates.status     = 'accepted';
      updates.acceptedAt = new Date().toISOString();
      if (linkedPayments[0]) updates.paymentRef = linkedPayments[0].id;
    }
    if (Object.keys(updates).length) {
      window._updateDoc('proposals', p.id, updates);
    }
  });
}

function crmLinkedPayment(leadId) {
  return (window._data.payments || []).find(function(p) { return p.leadId === leadId; });
}

function crmLinkedClient(leadId) {
  return (window._data.clients || []).find(function(c) { return c.leadId === leadId; });
}

// ── Auto-win check (runs after render, non-blocking) ──────────
async function autoCheckWins(list) {
  var payments = window._data.payments || [];
  var proposals = window._data.proposals || [];
  var toWin = list.filter(function(l) {
    if (l.status === 'won') return false;
    var hasPaid = payments.some(function(p) { return p.leadId === l.id && p.status === 'paid'; });
    if (!hasPaid) return false;
    var prop = proposals.find(function(p){ return p.leadId === l.id; });
    return prop && prop.status === 'accepted';
  });
  for (var i = 0; i < toWin.length; i++) {
    var l = toWin[i];
    var paid = payments.find(function(p) { return p.leadId === l.id && p.status === 'paid'; });
    if (paid) await autoWinLead(l.id, paid);
  }
}
  
async function autoWinLead(leadId, paidPayment) {
  if (_autoWinBusy.has(leadId)) return;
  _autoWinBusy.add(leadId);

  var l = (window._data.crm_leads || []).find(function(x) { return x.id === leadId; });
  if (!l || l.status === 'won') { _autoWinBusy.delete(leadId); return; }

  try {
    var linkedProp  = crmLinkedProposal(leadId);
    var linkedPay   = paidPayment;
    var v           = V_MAP[l.ventureId] || {};

    // Resolve service details from proposal
    var propSvcId   = linkedProp ? linkedProp.service || '' : '';
    var propSvcObj  = TEKNNUKU_SERVICES.find(function(s) { return s.id === propSvcId; });
    var packageLabel= linkedProp ? (linkedProp.title || (propSvcObj ? propSvcObj.label : '') || '') : '';
    var packageAmt  = linkedProp ? parseFloat(linkedProp.amount) || 0 : (parseFloat((linkedPay||{}).amount) || 0);
    var propDuration= linkedProp ? linkedProp.duration || '' : '';
    var propBody    = linkedProp ? linkedProp.body    || '' : '';
    var propMethods = linkedProp ? linkedProp.paymentMethods || [] : [];

    // 1. Move lead to Won
    await window._updateDoc('crm_leads', leadId, {
      status:    'won',
      wonAt:     new Date().toISOString(),
      paymentId: linkedPay ? linkedPay.id || '' : ''
    });

    // 2. Accept proposal
    if (linkedProp) {
      await window._updateDoc('proposals', linkedProp.id, { status: 'accepted' });
    }

    // 3. Create client if none exists
    var existingClient = crmLinkedClient(leadId);
    if (!existingClient) {
      await window._saveDoc('clients', {
        // Identity
        name:             l.name           || '',
        email:            l.email          || '',
        contact:          l.phone          || l.email || '',
        phone:            l.phone          || '',
        businessName:     l.businessName   || '',
        // Venture
        ventureId:        l.ventureId      || '',
        ventureName:      v.name           || '',
        // Package — pulled directly from proposal
        package:          packageLabel,
        serviceId:        propSvcId,
        serviceLabel:     propSvcObj ? propSvcObj.label : packageLabel,
        // Financial
        monthlyValue:     packageAmt,
        proposalAmount:   packageAmt,
        paymentDuration:  propDuration,
        paymentMethods:   propMethods,
        proposalScope:    propBody,
        // Status
        onboardingStatus: 'pending',
        paymentStatus:    'paid',
        status:           'active',
        // Links
        leadId:           leadId,
        proposalId:       linkedProp ? linkedProp.id  : '',
        paymentId:        linkedPay  ? linkedPay.id || '' : '',
        // CRM context
        intakeScore:      l.intakeScore     || 0,
        intakeTier:       l.intakeTier      || '',
        sourceType:       l.sourceType      || '',
        assignedName:     l.assignedName    || '',
        // Staff
        csManager:        '',
        onboardingNotes:  '',
        // Dates
        startDate:        new Date().toISOString().split('T')[0],
        wonAt:            new Date().toISOString(),
        createdAt:        new Date().toISOString()
      });
    }

    toast('🎉 Lead Won! Proposal accepted · Client record created.', 'success');
    await window._loadAll();
  } catch(e) {
    console.error('autoWinLead error:', e);
    toast('Error completing win: ' + (e.message || e), 'error');
  }
  _autoWinBusy.delete(leadId);
}
  
async function markLeadWon(leadId) {
  var paid = (window._data.payments || []).find(function(p) { return p.leadId === leadId && p.status === 'paid'; });
  if (!paid) {
    toast('Cannot mark Won — no verified paid payment linked to this lead','error');
    return;
  }
  closeDrawer();
  await autoWinLead(leadId, paid);
}

  if (newStatus==='lost')      upd.lostAt       = new Date().toISOString();
  window._updateDoc('crm_leads', id, upd).then(function() {
    toast('Lead → ' + newStatus.replace(/_/g,' '),'success');
    closeDrawer();
    window._loadAll();

async function submitProposalAndMoveLead(leadId) {
  var l = (window._data.crm_leads||[]).find(function(x){return x.id===leadId;});
  if (!l) return;
  var title  = (document.getElementById('pl-title') ||{}).value||'';
  var amount = parseFloat((document.getElementById('pl-amount')||{}).value)||0;
  if (!title)  { toast('Proposal title is required','error'); return; }
  if (!amount) { toast('Amount is required','error'); return; }
  try {
    var propId = await window._saveDoc('proposals', {
      title:title,
      service:(document.getElementById('pl-service')||{}).value||'',
      personName:l.name||'', personEmail:l.email||'',
      amount:amount,
      validUntil:(document.getElementById('pl-valid')||{}).value||'',
      body:(document.getElementById('pl-body')||{}).value||'',
      status:'sent', leadId:leadId,
      sentAt:new Date().toISOString()
    });
    await window._updateDoc('crm_leads', leadId, {
      status:'proposal', proposalId:propId,
      proposalAt:new Date().toISOString(),
      dealValue:amount,
      dealTier:amount>=1000000?3:amount>=250000?2:1
    });
    toast('Proposal created and lead moved to Proposal ✓','success');
    closeDrawer();
    await window._loadAll();
  } catch(e) { toast('Error: '+(e.message||e),'error'); }
}

async function saveCommLog(entityType, entityId) {
  var type  = (document.getElementById('cl-type')  ||{}).value || 'note';
  var stage = (document.getElementById('cl-stage') ||{}).value || '';
  var body  = (document.getElementById('cl-body')  ||{}).value || '';
  var link  = (document.getElementById('cl-link')  ||{}).value || '';
  if (!body.trim() && !link.trim() && !((document.getElementById('cl-file')||{}).files||[]).length) {
    toast('Add a note, link, or file', 'error'); return;
  }

  var cu = window._currentUser;
  var members = window._data.team_members || [];
  var me = members.find(function(m){ return cu && (m.email||'').toLowerCase()===(cu.email||'').toLowerCase(); });

  var data = {
    entityType: entityType,
    entityId:   entityId,
    type:       type,
    stage:      stage,
    body:       body,
    link:       link,
    teamMemberId:   me ? me.id : '',
    teamMemberName: me ? (me.name||me.email||'') : (cu ? cu.email : 'Unknown'),
    createdAt:  new Date().toISOString()
  };

  var fileInput = document.getElementById('cl-file');
  if (fileInput && fileInput.files && fileInput.files[0]) {
    var res = await readFileAsBase64(fileInput.files[0]);
    if (res.tooBig) { toast('File too large (max 200KB) — use a link instead', 'error'); return; }
    data.fileData = res.data;
    data.fileName = res.name;
    data.fileType = fileInput.files[0].type;
  }

  window._saveDoc('comm_log', data).then(function(){
    toast('Entry logged ✓','success');
    window._loadAll().then(function(){
      var listEl = document.getElementById('comm-timeline-list');
      if (listEl) listEl.innerHTML = renderCommTimeline(entityType, entityId);
      ['cl-body','cl-link'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
      var fEl = document.getElementById('cl-file'); if (fEl) fEl.value='';
    });
  }).catch(function(e){ toast('Save failed: '+(e.message||e),'error'); });
}

function renderCommTimeline(entityType, entityId) {
  var logs = getCommLogs(entityType, entityId);
  if (!logs.length) return '<div class="empty-state" style="padding:20px;"><div class="empty-icon">🕐</div>No communication history yet</div>';

  return '<div style="display:flex;flex-direction:column;gap:0;">' +
    logs.map(function(c, i) {
      var cfg = COMM_TYPES[c.type] || COMM_TYPES.note;
      var d = tsToDate(c.createdAt);
      var dateStr = isNaN(d) ? '—' : d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      var timeStr = isNaN(d) ? '' : d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      var isLast = i === logs.length-1;

      var attach = '';
      if (c.fileData) {
        var isImg = (c.fileType||'').startsWith('image');
        var isAud = (c.fileType||'').startsWith('audio');
        var isVid = (c.fileType||'').startsWith('video');
        if (isImg) attach = '<img src="'+c.fileData+'" style="max-width:100%;border-radius:6px;margin-top:8px;border:1px solid var(--border);">';
        else if (isAud) attach = '<audio controls src="'+c.fileData+'" style="width:100%;margin-top:8px;"></audio>';
        else if (isVid) attach = '<video controls src="'+c.fileData+'" style="width:100%;max-height:200px;border-radius:6px;margin-top:8px;"></video>';
        else attach = '<a href="'+c.fileData+'" download="'+(c.fileName||'file')+'" style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(200,155,20,.08);border:1px solid rgba(200,155,20,.2);color:var(--gold);padding:6px 12px;border-radius:5px;text-decoration:none;font-family:var(--mono);font-size:.62rem;">📎 '+escHtml(c.fileName||'Download')+'</a>';
      }
      if (c.link) attach += '<div style="margin-top:8px;"><a href="'+escHtml(c.link)+'" target="_blank" style="font-family:var(--mono);font-size:.62rem;color:var(--cyan);word-break:break-all;">🔗 '+escHtml(c.link)+'</a></div>';

      return '<div style="display:flex;gap:12px;padding-bottom:'+(isLast?'0':'16')+'px;position:relative;">' +
        (!isLast ? '<div style="position:absolute;left:13px;top:28px;bottom:0;width:1px;background:var(--border);"></div>' : '') +
        '<div style="width:27px;height:27px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:1.5px solid '+cfg.color+';background:var(--bg);position:relative;z-index:1;">'+cfg.icon+'</div>' +
        '<div style="flex:1;">' +
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;">' +
            '<span style="font-family:var(--display);font-weight:700;font-size:.8rem;color:'+cfg.color+';">'+cfg.label+'</span>' +
            (c.stage ? '<span class="badge badge-dim" style="font-size:.5rem;">'+escHtml(c.stage.replace(/_/g,' '))+'</span>' : '') +
          '</div>' +
          '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);margin-bottom:5px;">'+escHtml(c.teamMemberName||'—')+' · '+dateStr+' · '+timeStr+'</div>' +
          (c.body ? '<div style="font-size:.8rem;color:var(--dim);line-height:1.6;white-space:pre-wrap;">'+escHtml(c.body)+'</div>' : '') +
          attach +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

function updateQualifierLevel(key) {
  var dim = QUALIFIER_DIMENSIONS.find(function(d){return d.key===key;});

  setText('ql-val-'+key, val);
  setText('ql-lbl-'+key, getDimensionLevel(dim, val).label);

function getQualifierScores() {

}

function saveQualification(leadId) {
  var scores = getQualifierScores();
  var total  = QUALIFIER_DIMENSIONS.reduce(function(s,d){ return s + scores[d.key]; },0);
  var tier   = getQualifierTier(total);
  var pkgs   = buildQualifierPackages(scores);
  var tags   = buildQualifierTags(scores);

  var qualification = {
    scores: scores,
    total_score: total,
    tier: tier.key,
    tierLabel: tier.label,
    recommended_packages: pkgs,
    crm_tags: tags,
    scoredAt: new Date().toISOString()
  };

  window._updateDoc('crm_leads', leadId, { qualification: qualification }).then(function() {
    toast('Qualification saved — ' + tier.label + ' (' + total + '/100) ✓', 'success');
    closeDrawer();
    window._loadAll().then(function(){ openCRMLeadDrawer(leadId); });
  }).catch(function(e){ toast('Save failed: '+(e.message||e),'error'); });
}

// ── Ventures ──────────────────────────────────────────────────
function renderVentures(dbVentures, tasks, crm_leads, clients, financials) {
  // Suppress seed ventures that have been deleted via Firestore tombstone
  var deletedIds = new Set(
    dbVentures.filter(function(v){ return v.deleted; }).map(function(v){ return v.id; })
  );

  // Merged list: seed ventures not overridden/deleted + all non-deleted DB ventures
  var allV = [
    ...VENTURES_SEED.filter(function(v){
      return !dbVentures.find(function(dv){ return dv.id === v.id; }) && !deletedIds.has(v.id);
    }),
    ...dbVentures.filter(function(v){ return !v.deleted; })
  ];

  // KPIs
  var elT = document.getElementById('ven-kpi-total');    if(elT) elT.textContent = allV.length;
  var elR = document.getElementById('ven-kpi-revenue');  if(elR) elR.textContent = allV.filter(function(v){ return (v.stage||'').toLowerCase()==='revenue'; }).length;
  var elB = document.getElementById('ven-kpi-building'); if(elB) elB.textContent = allV.filter(function(v){ return (v.stage||'').toLowerCase()==='building'; }).length;

  var grid = document.getElementById('ventures-grid'); if (!grid) return;

  // Build stat maps
  var finMap = {}, taskMap = {}, leadMap = {}, clientMap = {};
  financials.forEach(function(f) {
    if (!finMap[f.ventureId]) finMap[f.ventureId] = {i:0, e:0};
    if (f.type==='income') finMap[f.ventureId].i += parseFloat(f.amount)||0;
    else                   finMap[f.ventureId].e += parseFloat(f.amount)||0;
  });
  tasks.forEach(function(t) {
    if (!taskMap[t.ventureId]) taskMap[t.ventureId] = {tot:0, done:0};
    taskMap[t.ventureId].tot++;
    if (t.status==='done') taskMap[t.ventureId].done++;
  });
  crm_leads.forEach(function(l){ leadMap[l.ventureId]   = (leadMap[l.ventureId]||0)   + 1; });
  clients.forEach(function(c){   clientMap[c.ventureId] = (clientMap[c.ventureId]||0) + 1; });

  if (!allV.length) {
    grid.innerHTML = '<div class="empty-state" style="padding:48px;"><div class="empty-icon">🏢</div>No ventures in portfolio</div>';
    return;
  }

  var canEdit = canAccess('settings') || window._userRole === 'founder' || window._userRole === 'ops_lead';

  var STAGE_COLORS = {
    idea:'badge-dim', building:'badge-amber', revenue:'badge-green', scaling:'badge-cyan'
  };
  var STAGE_BORDER = {
    idea:'rgba(242,237,228,.1)', building:'rgba(245,158,11,.2)',
    revenue:'rgba(34,197,94,.2)', scaling:'rgba(0,188,212,.2)'
  };

  grid.innerHTML = allV.map(function(v) {
    var f       = finMap[v.id]  || {i:0, e:0};
    var tm      = taskMap[v.id] || {tot:0, done:0};
    var profit  = f.i - f.e;
    var clCount = clientMap[v.id] || 0;
    var taskPct = tm.tot > 0 ? Math.round((tm.done / tm.tot) * 100) : 0;
    // Composite health: 50% task completion, +30 if generating revenue, +20 if any active clients
    var h       = Math.min(100, Math.round(taskPct * 0.5 + (f.i > 0 ? 30 : 0) + (clCount > 0 ? 20 : 0)));
    var hc      = h >= 70 ? 'hf-green' : h >= 40 ? 'hf-yellow' : 'hf-red';
    var sc      = (v.stage||'idea').toLowerCase();
    var isDbV   = !!dbVentures.find(function(dv){ return dv.id === v.id && !dv.deleted; });
    var isSeed  = isSeedVenture(v.id);

    return '<div class="venture-card" style="border-color:' + (STAGE_BORDER[sc]||'rgba(200,155,20,.12)') + ';">' +

      // ── Header ─────────────────────────────────────────────
      '<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;">' +
        '<div style="width:40px;height:40px;border-radius:9px;background:' + escHtml(v.color||'var(--gold)') + ';display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:17px;color:#080808;flex-shrink:0;">' +
          escHtml((v.name||'?')[0]) +
        '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);">' + escHtml(v.name) + '</div>' +
          '<div style="font-size:.72rem;color:var(--dimmer);margin-top:2px;">' + escHtml(v.focus||'') + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">' +
          '<span class="badge ' + (STAGE_COLORS[sc]||'badge-dim') + '">' + escHtml(v.stage||'Idea') + '</span>' +
          (isSeed ? '<span style="font-family:var(--mono);font-size:.48rem;color:var(--dimmer);letter-spacing:.08em;">SEED</span>' : '') +
        '</div>' +
      '</div>' +

      // ── Venture link ─────────────────────────────────────────
      (v.url ? '<a href="' + escHtml(v.url) + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid rgba(200,155,20,.25);border-radius:5px;padding:6px 12px;margin-bottom:12px;transition:all .15s;" onmouseover="this.style.background=\'rgba(200,155,20,.08)\'" onmouseout="this.style.background=\'transparent\'">🔗 Visit Platform →</a>'
        : '<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);margin-bottom:12px;">No link added yet</div>') +

      // ── Stats grid ──────────────────────────────────────────
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;text-align:center;">' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Leads</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--gold);">' + (leadMap[v.id]||0) + '</div>' +

          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Clients</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--cyan);">' + (clientMap[v.id]||0) + '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Revenue</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.82rem;color:var(--green);">₦' + (f.i >= 1000000 ? (f.i/1000000).toFixed(1)+'M' : f.i >= 1000 ? Math.round(f.i/1000)+'k' : f.i.toLocaleString()) + '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Net</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.82rem;color:' + (profit>=0?'var(--gold)':'var(--red)') + ';">' + (profit<0?'−':'') + '₦' + (Math.abs(profit) >= 1000000 ? (Math.abs(profit)/1000000).toFixed(1)+'M' : Math.abs(profit) >= 1000 ? Math.round(Math.abs(profit)/1000)+'k' : Math.abs(profit).toLocaleString()) + '</div>' +
        '</div>' +
      '</div>' +

      // ── Health bar ──────────────────────────────────────────
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:' + (canEdit ? '12' : '0') + 'px;">' +
        '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);width:52px;">Health</div>' +
        '<div class="health-bar" style="flex:1;margin:0;"><div class="health-fill ' + hc + '" style="width:' + h + '%;"></div></div>' +
        '<span style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);min-width:30px;text-align:right;">' + h + '%</span>' +
      '</div>' +

      // ── Edit / Delete ───────────────────────────────────────
      (canEdit ?
        '<div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid rgba(200,155,20,.08);">' +
          '<button class="action-btn" style="flex:1;justify-content:center;" onclick="openEditVenture(\'' + v.id + '\')">' +
            '✏ Edit' + (isSeed && !isDbV ? ' Stage' : '') +
          '</button>' +
          '<button class="action-btn danger" style="flex:1;justify-content:center;" onclick="deleteVenture(\'' + v.id + '\')">' +
            '🗑 Remove' +
          '</button>' +
        '</div>'
        : '') +

    '</div>';
  }).join('');
}

function saveVenture(id) {
  var name    = (document.getElementById('ven-name')  ||{}).value||'';
  var focus   = (document.getElementById('ven-focus') ||{}).value||'';
  var url     = (document.getElementById('ven-url')   ||{}).value||'';
  var stageEl = document.querySelector('input[name="ven-stage-r"]:checked');
  var stage   = stageEl ? stageEl.value : 'Idea';

  if (!name.trim()) { toast('Venture name is required', 'error'); return; }

  var isNew  = !id;
  var seed   = id ? isSeedVenture(id) : false;
  var dbV    = id ? (window._data ? window._data.ventures||[] : []).find(function(v){ return v.id===id && !v.deleted; }) : null;

  // Preserve colour and segment from seed definition when saving to Firestore
  var seedV  = seed ? VENTURES_SEED.find(function(v){ return v.id === id; }) : null;
  var data   = {
    name:    name.trim(),
    focus:   focus.trim(),
    url:     url.trim(),
    stage:   stage,
    color:   (dbV && dbV.color)   || (seedV && seedV.color)   || 'linear-gradient(135deg,var(--gold),var(--goldL))',
    segment: (dbV && dbV.segment) || (seedV && seedV.segment) || 'type1'
  };
  
  var fn;
  if (isNew) {
    // Brand-new venture → auto-generated Firestore ID
    fn = window._saveDoc('ventures', data);
  } else {
    // Seed venture (first save) or existing DB venture with known ID → setDoc preserves/creates the doc
    fn = window._setDoc('ventures', id, data);
  }

  fn.then(function() {
    toast('Venture saved ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e) { toast('Save failed: ' + (e.message||e), 'error'); });
}

// Determine whether the current user can see a given task
// Non-privileged roles only see tasks assigned to them or unassigned tasks
// on ventures relevant to their role
function taskVisibleToUser(task) {
  var role = window._userRole;
  // Founder and ops lead see everything
  if (role === 'founder' || role === 'ops_lead') return true;

  var cu = window._currentUser;
  if (!cu) return false;

  var d  = window._data || {};
  var me = (d.team_members||[]).find(function(m){
    return (m.email||'').toLowerCase() === (cu.email||'').toLowerCase();
  });

  // Determine which ventures this role is responsible for
  // Use the TEAM_FOR_ROLE map — Delivery team sees all ventures by default
  var deliveryRoles = ['tech_product_lead','developer','onboarding_specialist'];
  var salesRoles    = ['sales_manager','inbound_closer','outbound_closer'];
  var contentRoles  = ['content_lead','content_creator','outreach_lead_gen'];

  // If task is assigned to me specifically — always visible
  if (me && task.assignedTo === me.id) return true;

  // Unassigned tasks visible to Delivery roles on any venture
  if (!task.assignedTo && deliveryRoles.indexOf(role) !== -1) return true;

  // Sales roles see tasks on ventures they're assigned to (no venture restriction)
  if (salesRoles.indexOf(role) !== -1) return true;

  // Content roles see tasks on any venture
  if (contentRoles.indexOf(role) !== -1) return true;

  // CS Manager: sees tasks on their assigned clients' ventures
  if (role === 'customer_success_manager') {
    var myClients = (d.clients||[]).filter(function(c){ return c.csManager === (me && me.id); });
    var myVentures = new Set(myClients.map(function(c){ return c.ventureId; }));
    if (myVentures.has(task.ventureId)) return true;
  }

  // Admin/Finance: no task visibility beyond assigned
  return false;
}

  var members = window._data ? window._data.team_members || [] : [];
  var opts = '<option value="">All Members</option>' +

  members.forEach(function(m) {

      escHtml(m.name||m.email||'—') + ' · ' + escHtml(ROLE_LABELS[m.role]||m.role||'') +

  return opts;
}
  
function renderTasks(tasks, members) {
  // Rebuild member filter dropdown
  var mfEl = document.getElementById('tf-member');
  if (mfEl) {
    var cur = mfEl.value;
    mfEl.innerHTML = buildTaskMemberOptions(cur);
    if (cur) mfEl.value = cur;
  }

  var memberMap = {};
  members.forEach(function(m){ memberMap[m.id] = m; });

  var today = new Date(); today.setHours(0,0,0,0);

  // Step 1: apply role-based visibility
  var visible = tasks.filter(function(t){ return taskVisibleToUser(t); });

  // Step 2: apply active filters
  var f = _taskFilters;
  var filtered = visible.filter(function(t) {
    if (f.venture && t.ventureId !== f.venture) return false;
    if (f.status  && t.status    !== f.status)  return false;
    if (f.member === '__unassigned__' && t.assignedTo) return false;
    if (f.member && f.member !== '__unassigned__' && t.assignedTo !== f.member) return false;
    if (f.search && !(t.title||'').toLowerCase().includes(f.search)) return false;
    return true;
  });

  // KPIs — from role-scoped visible set (not filtered)
  var total   = visible.length;
  var wip     = visible.filter(function(t){ return t.status==='in_progress'; }).length;
  var overdue = visible.filter(function(t){ return t.status!=='done' && t.deadline && new Date(t.deadline) < today; }).length;
  var done    = visible.filter(function(t){ return t.status==='done'; }).length;
  setText('task-kpi-total',   total);
  setText('task-kpi-wip',     wip);
  setText('task-kpi-overdue', overdue);
  setText('task-kpi-done',    done);

  // Count label reflects filtered set
  var lbl = document.getElementById('task-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + total + ' task' + (total!==1?'s':'');

  var board = document.getElementById('tasks-board'); if (!board) return;

  var COLS = [
    { k:'todo',        l:'To Do',       dot:'var(--dimmer)', accent:'rgba(242,237,228,.06)' },
    { k:'in_progress', l:'In Progress', dot:'var(--gold)',   accent:'rgba(200,155,20,.06)'  },
    { k:'review',      l:'Review',      dot:'var(--amber)',  accent:'rgba(245,158,11,.06)'  },
    { k:'done',        l:'Done ✅',     dot:'var(--green)',  accent:'rgba(34,197,94,.06)'   }
  ];

  // If a specific status is filtered, show only that column
  var colsToShow = f.status ? COLS.filter(function(c){ return c.k === f.status; }) : COLS;
  var colStyle   = f.status
    ? 'grid-template-columns:1fr;max-width:420px;'
    : 'grid-template-columns:repeat(4,1fr);';
  board.style.cssText = 'display:grid;gap:12px;' + colStyle + 'overflow-x:auto;padding-bottom:8px;';

  board.innerHTML = colsToShow.map(function(col) {
    var ct = filtered.filter(function(t){ return t.status === col.k; });

    return '<div class="kanban-col">' +
      '<div class="kanban-col-header" style="background:' + col.accent + ';">' +
        '<div class="kanban-col-title">' +
          '<div class="col-dot" style="background:' + col.dot + '"></div>' + col.l +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          (ct.length ? '<span style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);">' +
            ct.reduce(function(s,t){ return s + (t.priority==='high'?1:0); },0) + ' 🔥' +
          '</span>' : '') +
          '<div class="col-count">' + ct.length + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="kanban-col-body">' +
      (ct.length
        ? ct.map(function(t) {
            var v        = V_MAP[t.ventureId] || {};
            var od       = t.deadline && new Date(t.deadline) < today && t.status !== 'done';
            var assignee = t.assignedTo ? memberMap[t.assignedTo] : null;
            var PRI_STYLE = {
              high:   'color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);',
              medium: 'color:var(--amber);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);',
              low:    'color:var(--dimmer);background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.06);'
            };
            var priStyle = PRI_STYLE[t.priority||'low'];

            return '<div class="kanban-item" onclick="openTaskDrawer(\'' + t.id + '\')" style="' +
              (od ? 'border-color:rgba(239,68,68,.3);' : '') + '">' +

              // Priority pill
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">' +
                '<span style="font-family:var(--mono);font-size:.5rem;letter-spacing:.06em;padding:2px 7px;border-radius:3px;' + priStyle + '">' +
                  (t.priority==='high'?'🔥 HIGH':t.priority==='medium'?'🟡 MED':'⚪ LOW') +
                '</span>' +
                (od ? '<span style="font-family:var(--mono);font-size:.5rem;color:var(--red);">OVERDUE</span>' : '') +
              '</div>' +

              // Title
              '<div class="kanban-item-title" style="margin-bottom:7px;">' + escHtml(t.title||'—') + '</div>' +

              // Tags
              (t.ventureId
                ? '<div style="margin-bottom:7px;"><span class="venture-tag">' + escHtml(v.name||t.ventureId) + '</span></div>'
                : '') +

              // Deadline
              (t.deadline
                ? '<div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.58rem;color:' + (od?'var(--red)':'var(--dimmer)') + ';margin-bottom:6px;">' +
                    (od ? '⚠' : '📅') + ' ' + fmtDate(t.deadline) +

              // Assignee footer
              '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid rgba(200,155,20,.06);">' +
                (assignee

                        escHtml(initials(assignee.name||assignee.email||'?')) +
                      '</div>' +
                      '<span style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
                        escHtml((assignee.name||assignee.email||'').split(' ')[0]) +
                      '</span>' +
                    '</div>'
                  : '<span style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);">Unassigned</span>'
                ) +
                '<span style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);">' + timeAgo(t.createdAt) + '</span>' +
              '</div>' +

            '</div>';
          }).join('')
        : '<div class="empty-state" style="padding:18px;font-size:.62rem;">' +
            '<div style="font-size:1.1rem;margin-bottom:4px;">📋</div>Empty' +
          '</div>'
      ) +
      '</div></div>';
  }).join('');
}

function applyClientFilters() {
  var fQ  = ((document.getElementById('cl-f-search')    ||{}).value||'').toLowerCase().trim();
  var fP  = (document.getElementById('cl-f-payment')    ||{}).value||'';
  var fO  = (document.getElementById('cl-f-onboarding') ||{}).value||'';
  var fV  = (document.getElementById('cl-f-venture')    ||{}).value||'';
  var fS  = (document.getElementById('cl-f-status')     ||{}).value||'';
  var clients = window._data ? window._data.clients || [] : [];

  var filtered = clients.filter(function(c) {
    if (fS && c.status !== fS) return false;
    if (fP && c.paymentStatus   !== fP) return false;
    if (fO && c.onboardingStatus!== fO) return false;
    if (fV && c.ventureId       !== fV) return false;
    if (fQ) {
      var hay = ((c.name||'')+(c.email||'')+(c.businessName||'')+(c.phone||'')+(c.contact||'')).toLowerCase();
      if (!hay.includes(fQ)) return false;
    }
    return true;
  });

  renderClientsTable(filtered, window._data ? window._data.team_members || [] : []);
  var lbl = document.getElementById('cl-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + clients.length + ' client' + (clients.length !== 1 ? 's' : '');
}

function renderClients(clients, members) {
  // KPIs
  clients = scopeRecords(clients, 'clients');
  var active    = clients.filter(function(c){ return c.status !== 'churned'; }).length;
  var pending   = clients.filter(function(c){ return c.onboardingStatus === 'pending'; }).length;
  var onboarded = clients.filter(function(c){ return c.onboardingStatus === 'complete'; }).length;
  var mrr       = clients.filter(function(c){ return c.status !== 'churned'; })
                         .reduce(function(s,c){ return s + (parseFloat(c.monthlyValue)||0); }, 0);
  setText('cl-kpi-active',    active);
  setText('cl-kpi-pending',   pending);
  setText('cl-kpi-onboarded', onboarded);
  setText('cl-kpi-mrr',       '₦' + mrr.toLocaleString());

  var lbl = document.getElementById('cl-count-label');
  if (lbl) lbl.textContent = clients.length + ' client' + (clients.length !== 1 ? 's' : '');

  renderClientsTable(clients, members);
}

function renderClientsTable(clients, members) {
 // Venture-based data restriction
  clients = clients.filter(function(c){ return canAccessVentureData(c.ventureId); });
  var tbody = document.getElementById('clients-tbody'); if (!tbody) return;

  if (!clients.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">' +
      '<div class="empty-icon">🤝</div>' +
      '<div>No clients yet.</div>' +
      '<div style="font-size:.7rem;margin-top:6px;color:var(--dimmer);">Clients are created automatically when a CRM lead is marked Won ✅</div>' +
    '</div></td></tr>';
    return;
  }

  var memberMap = {};
  (members || []).forEach(function(m) { memberMap[m.id] = m; });

  var OB_COLORS = {
    pending:     'var(--red)',
    in_progress: 'var(--amber)',
    complete:    'var(--green)'
  };
  var OB_LABELS = {
    pending:     '⏳ Pending',
    in_progress: '🔄 In Progress',
    complete:    '✅ Complete'
  };

  // Sort: pending onboarding first, then by wonAt desc
  var sorted = clients.slice().sort(function(a, b) {
    if (a.onboardingStatus === 'pending' && b.onboardingStatus !== 'pending') return -1;
    if (b.onboardingStatus === 'pending' && a.onboardingStatus !== 'pending') return  1;
    return new Date(b.wonAt||b.createdAt||0) - new Date(a.wonAt||a.createdAt||0);
  });

  tbody.innerHTML = sorted.map(function(c) {
    var v        = V_MAP[c.ventureId] || {};
    var cs       = memberMap[c.csManager];
    var obColor  = OB_COLORS[c.onboardingStatus] || 'var(--dimmer)';
    var obLabel  = OB_LABELS[c.onboardingStatus] || escHtml(c.onboardingStatus || 'pending');
    var payBadge = statusBadge(c.paymentStatus || 'pending');
    var amt      = parseFloat(c.monthlyValue) || parseFloat(c.proposalAmount) || 0;

    return '<tr>' +
      // Client
      '<td><div style="font-weight:600;font-size:.82rem;">' + escHtml(c.name || '—') + '</div>' +
        (c.businessName ? '<div style="font-size:.7rem;color:var(--dimmer);">' + escHtml(c.businessName) + '</div>' : '') +
        '<div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">' + escHtml(c.email || c.contact || '') + '</div>' +
      '</td>' +
      // Package
      '<td>' +
        '<div style="font-size:.78rem;color:var(--white);">' + escHtml(c.package || c.serviceLabel || '—') + '</div>' +
        (c.serviceId ? '<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">' + escHtml(c.serviceId) + '</div>' : '') +
        (c.paymentDuration ? '<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">' + escHtml(c.paymentDuration) + '</div>' : '') +
      '</td>' +
      // Venture
      '<td><span class="venture-tag">' + escHtml(v.name || c.ventureId || '—') + '</span></td>' +
      // Contract value
      '<td style="font-family:var(--mono);font-weight:700;color:var(--gold);">' + (amt ? '₦' + amt.toLocaleString() : '—') + '</td>' +
      // Payment
      '<td>' + payBadge + '</td>' +
      // Onboarding
      '<td>' +
        '<div style="font-family:var(--mono);font-size:.62rem;color:' + obColor + ';">' + obLabel + '</div>' +
        '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px;width:80px;">' +
          '<div style="width:' + (c.onboardingStatus==='complete'?'100':c.onboardingStatus==='in_progress'?'50':'8') + '%;height:100%;background:' + obColor + ';border-radius:2px;transition:width .5s;"></div>' +
        '</div>' +
      '</td>' +
      // CS Manager
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">' + escHtml(cs ? cs.name || cs.email : '—') + '</td>' +
      // Won date
      '<td style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">' + fmtDate(c.wonAt || c.startDate || c.createdAt) + '</td>' +
      // Actions
      '<td><div class="row-actions">' +
        '<button class="action-btn" onclick="openClientDrawer(\'' + c.id + '\')">Manage</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

'</div>' +

// ── Client update — status, onboarding, CS manager only ───────
function saveClientUpdate(id) {
  var data = {
    onboardingStatus: (document.getElementById('cl-u-ob')       || {}).value || 'pending',
    onboardingNotes:  (document.getElementById('cl-u-ob-notes') || {}).value || '',
    csManager:        (document.getElementById('cl-u-cs')        || {}).value || '',
    paymentStatus:    (document.getElementById('cl-u-pay')       || {}).value || 'pending',
    status:           (document.getElementById('cl-u-st')        || {}).value || 'active'
  };
  window._updateDoc('clients', id, data).then(function() {
    toast('Client updated ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e) { toast('Update failed: ' + (e.message || e), 'error'); });
}

  function renderFinance(financials, clients) {
  // ── All-time stats (always full dataset, never filtered) ───
  var allFin = window._data ? window._data.financials || [] : [];
  var allPay = window._data ? window._data.payments   || [] : [];
  var totRev = 0, totExp = 0;
  allFin.forEach(function(f){ var a=parseFloat(f.amount)||0; if(f.type==='income')totRev+=a; else totExp+=a; });
  var net    = totRev - totExp;
  var margin = totRev > 0 ? Math.round((net/totRev)*100) : 0;
  var pendAmt= 0, overdAmt= 0;
  allPay.forEach(function(p){ var a=parseFloat(p.amount)||0; if(p.status==='pending')pendAmt+=a; if(p.status==='overdue')overdAmt+=a; });

  setText('fin-stat-rev',      '₦' + totRev.toLocaleString());
  setText('fin-stat-exp',      '₦' + totExp.toLocaleString());
  setText('fin-stat-profit',   (net<0?'−':'') + '₦' + Math.abs(net).toLocaleString());
  setText('fin-stat-margin',   margin + '% net margin');
  setText('fin-stat-liability','₦' + (pendAmt + overdAmt).toLocaleString());
  setText('fin-stat-liability-meta', '₦'+pendAmt.toLocaleString()+' pending · ₦'+overdAmt.toLocaleString()+' overdue');
  var pc = document.getElementById('fin-profit-card');
  if (pc) pc.className = 'kpi-card ' + (net >= 0 ? 'green' : 'red');

  // ── Per-venture P&L ───────────────────────────────────────
  if (!_vplCollapsed) {
    var vd = {};
    VENTURES_SEED.forEach(function(v){ vd[v.id]={name:v.name,i:0,e:0}; });
    allFin.forEach(function(f){
      if (!vd[f.ventureId]) vd[f.ventureId]={name:f.ventureId||'Other',i:0,e:0};
      if (f.type==='income') vd[f.ventureId].i+=parseFloat(f.amount)||0;
      else vd[f.ventureId].e+=parseFloat(f.amount)||0;
    });
    var plEl = document.getElementById('fin-venture-pl');
    var plData = Object.values(vd).filter(function(v){return v.i||v.e;});
    if (plEl) {
      if (!plData.length) {
        plEl.innerHTML = '<div class="empty-state" style="padding:20px;"><div class="empty-icon">📊</div>No financial records yet</div>';
      } else {
        plEl.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;">' +
          plData.map(function(v) {
            var np = v.i - v.e, col = np>=0?'var(--green)':'var(--red)';
            var share = totRev>0?Math.min(Math.round(v.i/totRev*100),100):0;
            return '<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;">' +
              '<div style="font-family:var(--display);font-weight:700;font-size:.84rem;margin-bottom:10px;">' + escHtml(v.name) + '</div>' +
              '<div class="fin-row"><span class="fin-row-label">Revenue</span><span class="fin-income">₦'+v.i.toLocaleString()+'</span></div>' +
              '<div class="fin-row"><span class="fin-row-label">Expenses</span><span class="fin-expense">₦'+v.e.toLocaleString()+'</span></div>' +
              '<div class="fin-row" style="border-top:1px solid rgba(200,155,20,.08);margin-top:5px;padding-top:7px;">' +
                '<span style="font-weight:600;color:var(--white);font-size:.82rem;">Net</span>' +
                '<span style="font-family:var(--mono);font-weight:700;color:'+col+';">'+(np<0?'−':'')+'₦'+Math.abs(np).toLocaleString()+'</span>' +
              '</div>' +
              '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px;">' +
                '<div style="width:'+share+'%;height:100%;background:var(--gold);border-radius:2px;"></div>' +
              '</div>' +
              '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);margin-top:3px;">'+share+'% of total revenue</div>' +
            '</div>';
          }).join('') +
        '</div>';
      }
    }
  }

  // ── Apply filters to transactions ─────────────────────────
  var filtered = allFin.filter(function(f) {
    if (!canAccessVentureData(f.ventureId)) return false;
    if (_finFilters.type     && f.type       !== _finFilters.type)     return false;
    if (_finFilters.venture  && f.ventureId  !== _finFilters.venture)  return false;
   if (_finFilters.category && f.category      !== _finFilters.category) return false;
    if (_finFilters.method   && f.paymentMethod !== _finFilters.method)   return false;
    if (_finFilters.search) {
      var hay = ((f.description||'')+(f.category||'')+(f.invoiceRef||'')+(f.finRef||'')+(f.notes||'')).toLowerCase();
      if (!hay.includes(_finFilters.search)) return false;
    }
    if (_finFilters.from) {
      var fd = (f.date || f.createdAt || '').substring(0,10);
      if (fd && fd < _finFilters.from) return false;
    }
    if (_finFilters.to) {
      var td = (f.date || f.createdAt || '').substring(0,10);
      if (td && td > _finFilters.to) return false;
    }
    return true;
  });

  filtered.sort(function(a,b){
    return ((b.date||b.createdAt||'').substring(0,10)).localeCompare((a.date||a.createdAt||'').substring(0,10));
  });

  var countEl = document.getElementById('fin-tx-count');
  if (countEl) countEl.textContent = filtered.length + ' transaction' + (filtered.length!==1?'s':'');

  var tbody = document.getElementById('finance-tbody'); if (!tbody) return;
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">💰</div>No transactions match your filters</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(f) {
    var v       = V_MAP[f.ventureId] || {name: f.ventureId||'—'};
    var isInc   = f.type === 'income';
    var amt     = parseFloat(f.amount)||0;
    var isAuto  = f.autoCreated || f.paymentId;
    var hasDoc  = f.invoiceFile||f.invoiceUrl||f.receiptFile||f.receiptUrl||f.externalLink;
    return '<tr>' +
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);white-space:nowrap;">' + fmtDate(f.date||f.createdAt) + '</td>' +
      '<td><span class="venture-tag">' + escHtml(v.name) + '</span></td>' +
      '<td><span class="badge '+(isInc?'badge-green':'badge-red')+'">' + escHtml((f.type||'').toUpperCase()) + '</span></td>' +
      '<td style="font-size:.74rem;color:var(--dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(f.category||'—') + '</td>' +
      '<td style="font-size:.78rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(f.description||'—') + '</td>' +
      '<td style="font-family:var(--mono);font-weight:700;color:'+(isInc?'var(--green)':'var(--red)')+';white-space:nowrap;">' + (isInc?'+':'−') + '₦' + amt.toLocaleString() + '</td>' +
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">' + escHtml((f.paymentMethod||'').replace(/_/g,' ')||'—') + '</td>' +
      '<td>' +
    (f.finRef?'<div style="font-family:var(--mono);font-size:.62rem;color:var(--gold);">'+escHtml(f.finRef)+'</div>':'') +
    (f.invoiceRef?'<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">'+escHtml(f.invoiceRef)+'</div>':'') +
    (isAuto?'<span class="badge badge-cyan" style="font-size:.5rem;">⚡ Auto</span>':'') +
    (f.locked?'<span class="badge badge-dim" style="font-size:.48rem;">🔒</span>':'') +
  '</td>' +
      '<td>' +
        (hasDoc?'<button class="action-btn" style="font-size:.58rem;" onclick="viewTxAttachments(\''+f.id+'\')">📎 Docs</button>':'<span style="color:var(--dimmer);font-size:.7rem;">—</span>') +
      '</td>' +
     '<td><div class="row-actions">' +
    (f.locked
      ? (window._userRole==='founder'
          ? '<button class="action-btn danger" onclick="deleteRecord(\'financials\',\''+f.id+'\')">🗑 Del</button>'
          : '<span class="badge badge-dim" style="font-size:.5rem;">🔒 Locked</span>')

        (window._userRole==='founder'

          : '<button class="action-btn danger" onclick="requestFinDeletion(\''+f.id+'\')">Del</button>')) +
  '</div></td>' +
    '</tr>';
  }).join('');
}

async function saveTransaction() {
  var type  = (document.getElementById('tx-type') ||{}).value||'';
  var vId   = (document.getElementById('tx-v')    ||{}).value||'';
  var amt   = parseFloat((document.getElementById('tx-amt')||{}).value)||0;
  var date  = (document.getElementById('tx-date') ||{}).value||'';
  if (!type||!vId||!amt||!date) { toast('Type, venture, amount and date are required','error'); return; }

  var data = {
    type:          type,
    ventureId:     vId,
    category:      (document.getElementById('tx-cat')   ||{}).value||'',
    amount:        amt,
    date:          date,
    paymentMethod: (document.getElementById('tx-method')||{}).value||'',
    description:   (document.getElementById('tx-desc')  ||{}).value||'',
    invoiceRef:    (document.getElementById('tx-ref')   ||{}).value||'',
    externalLink:  (document.getElementById('tx-link')  ||{}).value||'',
    invoiceUrl:    (document.getElementById('tx-inv-url')||{}).value||'',
    receiptUrl:    (document.getElementById('tx-rct-url')||{}).value||'',
    notes:         (document.getElementById('tx-notes') ||{}).value||''
  };

  // Preserve existing stored file if not replaced
  var keepInv = document.getElementById('tx-inv-keep');
  var keepRct = document.getElementById('tx-rct-keep');
  if (keepInv && keepInv.value==='1') {
    var fd=document.getElementById('tx-inv-file-data'), fn=document.getElementById('tx-inv-file-name');
    if (fd&&fd.value) { data.invoiceFile=fd.value; data.invoiceFileName=fn?fn.value:''; }
  }
  if (keepRct && keepRct.value==='1') {
    var rd=document.getElementById('tx-rct-file-data'), rn=document.getElementById('tx-rct-file-name');
    if (rd&&rd.value) { data.receiptFile=rd.value; data.receiptFileName=rn?rn.value:''; }
  }

  // Invoice file upload
  var invInput = document.getElementById('tx-inv-file');
  if (invInput && invInput.files && invInput.files[0]) {
    var invRes = await readFileAsBase64(invInput.files[0]);
    if (invRes.tooBig) { toast('Invoice file too large (max 200KB) — paste a link instead','error'); return; }
    data.invoiceFile = invRes.data; data.invoiceFileName = invRes.name;
    delete data.invoiceUrl;
  }

  // Receipt file upload
  var rctInput = document.getElementById('tx-rct-file');
  if (rctInput && rctInput.files && rctInput.files[0]) {
    var rctRes = await readFileAsBase64(rctInput.files[0]);
    if (rctRes.tooBig) { toast('Receipt file too large (max 200KB) — paste a link instead','error'); return; }
    data.receiptFile = rctRes.data; data.receiptFileName = rctRes.name;
    delete data.receiptUrl;
  }

  var btn = document.getElementById('tx-save-btn');
  if (btn) { btn.textContent='Saving…'; btn.disabled=true; }

 // ── Receipt requirement for income entries ─────────────────
var isInc = data.type === 'income';
var hasReceipt = data.receiptFile || data.receiptUrl ||
(document.getElementById('tx-rct-file') && document.getElementById('tx-rct-file').files && document.getElementById('tx-rct-file').files[0]) ||
(document.getElementById('tx-rct-keep') && document.getElementById('tx-rct-keep').value === '1') ||
data.invoiceFile || data.invoiceUrl ||
data.externalLink || data.paymentId ||
((document.getElementById('tx-pay-link')||{}).value);
if (isInc && !hasReceipt) {
toast('Income entries require a receipt or proof document before saving — upload a file, paste a link, or link to a verified payment', 'error');
if (btn) { btn.textContent='💾 Save Transaction'; btn.disabled=false; }
return;
}

  // ── Auto-generate Finance Reference Number ─────────────────
var existingFin = window._data ? window._data.financials||[] : [];
var finRef = (_editingTxId ? (existingFin.find(function(f){return f.id===_editingTxId;})||{}).finRef : null)
|| generateDocNumber('FIN', existingFin);
data.finRef = finRef;

  // ── Link payment if selected ───────────────────────────────
var linkedPayId = (document.getElementById('tx-pay-link')||{}).value || '';
if (linkedPayId) data.paymentId = linkedPayId;

  // ── Lock record ────────────────────────────────────────────
if (!_editingTxId) {
data.locked       = true;
data.lockedAt     = new Date().toISOString();
data.lockedBy     = window._currentUser ? window._currentUser.email : 'system';
data.lockedByRole = window._userRole || 'unknown';
}

  var fn = _editingTxId
? window._updateDoc('financials', _editingTxId, data)
: window._saveDoc('financials', data);

fn.then(function() {
toast('Transaction saved ✓ · Ref: ' + finRef, 'success');
closeDrawer();
window._loadAll();
}).catch(function(e) {
toast('Save failed: '+(e.message||e), 'error');
if (btn) { btn.textContent='💾 Save Transaction'; btn.disabled=false; }
});
}

function requestFinDeletion(id) {
if (!confirm('Request deletion of this finance entry? The founder must approve before it is removed.')) return;
var cu = window._currentUser;
var me = (window._data.team_members||[]).find(function(m){ return cu && (m.email||'').toLowerCase()===(cu.email||'').toLowerCase(); });
window._updateDoc('financials', id, {
deletionRequested: true,
deletionRequestedBy: me ? me.id : (cu?cu.email:''),
deletionRequestedByName: me ? (me.name||me.email) : (cu?cu.email:'Unknown'),
deletionRequestedAt: new Date().toISOString()
}).then(function(){ toast('Deletion requested — awaiting founder approval ✓','success'); window._loadAll(); })
.catch(function(e){ toast('Request failed: '+(e.message||e),'error'); });
}

      '<a href="'+escHtml(f.receiptUrl)+'" target="_blank" style="font-family:var(--mono);font-size:.7rem;color:var(--cyan);word-break:break-all;">'+escHtml(f.receiptUrl)+'</a></div>';
  }
  if (f.externalLink) {

    html += '<div><div style="font-family:var(--mono);font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);margin-bottom:7px;">🔗 External Link</div>' +

  openDrawer('Attachments', escHtml(f.description||'Transaction'), html);

function submitDailyReport(){
  var role=window._userRole||'developer';
  var tmpl=REPORT_TEMPLATES[role]||{fields:[{id:'done',type:'textarea'},{id:'undone',type:'textarea'},{id:'blockers',type:'textarea'},{id:'plan',type:'textarea'}]};
  var data={};
  tmpl.fields.forEach(function(f){var el=document.getElementById('rpt-f-'+f.id);if(el)data[f.id]=f.type==='number'?parseFloat(el.value)||0:el.value.trim();});
  var date=document.getElementById('rpt-date').value;var summary=document.getElementById('rpt-summary').value.trim();
  var tm=window._data&&window._data.team_members?window._data.team_members.find(function(m){return window._currentUser&&(m.email||'').toLowerCase()===(window._currentUser.email||'').toLowerCase();}):null;
  window._saveDoc('daily_reports',{userId:window._currentUser?window._currentUser.uid:'',userName:tm?tm.name:window._currentUser?window._currentUser.email:'',role:role,reportType:role,date:date,data:data,summary:summary,submittedAt:new Date().toISOString()})
    .then(function(){
      toast('Daily report submitted ✓','success');
      tmpl.fields.forEach(function(f){var el=document.getElementById('rpt-f-'+f.id);if(el)el.value='';});
      var sumEl=document.getElementById('rpt-summary');if(sumEl)sumEl.value='';
      window._loadAll();
    }).catch(function(e){toast('Submit failed: '+(e.message||e),'error');});
}
function renderReports(list){
  list = scopeRecords(list, 'reports');
  var el=document.getElementById('reports-list');if(!el)return;
  var role=window._userRole||'developer';
  var isLeader=(role==='founder'||role==='ops_lead');
  var roleFilter=document.getElementById('rpt-role-filter')?document.getElementById('rpt-role-filter').value:'';
  var uid=window._currentUser?window._currentUser.uid:'';
  var filtered=isLeader?list:list.filter(function(r){return r.userId===uid;});
  if(roleFilter)filtered=filtered.filter(function(r){return r.reportType===roleFilter;});
  filtered=filtered.slice().sort(function(a,b){return new Date(b.submittedAt||0)-new Date(a.submittedAt||0);});
  if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>No reports yet</div>';return;}
  el.innerHTML='<div class="table-wrap"><div class="table-toolbar"><div class="table-toolbar-title">daily_reports</div></div><div class="table-scroll"><table><thead><tr>' +
    (isLeader?'<th>Member</th>':'') +
    '<th>Date</th><th>Role</th><th>Summary</th><th>Submitted</th><th>Actions</th></tr></thead><tbody>' +
    filtered.slice(0,40).map(function(r){
      return '<tr>' +
        (isLeader?'<td style="font-weight:600;font-size:.82rem;">'+escHtml(r.userName||'—')+'</td>':'') +
        '<td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">'+fmtDate(r.date)+'</td>' +
        '<td><span class="badge badge-cyan" style="font-size:.52rem;">'+escHtml((r.reportType||'report').replace(/_/g,' '))+'</span></td>' +
        '<td style="font-size:.78rem;color:var(--dim);">'+escHtml((r.summary||'—').substring(0,60))+'</td>' +
        '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+fmtTime(r.submittedAt)+'</td>' +
        '<td><button class="action-btn" onclick="viewReport(\''+r.id+'\')">View</button></td>' +
      '</tr>';
    }).join('') +
  '</tbody></table></div></div>';
}
function viewReport(id){
  var r=(window._data.daily_reports||[]).find(function(x){return x.id===id;});if(!r)return;
  var entries=Object.entries(r.data||{}).filter(function(e){return e[1]!==undefined&&e[1]!==0&&e[1]!=='';});
  var html='<div class="detail-section"><div class="detail-grid">' +
    '<div class="detail-item"><div class="detail-label">Member</div><div class="detail-val">'+escHtml(r.userName||'—')+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Date</div><div class="detail-val">'+fmtDate(r.date)+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Role</div><div class="detail-val gold">'+escHtml((r.reportType||'').replace(/_/g,' '))+'</div></div>' +
    '<div class="detail-item"><div class="detail-label">Submitted</div><div class="detail-val">'+fmtTime(r.submittedAt)+'</div></div>' +
    '</div>' +
    (r.summary?'<div style="margin-top:10px;padding:10px 14px;background:rgba(200,155,20,.06);border:1px solid rgba(200,155,20,.18);border-radius:6px;font-family:var(--mono);font-size:.7rem;color:var(--gold);">'+escHtml(r.summary)+'</div>':'') +
    '</div>' +
    '<div class="detail-section"><h4>Report Data</h4><div style="display:flex;flex-direction:column;gap:8px;">' +
    entries.map(function(e){var isNum=typeof e[1]==='number';return'<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(200,155,20,.05);">' +
      '<div style="font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;color:var(--dimmer);text-transform:uppercase;min-width:140px;flex-shrink:0;padding-top:2px;">'+escHtml(e[0].replace(/([A-Z])/g,' $1').trim())+'</div>' +
      '<div style="font-size:.82rem;color:var(--white);'+(isNum?'font-family:var(--mono);font-weight:600;color:var(--gold);':'')+'">'+escHtml(String(e[1]))+'</div>' +
    '</div>';}).join('') +
    '</div></div>' +
    '<div class="btn-row"><button class="action-btn danger" onclick="deleteRecord(\'daily_reports\',\''+r.id+'\');closeDrawer();">Delete</button></div>';
  openDrawer('Daily Report',escHtml(r.userName||'Report'),html);
}

function filterTable(tbodyId,query){var q=query.toLowerCase();document.querySelectorAll('#'+tbodyId+' tr[data-search]').forEach(function(row){row.style.display=!q||row.dataset.search.includes(q)?'':'none';});}
function filterByTier(tier){document.querySelectorAll('#leads-tbody tr[data-tier]').forEach(function(row){row.style.display=!tier||row.dataset.tier===tier?'':'none';});}
function filterInquiryByService(svc){document.querySelectorAll('#inquiries-tbody tr[data-service]').forEach(function(row){row.style.display=!svc||row.dataset.service===svc?'':'none';});}
function filterPaymentsByStatus(status){document.querySelectorAll('#payments-tbody tr[data-status]').forEach(function(row){row.style.display=!status||row.dataset.status===status?'':'none';});}
function filterAssignmentsByVenture(venture){document.querySelectorAll('#assignments-tbody tr[data-venture]').forEach(function(row){row.style.display=!venture||row.dataset.venture===venture?'':'none';});}
function globalSearch(q){if(!q)return;var ql=q.toLowerCase();var people=window._peopleCache||[];var match=people.find(function(p){return p.email.toLowerCase().includes(ql)||p.name.toLowerCase().includes(ql);});if(match){showPanel('people',document.querySelector('[data-panel="people"]'));filterPeople(q);}}
function replyToMessage(email, name, subject) {
  var subj = encodeURIComponent('Re: ' + (subject || 'Your Message') + ' — ' + (FW_CONFIG.companyName || 'TEKNNUKU Studio'));
  var body = encodeURIComponent('Hi ' + (name || 'there') + ',\n\nThank you for reaching out.\n\n');
  window.open('mailto:' + encodeURIComponent(email) + '?subject=' + subj + '&body=' + body, '_blank');
  toast('Opening email client…', 'success');
}

function markMessageReplied(id) {
  window._updateDoc('contact_messages', id, { status:'replied', repliedAt:new Date().toISOString() }).then(function() {
    toast('Marked as replied ✓', 'success');
    window._loadAll();
  }).catch(function(e) { toast('Update failed: ' + (e.message||e), 'error'); });
}
function deleteRecord(col,id){if(!confirm('Delete this record? This cannot be undone.'))return;window._deleteDoc(col,id).then(function(){toast('Deleted ✓','success');window._loadAll();}).catch(function(){toast('Delete failed','error');});}

//  QUICK CREATE FAB
// ═══════════════════════════════════════════════════════════════
var _fabOpen = false;

function toggleFAB() {
  _fabOpen = !_fabOpen;
  var menu = document.getElementById('fab-menu');
  var btn  = document.getElementById('fab-main');
  if (menu) menu.classList.toggle('open', _fabOpen);
  if (btn)  btn.textContent = _fabOpen ? '✕' : '＋';
}

function closeFAB() {
  _fabOpen = false;
  var menu = document.getElementById('fab-menu');
  var btn  = document.getElementById('fab-main');
  if (menu) menu.classList.remove('open');
  if (btn)  btn.textContent = '＋';
}

function fabCreate(type) {
  closeFAB();
  setTimeout(function() {
    if (type === 'proposal')   { openProposalDrawer(null, ''); }
    if (type === 'payment')    { openPaymentDrawer(null, '', '', ''); }
    if (type === 'assignment') { openAssignmentDrawer(null, '', ''); }
    if (type === 'task')       { openAddTask(); }
  }, 80);
}

// Close FAB when drawer opens or clicking elsewhere
document.addEventListener('click', function(e) {
  if (_fabOpen && !e.target.closest('#quick-fab')) closeFAB();
});

// Show FAB after login — hide on login screen
function updateFABVisibility() {
  var fab = document.getElementById('quick-fab');
  if (!fab) return;
  var canCreate = canAccess('proposals') || canAccess('payments') || canAccess('assignments') || canAccess('tasks');
  fab.style.display = canCreate ? 'flex' : 'none';
}
  
function _bindKeydown() {
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (_fabOpen) { closeFAB(); return; }
      closeDrawer();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      var gs = document.getElementById('global-search');
      if (gs) gs.focus();
    }
    // Ctrl/Cmd + Shift + P → quick proposal
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') {
      e.preventDefault(); fabCreate('proposal');
    }
    // Ctrl/Cmd + Shift + M → quick payment
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'M') {
      e.preventDefault(); fabCreate('payment');
    }
  });
}

// Wire up cross-app switcher links
(function() {
  var siteLink = document.getElementById('sw-site-link');

  if (siteLink) siteLink.href = (window.TEKNNUKU_URLS||{}).mainSite || 'https://teknnuku-studio.vercel.app';

    if (osLink && ['founder','ops_lead','sales_manager','tech_product_lead','developer','admin_finance_officer'].indexOf(role) === -1) {
      osLink.style.display = 'none';
    }
  });
})();

document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
