<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEKNNUKU OS — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--surface:#0f0f1a;--card:#131320;--raised:#1a1a2e;
  --border:rgba(200,155,20,.12);--borderB:rgba(200,155,20,.22);
  --gold:#C89B14;--goldL:#daa820;--cyan:#00BCD4;--white:#F2EDE4;
  --dim:rgba(242,237,228,.55);--dimmer:rgba(242,237,228,.28);
  --red:#ef4444;--green:#22c55e;--purple:#a855f7;--blue:#3b82f6;
  --orange:#f97316;--amber:#f59e0b;
  --sidebar-w:220px;--topbar-h:54px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
@media(max-width:900px){html,body{overflow:auto;}#app{height:auto;min-height:100dvh;overflow:visible;}.main-area{overflow:visible;}.content-area{overflow:visible;height:auto;padding-bottom:90px;}.tab-bar{max-width:calc(100vw - 32px);}}
body{font-family:var(--sans);background:var(--bg);color:var(--white);font-size:14px;line-height:1.5;}
a{text-decoration:none;color:inherit;}button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(200,155,20,.25);border-radius:2px;}
::selection{background:rgba(200,155,20,.25);}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-bg{position:absolute;inset:0;overflow:hidden;}
.login-bg::before{content:'';position:absolute;top:-40%;left:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(200,155,20,.06) 0%,transparent 70%);}
.login-bg::after{content:'';position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,188,212,.05) 0%,transparent 70%);}
.login-card{position:relative;z-index:1;width:380px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--goldL));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:18px;color:#080808;}
.login-logo-text{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);}
.login-logo-text em{color:var(--gold);font-style:normal;}
.login-eyebrow{font-family:var(--mono);font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.login-title{font-family:var(--display);font-weight:800;font-size:1.5rem;color:var(--white);margin-bottom:6px;}
.login-sub{font-size:.8rem;color:var(--dimmer);margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);}
.field input{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.08);border-radius:6px;padding:11px 14px;color:var(--white);font-size:.88rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.btn-login{width:100%;background:var(--gold);color:#080808;border:none;border-radius:6px;padding:13px;font-family:var(--display);font-weight:700;font-size:.88rem;letter-spacing:.04em;text-transform:uppercase;margin-top:8px;transition:background .2s,transform .15s;}
.btn-login:hover{background:var(--goldL);transform:translateY(-1px);}
.login-err{font-family:var(--mono);font-size:.7rem;color:var(--red);text-align:center;margin-top:12px;display:none;}
.login-note{font-size:.72rem;color:var(--dimmer);text-align:center;margin-top:20px;line-height:1.6;}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden;}
#app.visible{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--goldL));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:14px;color:#080808;flex-shrink:0;}
.sb-logo-text{font-family:var(--display);font-weight:700;font-size:.78rem;line-height:1.2;}
.sb-logo-text span{display:block;font-size:.52rem;color:var(--gold);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.nav-section-label{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dimmer);padding:10px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;margin-bottom:2px;color:var(--dim);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;position:relative;}
.nav-item:hover{background:rgba(200,155,20,.06);color:var(--white);}
.nav-item.active{background:rgba(200,155,20,.12);color:var(--gold);border:1px solid rgba(200,155,20,.18);}
.nav-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--gold);color:#080808;font-family:var(--mono);font-size:.5rem;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:11px;color:#080808;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.75rem;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-family:var(--mono);font-size:.52rem;color:var(--gold);letter-spacing:.08em;}
.btn-logout{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:5px;padding:7px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;}
.btn-logout:hover{background:rgba(239,68,68,.15);}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:var(--topbar-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;}
.topbar-title{font-family:var(--display);font-weight:700;font-size:1rem;color:var(--white);flex:1;}
.topbar-title span{color:var(--gold);}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:6px;padding:7px 12px;width:220px;transition:border-color .2s;}
.search-box:focus-within{border-color:rgba(200,155,20,.4);}
.search-box input{background:none;border:none;outline:none;color:var(--white);font-size:.82rem;width:100%;}
.search-box input::placeholder{color:var(--dimmer);}
.topbar-btn{background:rgba(200,155,20,.08);border:1px solid rgba(200,155,20,.18);color:var(--gold);border-radius:6px;padding:7px 14px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;gap:6px;}
.topbar-btn:hover{background:rgba(200,155,20,.16);}
.last-refresh{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);}
.content-area{flex:1;overflow-y:auto;padding:20px 24px;}
.panel{display:none;animation:panelIn .25s ease both;overflow-x:hidden;}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* COMPONENTS */
.panel-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.panel-title{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--white);}
.panel-sub{font-size:.78rem;color:var(--dimmer);margin-left:auto;font-family:var(--mono);}
.eyebrow{font-family:var(--mono);font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--gold);display:inline-block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi-card:hover{border-color:var(--borderB);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}
.kpi-card.cyan::before{background:linear-gradient(90deg,var(--cyan),transparent);}
.kpi-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}
.kpi-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent);}
.kpi-card.red::before{background:linear-gradient(90deg,var(--red),transparent);}
.kpi-card.orange::before{background:linear-gradient(90deg,var(--orange),transparent);}
.kpi-card.amber::before{background:linear-gradient(90deg,var(--amber),transparent);}
.kpi-label{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:10px;}
.kpi-value{font-family:var(--display);font-weight:800;font-size:2rem;color:var(--white);line-height:1;margin-bottom:4px;}
.kpi-meta{font-size:.72rem;color:var(--dimmer);}
.kpi-icon{position:absolute;top:16px;right:16px;font-size:1.4rem;opacity:.4;}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.table-toolbar-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);flex:1;}
.tbl-search{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:5px;padding:6px 10px;color:var(--white);font-size:.8rem;outline:none;width:180px;transition:border-color .2s;}
.tbl-search:focus{border-color:rgba(200,155,20,.4);}
.tbl-filter{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.07);border-radius:5px;padding:6px 10px;color:var(--white);font-size:.78rem;outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(200,155,20,.04);}
th{font-family:var(--mono);font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 16px;border-bottom:1px solid rgba(200,155,20,.05);font-size:.82rem;vertical-align:middle;}
tbody tr:hover{background:rgba(200,155,20,.03);}
tbody tr:last-child td{border-bottom:none;}
.empty-state{text-align:center;padding:48px 20px;font-family:var(--mono);font-size:.7rem;color:var(--dimmer);letter-spacing:.1em;}
.empty-state .empty-icon{font-size:2rem;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.badge-gold{background:rgba(200,155,20,.15);color:var(--gold);}
.badge-cyan{background:rgba(0,188,212,.12);color:var(--cyan);}
.badge-green{background:rgba(34,197,94,.12);color:var(--green);}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);}
.badge-purple{background:rgba(168,85,247,.12);color:var(--purple);}
.badge-dim{background:rgba(242,237,228,.06);color:var(--dimmer);}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.badge-orange{background:rgba(249,115,22,.12);color:var(--orange);}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber);}
.row-actions{display:flex;align-items:center;gap:6px;}
.action-btn{background:none;border:1px solid rgba(242,237,228,.08);color:var(--dimmer);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.action-btn:hover{border-color:var(--gold);color:var(--gold);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}
.action-btn.success:hover{border-color:var(--green);color:var(--green);}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-family:var(--mono);font-weight:700;font-size:.72rem;position:relative;}
.score-ring.tier-a{background:rgba(34,197,94,.15);color:var(--green);border:1.5px solid var(--green);}
.score-ring.tier-b{background:rgba(200,155,20,.15);color:var(--gold);border:1.5px solid var(--gold);}
.score-ring.tier-c{background:rgba(59,130,246,.15);color:var(--blue);border:1.5px solid var(--blue);}

/* DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-640px;bottom:0;width:620px;max-width:95vw;background:var(--card);border-left:1px solid var(--border);z-index:801;overflow-y:auto;transition:right .3s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;}
@media(max-width:900px){.drawer{bottom:76px;}}
.drawer.open{right:0;}
.drawer-topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);}
.drawer-close{background:none;border:1px solid rgba(242,237,228,.08);color:var(--dimmer);border-radius:4px;padding:5px 12px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.drawer-close:hover{border-color:var(--red);color:var(--red);}
.drawer-body{padding:20px;flex:1;padding-bottom:32px;}
.detail-section{margin-bottom:24px;}
.detail-section h4{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-item{display:flex;flex-direction:column;gap:3px;}
.detail-label{font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);}
.detail-val{font-size:.82rem;color:var(--white);word-break:break-all;}
.detail-val.gold{color:var(--gold);font-family:var(--mono);}
.detail-val.mono{font-family:var(--mono);}
.drawer-form{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-label{font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.08);border-radius:5px;padding:10px 12px;color:var(--white);font-size:.82rem;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6;}
.form-select option{background:#1a1a2e;}
.btn-primary{background:var(--gold);color:#080808;border:none;border-radius:6px;padding:11px 20px;font-family:var(--display);font-weight:700;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;transition:background .2s,transform .15s;cursor:pointer;}
.btn-primary:hover{background:var(--goldL);transform:translateY(-1px);}
.btn-secondary{background:rgba(242,237,228,.05);color:var(--dim);border:1px solid rgba(242,237,228,.1);border-radius:6px;padding:10px 18px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);}
.btn-success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:10px 18px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.btn-success:hover{background:rgba(34,197,94,.2);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;padding-bottom:8px;}

/* PHASE TRACKER */
.phase-tracker{display:flex;flex-direction:column;gap:0;margin-bottom:20px;}
.phase-item{display:flex;gap:12px;position:relative;padding-bottom:0;}
.phase-item::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:1px;background:var(--border);}
.phase-item:last-child::before{display:none;}
.phase-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--border);background:var(--bg);position:relative;z-index:1;margin-top:2px;}
.phase-dot.done{background:rgba(34,197,94,.2);border-color:var(--green);}
.phase-dot.active{background:rgba(200,155,20,.2);border-color:var(--gold);}
.phase-dot.locked{opacity:.4;}
.phase-body{flex:1;padding-bottom:20px;}
.phase-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);}
.phase-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);margin-bottom:3px;}
.phase-pay{font-family:var(--mono);font-size:.68rem;color:var(--gold);margin-bottom:4px;}
.phase-date{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);}
.phase-note{font-size:.78rem;color:var(--dim);line-height:1.5;margin-top:4px;background:rgba(255,255,255,.03);border-radius:4px;padding:6px 10px;}
.phase-action-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* TEAM MEMBER CARD */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.team-card:hover{border-color:var(--borderB);}
.team-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#080808;flex-shrink:0;}
.team-info{flex:1;}
.team-name{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);}
.team-role-label{font-family:var(--mono);font-size:.6rem;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;}
.team-email{font-family:var(--mono);font-size:.62rem;color:var(--dimmer);}
.team-meta{text-align:right;font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}

/* VACANCY CARD */
.vacancy-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.vacancy-card:hover{border-color:var(--borderB);}
.vacancy-team-label{font-family:var(--mono);font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:2px;}
.vacancy-title{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);}
.vacancy-type{font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}
.vacancy-status-select{background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.1);border-radius:5px;padding:5px 10px;color:var(--white);font-size:.72rem;outline:none;cursor:pointer;font-family:var(--mono);}

/* TABS */
.tab-bar{display:flex;gap:2px;margin-bottom:18px;background:var(--surface);border-radius:7px;padding:3px;border:1px solid var(--border);align-self:flex-start;flex-wrap:nowrap;overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;white-space:nowrap;padding:7px 16px;border-radius:5px;border:none;background:none;color:var(--dimmer);cursor:pointer;transition:all .15s;}
.tab-btn.active{background:rgba(200,155,20,.15);color:var(--gold);}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:12px 18px;font-size:.82rem;color:var(--white);box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s ease;pointer-events:none;max-width:320px;}
#toast.show{transform:none;opacity:1;}
#toast.error{border-left-color:var(--red);}
#toast.success{border-left-color:var(--green);}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid rgba(200,155,20,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{text-align:center;padding:32px;}
.table-scroll{overflow-x:auto;}
.person-card{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;cursor:pointer;transition:border-color .2s,background .2s;}
.person-card:hover{border-color:var(--borderB);background:rgba(200,155,20,.03);}
.person-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:16px;color:#080808;flex-shrink:0;}
.person-info{flex:1;}
.person-name{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);}
.person-email{font-family:var(--mono);font-size:.65rem;color:var(--dimmer);}
.person-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.person-meta{text-align:right;flex-shrink:0;}
.proposal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:border-color .2s;word-break:break-word;min-width:0;}
.proposal-card:hover{border-color:var(--borderB);}
.proposal-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.proposal-title{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);flex:1;word-break:break-word;min-width:0;}
.proposal-body{font-size:.8rem;color:var(--dim);line-height:1.6;margin-bottom:12px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.proposal-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.proposal-meta{font-family:var(--mono);font-size:.6rem;color:var(--dimmer);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.activity-feed{display:flex;flex-direction:column;gap:1px;}
.activity-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(200,155,20,.04);transition:background .15s;cursor:pointer;}
.activity-item:hover{background:rgba(200,155,20,.04);}
.activity-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.activity-body{flex:1;}
.activity-title{font-size:.82rem;color:var(--white);}
.activity-meta{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);margin-top:1px;}
.activity-time{font-family:var(--mono);font-size:.58rem;color:var(--dimmer);flex-shrink:0;}

/* RBAC ACCESS DENIED */
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;}
.access-denied .ad-icon{font-size:3rem;margin-bottom:16px;}
.access-denied .ad-title{font-family:var(--display);font-weight:800;font-size:1.2rem;color:var(--white);margin-bottom:8px;}
.access-denied .ad-sub{font-family:var(--mono);font-size:.68rem;color:var(--dimmer);letter-spacing:.08em;}

/* MOBILE */
.mob-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);}
.mob-overlay.open{display:block;}
.mob-hamburger{display:none;background:var(--gold);border:none;border-radius:7px;padding:8px 13px;color:#080808;font-size:11px;font-weight:800;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0;gap:5px;align-items:center;white-space:nowrap;}
.mob-hamburger:active{background:var(--goldL);}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:900;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,6px);overflow-x:auto;}
.bottom-nav-inner{display:flex;align-items:center;min-width:max-content;padding:0 8px;gap:2px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:8px;cursor:pointer;color:var(--dimmer);font-size:.58rem;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;min-width:58px;transition:all .15s;border:1px solid transparent;}
.bnav-item:hover,.bnav-item.active{color:var(--gold);background:rgba(200,155,20,.1);border-color:rgba(200,155,20,.18);}
.bnav-icon{font-size:16px;line-height:1;}
@media(max-width:900px){
  .sidebar{position:fixed;top:0;left:-260px;bottom:0;z-index:750;width:260px;transition:left .28s cubic-bezier(.34,1.2,.64,1);box-shadow:4px 0 32px rgba(0,0,0,.5);}
  .sidebar.open{left:0;}
  .mob-hamburger{display:flex;align-items:center;justify-content:center;gap:6px;}
  .bottom-nav{display:flex;}
  .content-area{padding-bottom:80px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .topbar{gap:8px;padding:0 12px;}
  .search-box{display:none;}
  .last-refresh{display:none;}
  .topbar-title{font-size:.85rem;}
}
@media(max-width:480px){.drawer{width:100%;max-width:100%;}}

/* ── Cross-app switcher buttons ── */
.app-switcher { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.sw-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(242,237,228,.08);
  color: var(--dimmer); border-radius: 6px; padding: 6px 12px;
  font-family: var(--mono); font-size: .6rem; letter-spacing: .08em;
  text-transform: uppercase; cursor: pointer; text-decoration: none;
  transition: all .15s; white-space: nowrap;
}
.sw-btn:hover { border-color: var(--gold); color: var(--gold); }
.sw-btn.sw-primary { background: rgba(200,155,20,.08); border-color: rgba(200,155,20,.2); color: var(--gold); }
.sw-btn .sw-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }


/* ── OS PANELS: KANBAN, VENTURES, FINANCE, REPORTS, SOPS ── */
.kanban-board{display:grid;gap:14px;align-items:start;overflow-x:auto;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:180px;}
.kanban-col-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px;color:var(--dim);}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.col-count{font-family:var(--mono);font-size:.56rem;color:var(--dimmer);background:var(--card);padding:2px 8px;border-radius:10px;}
.kanban-col-body{padding:10px;min-height:140px;display:flex;flex-direction:column;gap:8px;}
.kanban-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 13px;cursor:pointer;transition:all .15s;}
.kanban-item:hover{border-color:var(--borderB);transform:translateY(-1px);}
.kanban-item-title{font-size:.8rem;font-weight:600;margin-bottom:7px;line-height:1.4;color:var(--white);}
.venture-tag{font-family:var(--mono);font-size:.54rem;letter-spacing:.06em;color:var(--gold);background:rgba(200,155,20,.1);padding:2px 7px;border-radius:3px;}
.health-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px;}
.health-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.hf-green{background:var(--green)}.hf-yellow{background:var(--amber)}.hf-red{background:var(--red)}
.venture-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;transition:all .15s;margin-bottom:14px;}
.venture-card:hover{border-color:var(--borderB);}
.venture-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.sop-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:15px 18px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.sop-card:hover{border-color:var(--borderB);}
.sop-body{margin-top:12px;font-size:.78rem;color:var(--dim);line-height:1.8;display:none;white-space:pre-wrap;border-top:1px solid var(--border);padding-top:12px;}
.sop-body.open{display:block;}
.sop-card-header{display:flex;align-items:center;justify-content:space-between;}
.sop-card-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--white);}
.sop-arrow{color:var(--dimmer);font-size:.7rem;}
.report-form-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:20px;}
.perf-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin:7px 0 10px;}
.perf-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.perf-flag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-family:var(--mono);font-size:.56rem;letter-spacing:.04em;}
.flag-ok{background:rgba(34,197,94,.1);color:var(--green)}
.flag-warn{background:rgba(245,158,11,.1);color:var(--amber)}
.flag-crit{background:rgba(239,68,68,.1);color:var(--red)}
.fin-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.fin-sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center;}
.fin-sum-label{font-family:var(--mono);font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dimmer);margin-bottom:8px;}
.fin-sum-val{font-family:var(--display);font-weight:800;font-size:1.8rem;line-height:1;}
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,155,20,.05);font-size:.8rem;}
.fin-row:last-child{border-bottom:none;}
.fin-row-label{color:var(--dim);}
.fin-income{color:var(--green);font-family:var(--mono);font-weight:600;}
.fin-expense{color:var(--red);font-family:var(--mono);font-weight:600;}
.fin-profit{font-family:var(--mono);font-weight:600;}
.client-onboard-bar{display:flex;align-items:center;gap:6px;}
.onboard-step{font-family:var(--mono);font-size:.55rem;padding:3px 8px;border-radius:3px;white-space:nowrap;}
.onboard-done{background:rgba(34,197,94,.12);color:var(--green);}
.onboard-active{background:rgba(200,155,20,.12);color:var(--gold);}
.onboard-pending{background:rgba(242,237,228,.06);color:var(--dimmer);}
.content-area{overflow-y:auto!important;-webkit-overflow-scrolling:touch;}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
  .kanban-board{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
   @media(max-width:900px){
  table{min-width:600px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important;}
  .fin-summary-grid{grid-template-columns:1fr 1fr!important;}
}
@media(max-width:900px){.fin-summary-grid{grid-template-columns:1fr}.kanban-board{grid-template-columns:1fr!important}}

/* ── Scroll isolation — each panel scrolls independently ── */
.content-area{
  scroll-behavior:smooth;
  overscroll-behavior:contain;
}
.panel{
  min-height:100%;
}
/* ── Sticky bottom nav always visible ── */
.bottom-nav{
  position:fixed!important;
  bottom:0;left:0;right:0;
  z-index:900;
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  background:rgba(15,15,26,.95)!important;
  border-top:1px solid var(--border);
}
/* ── Prevent tables from escaping their scroll containers ── */
.table-scroll{
  display:block;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.table-scroll table{
  width:max-content;
  min-width:100%;
}
/* ── Drawer mobile fix ── */
@media(max-width:900px){
  .drawer{
    top:0!important;
    bottom:calc(68px + env(safe-area-inset-bottom))!important;
  }
}

/* ── Quick Create FAB ── */
#quick-fab{
  position:fixed;bottom:84px;right:18px;z-index:890;display:none;
  flex-direction:column;align-items:flex-end;gap:7px;
}
@media(max-width:900px){#quick-fab{bottom:84px;}}
#fab-main{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  border:none;color:#080808;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(200,155,20,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,box-shadow .2s;
}
#fab-main:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(200,155,20,.55);}
.fab-option{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:8px 16px;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;
  color:var(--white);cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .15s;
  text-decoration:none;
}
.fab-option:hover{border-color:var(--gold);color:var(--gold);}
.fab-option .fab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#fab-menu{display:none;flex-direction:column;align-items:flex-end;gap:7px;}
#fab-menu.open{display:flex;}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FC = { apiKey:"AIzaSyAjovgyVtPJOWwyte8gwdesEHesF9AzJlM", authDomain:"teknnuku-intake-form.firebaseapp.com", projectId:"teknnuku-intake-form", storageBucket:"teknnuku-intake-form.firebasestorage.app", messagingSenderId:"661289555481", appId:"1:661289555481:web:f15b1f8983d5d460df3c88" };
const app = initializeApp(FC);
const auth = getAuth(app);
const db = getFirestore(app);

function tsVal(d) {
  var v = d.completedAt||d.submittedAt||d.sentAt||d.paidAt||d.assignedAt||d.createdAt||d.updatedAt||d.startedAt;
  if (!v) return 0;
  if (v.seconds) return v.seconds*1000;
  return new Date(v).getTime()||0;
}
async function getCol(name) {
  try {
    const snap = await getDocs(collection(db, name));
    const docs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    docs.sort((a,b) => tsVal(b)-tsVal(a));
    return docs;
  } catch(e) { console.error('❌',name,e.message); return []; }
}

window._signIn = (e,p) => signInWithEmailAndPassword(auth,e,p);
window._signOut = () => signOut(auth);
window._saveDoc = async (col, data) => { data.createdAt=serverTimestamp(); const r=await addDoc(collection(db,col),data); return r.id; };
window._setDoc = async (col, id, data) => { data.updatedAt=serverTimestamp(); await setDoc(doc(db,col,id),data); };
window._updateDoc = async (col, id, data) => { data.updatedAt=serverTimestamp(); await updateDoc(doc(db,col,id),data); };
window._deleteDoc = async (col, id) => { await deleteDoc(doc(db,col,id)); };

window._loadAll = async function() {
  const [leads,inquiries,messages,proposals,payments,assignments,applicants,team_members,careers_config,
       ventures,tasks,crm_leads,clients,financials,daily_reports,weekly_reports,invoices,receipts] = await Promise.all([
  getCol('intake_leads'), getCol('service_inquiries'), getCol('contact_messages'),
  getCol('proposals'), getCol('payments'), getCol('assignments'),
  getCol('applicants'), getCol('team_members'), getCol('careers_config'),
  getCol('ventures'), getCol('tasks'), getCol('crm_leads'),
  getCol('clients'), getCol('financials'), getCol('daily_reports'), getCol('weekly_reports'),
  getCol('invoices'), getCol('receipts')
]);
window._data = { leads,inquiries,messages,proposals,payments,assignments,applicants,team_members,careers_config,
                 ventures,tasks,crm_leads,clients,financials,daily_reports,weekly_reports,invoices,receipts };
  document.getElementById('last-refresh').textContent = 'Updated '+new Date().toLocaleTimeString();
  window._renderAll();
};

function applyAuthState(user) {
  if (user) {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    window._currentUser = user;
    var nameEl=document.getElementById('user-name');
    var avatarEl=document.getElementById('user-avatar');
    if (nameEl) nameEl.textContent = user.email.split('@')[0];
    if (avatarEl) avatarEl.textContent = user.email[0].toUpperCase();
    window._loadAll().then(() => {
      window._initRBAC(user.email);
    });
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').classList.remove('visible');
    window._currentUser=null;
    window._userRole=null;
  }
}

onAuthStateChanged(auth, user => {
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>applyAuthState(user));
  else applyAuthState(user);
});
</script>

function setText(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}
function tsToDate(v) {
  if (!v) return new Date(0);
  if (v.seconds) return new Date(v.seconds * 1000);
  var d = new Date(v);
  return isNaN(d.getTime()) ? new Date(0) : d;
}
function getWeekStart() {
  var now = new Date();
  var monday = new Date(now);
  monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
  monday.setHours(0, 0, 0, 0);
  return monday;
}
function matchReportToMember(report, member) {
  var rn = (report.userName || '').trim().toLowerCase();
  var mn = (member.name   || '').trim().toLowerCase();
  var me = (member.email  || '').trim().toLowerCase();
  return (rn && mn && rn === mn) || (rn && me && rn === me);
}

//  OVERVIEW RENDER — master + 4 sub-renders
// ═══════════════════════════════════════════════════════════════
function renderOverview(d) {
  var financials = d.financials    || [];
  var payments   = d.payments      || [];
  var tasks      = d.tasks         || [];
  var team       = d.team_members  || [];
  var reports    = d.daily_reports || [];
  var crm        = d.crm_leads     || [];
  var clients    = d.clients       || [];
  var leads      = d.leads         || [];
  var weekStart  = getWeekStart();
  var today      = new Date(); today.setHours(0, 0, 0, 0);

  // Financial totals
  var totalRevenue = 0, totalExpenses = 0;
  financials.forEach(function(f) {
    var amt = parseFloat(f.amount) || 0;
    if (f.type === 'income') totalRevenue += amt; else totalExpenses += amt;
  });
  var netProfit = totalRevenue - totalExpenses;
  var margin    = totalRevenue > 0 ? Math.round((netProfit / totalRevenue) * 100) : 0;

  // System liability — pending + overdue payments
  var pendingAmt = 0, overdueAmt = 0;
  payments.forEach(function(p) {
    var amt = parseFloat(p.amount) || 0;
    if (p.status === 'pending') pendingAmt += amt;
    if (p.status === 'overdue') overdueAmt += amt;
  });

  // Operational
  var overdueTasks  = tasks.filter(function(t) { return t.status !== 'done' && t.deadline && new Date(t.deadline) < today; });
  var hotLeads      = crm.filter(function(l) { return l.status === 'qualified' || l.status === 'proposal'; }).length;
  var activeClients = clients.filter(function(c) { return c.status !== 'churned'; });
  var mrr           = activeClients.reduce(function(s, c) { return s + (parseFloat(c.monthlyValue) || 0); }, 0);
  var leadsWeek     = leads.filter(function(l) { return tsToDate(l.completedAt || l.createdAt) >= weekStart; }).length
                    + crm.filter(function(l)   { return tsToDate(l.createdAt) >= weekStart; }).length;

  // Set KPI text
  setText('ov-revenue',       '₦' + totalRevenue.toLocaleString());
  setText('ov-expenses',      '₦' + totalExpenses.toLocaleString());
  setText('ov-profit',        (netProfit < 0 ? '−' : '') + '₦' + Math.abs(netProfit).toLocaleString());
  setText('ov-margin',        margin + '% net margin');
  setText('ov-liability',     '₦' + (pendingAmt + overdueAmt).toLocaleString());
  setText('ov-liability-meta','₦' + pendingAmt.toLocaleString() + ' pending · ₦' + overdueAmt.toLocaleString() + ' overdue');
  setText('ov-overdue',       overdueTasks.length);
  setText('ov-hot-leads',     hotLeads);
  setText('ov-clients',       activeClients.length);
  setText('ov-mrr',           '₦' + mrr.toLocaleString() + '/mo MRR');
  setText('ov-leads-week',    leadsWeek);
  setText('overview-updated', 'Updated ' + new Date().toLocaleTimeString());

  // Flip profit card red when loss
  var profitCard = document.getElementById('ov-profit-card');
  if (profitCard) profitCard.className = 'kpi-card ' + (netProfit >= 0 ? 'green' : 'red');

  // Sub-renders
  ovVentureHealth(financials, tasks, clients, today);
  ovReportStatus(team, reports, weekStart);
  ovPerfScores(team, reports, tasks, weekStart);
  ovLatestReports(reports);
}

// ── Venture health rows ────────────────────────────────────────
function ovVentureHealth(financials, tasks, clients, today) {
  var el = document.getElementById('ov-venture-health');
  if (!el) return;
 
  var stats = VENTURES_SEED.map(function(v) {
    var fi      = financials.filter(function(f) { return f.ventureId === v.id; });
    var rev     = fi.filter(function(f) { return f.type === 'income';  }).reduce(function(s,f){ return s+(parseFloat(f.amount)||0); }, 0);
    var exp     = fi.filter(function(f) { return f.type === 'expense'; }).reduce(function(s,f){ return s+(parseFloat(f.amount)||0); }, 0);
    var vTasks  = tasks.filter(function(t) { return t.ventureId === v.id; });
    var done    = vTasks.filter(function(t) { return t.status === 'done'; }).length;
    var taskPct = vTasks.length > 0 ? Math.round((done / vTasks.length) * 100) : 0;
    var clCount = clients.filter(function(c) { return c.ventureId === v.id && c.status !== 'churned'; }).length;
    var odCount = vTasks.filter(function(t) { return t.status !== 'done' && t.deadline && new Date(t.deadline) < today; }).length;
    var health  = Math.min(100, Math.round(taskPct * 0.5 + (rev > 0 ? 30 : 0) + (clCount > 0 ? 20 : 0)));
    return { v:v, rev:rev, exp:exp, net:rev-exp, taskPct:taskPct, clCount:clCount, odCount:odCount, health:health };
  });
 
  stats.sort(function(a, b) { return a.health - b.health; });
 
  // ── Underperforming alert strip ───────────────────
  var bad     = stats.filter(function(s) { return s.health < 40; });
  var alertEl = document.getElementById('ov-underperf-alert');
  var badgeEl = document.getElementById('ov-underperf-badge');
 
  if (alertEl) {
    if (bad.length) {
      alertEl.style.display = 'block';
      alertEl.innerHTML =
        '<div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);' +
          'border-left:3px solid var(--red);border-radius:6px;padding:14px 18px;">' +
          '<div style="font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;' +
            'text-transform:uppercase;color:var(--red);margin-bottom:8px;">' +
            '⚠ Underperforming Ventures — ' + bad.length + ' flagged' +
          '</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:8px;">' +
            bad.map(function(s) {
              return '<span style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);' +
                'border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:.6rem;color:var(--red);">' +
                escHtml(s.v.name) + ' · ' + s.health + '% health' +
                (s.odCount ? ' · ' + s.odCount + ' overdue' : '') +
                (s.rev === 0 ? ' · no revenue' : '') +
              '</span>';
            }).join('') +
          '</div>' +
        '</div>';
    } else {
      alertEl.style.display = 'none';
    }
  }
  if (badgeEl) {
    badgeEl.innerHTML = bad.length
      ? '<span class="badge badge-red" style="font-size:.5rem;margin-left:8px;">' + bad.length + ' underperforming</span>'
      : '';
  }
 
  // ── Render rows ───────────────────────────────────
  el.innerHTML = stats.map(function(s) {
    var hColor = s.health >= 70 ? 'var(--green)' : s.health >= 40 ? 'var(--amber)' : 'var(--red)';
    var rowBg  = s.health < 40 ? 'background:rgba(239,68,68,.03);' : '';
 
    // Revenue: abbreviate for compact display
    var revStr = s.rev >= 1000000
      ? '₦' + (s.rev / 1000000).toFixed(1) + 'M'
      : s.rev >= 1000
        ? '₦' + Math.round(s.rev / 1000) + 'k'
        : '₦' + s.rev.toLocaleString();
    var netStr = (s.net < 0 ? '−₦' : '₦') +
      (Math.abs(s.net) >= 1000000
        ? (Math.abs(s.net) / 1000000).toFixed(1) + 'M'
        : Math.abs(s.net) >= 1000
          ? Math.round(Math.abs(s.net) / 1000) + 'k'
          : Math.abs(s.net).toLocaleString());
 
    return '<div style="padding:10px 14px;border-bottom:1px solid rgba(200,155,20,.05);' +
        'display:flex;align-items:center;gap:10px;' + rowBg + '">' +
 
      // Status dot
      '<div style="width:8px;height:8px;border-radius:50%;background:' + hColor + ';flex-shrink:0;"></div>' +
 
      // Main content
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
          // Venture name — class for potential CSS override
          '<div class="ov-vh-name" style="font-size:.8rem;font-weight:600;color:var(--white);' +
            'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;">' +
            escHtml(s.v.name) +
          '</div>' +
          // Health %
          '<div style="font-family:var(--mono);font-size:.62rem;font-weight:700;color:' + hColor + ';' +
            'flex-shrink:0;margin-left:6px;">' + s.health + '%' +
          '</div>' +
        '</div>' +
 
        // Progress bar
        '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;">' +
          '<div style="width:' + s.health + '%;height:100%;background:' + hColor + ';' +
            'border-radius:2px;transition:width .6s ease;"></div>' +
        '</div>' +
 
        // Meta tags
        '<div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;">' +
          '<span style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);">' +
            s.clCount + ' client' + (s.clCount !== 1 ? 's' : '') +
          '</span>' +
          '<span style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);">' +
            s.taskPct + '% tasks' +
          '</span>' +
          (s.odCount
            ? '<span style="font-family:var(--mono);font-size:.54rem;color:var(--red);">⚠ ' + s.odCount + ' overdue</span>'
            : '') +
        '</div>' +
      '</div>' +
 
      // Revenue — hidden on tiny screens via CSS class
      '<div class="ov-vh-revenue" style="text-align:right;flex-shrink:0;min-width:72px;">' +
        '<div style="font-family:var(--mono);font-size:.65rem;color:var(--green);">+' + revStr + '</div>' +
        '<div style="font-family:var(--mono);font-size:.58rem;color:' +
          (s.net >= 0 ? 'var(--gold)' : 'var(--red)') + ';">' +
          'Net: ' + netStr +
        '</div>' +
      '</div>' +
 
    '</div>';
  }).join('') || '<div class="empty-state"><div class="empty-icon">🏢</div>No venture data yet</div>';
}

// ── Team report submissions ────────────────────────────────────
function ovReportStatus(team, reports, weekStart) {
  var el = document.getElementById('ov-report-status');
  if (!el) return;
  if (!team.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div>No team members yet</div>';
    return;
  }
 
  // Count working days elapsed this week
  var daysSoFar = 0;
  var cursor    = new Date(weekStart);
  var now       = new Date();
  while (cursor <= now && daysSoFar < 5) {
    if (cursor.getDay() !== 0 && cursor.getDay() !== 6) daysSoFar++;
    cursor.setDate(cursor.getDate() + 1);
  }
  var expected = Math.max(daysSoFar, 1);
 
  var rows = team.map(function(m) {
    var weekRpts = reports.filter(function(r) {
      return matchReportToMember(r, m) &&
             tsToDate(r.submittedAt || r.createdAt) >= weekStart;
    });
    return { m:m, count:weekRpts.length };
  });
 
  rows.sort(function(a, b) {
    if (a.count === 0 && b.count > 0) return -1;
    if (b.count === 0 && a.count > 0) return  1;
    return a.count - b.count;
  });
 
  var submitted = rows.filter(function(r) { return r.count > 0; }).length;
  var missing   = rows.filter(function(r) { return r.count === 0; }).length;
 
  var html =
    '<div style="display:flex;gap:12px;padding:10px 14px 8px;border-bottom:1px solid rgba(200,155,20,.07);flex-wrap:wrap;">' +
      '<span style="font-family:var(--mono);font-size:.58rem;color:var(--green);">✅ ' + submitted + ' submitted</span>' +
      (missing
        ? '<span style="font-family:var(--mono);font-size:.58rem;color:var(--red);">⚠ ' + missing + ' missing</span>'
        : '') +
    '</div>';
 
  html += rows.map(function(row) {
    var pct    = Math.round((row.count / expected) * 100);
    var color  = row.count === 0 ? 'var(--red)' : pct < 60 ? 'var(--amber)' : 'var(--green)';
    var rowBg  = row.count === 0 ? 'background:rgba(239,68,68,.04);' : '';
    var roleStr= (ROLE_LABELS[row.m.role] || row.m.role || '').substring(0, 24);
 
    return '<div style="padding:9px 14px;border-bottom:1px solid rgba(200,155,20,.04);' +
        'display:flex;align-items:center;gap:10px;' + rowBg + '">' +

function ovPerfScores(team, reports, tasks, weekStart) {
  var el = document.getElementById('ov-perf-scores');
  if (!el) return;
  if (!team.length) {
    el.innerHTML = '<div class="empty-state" style="padding:12px 0;">No team yet</div>';
    return;
  }
 
  var daysSoFar = 0;
  var cursor    = new Date(weekStart);
  var now       = new Date();
  while (cursor <= now && daysSoFar < 5) {
    if (cursor.getDay() !== 0 && cursor.getDay() !== 6) daysSoFar++;
    cursor.setDate(cursor.getDate() + 1);
  }
  var expected = Math.max(daysSoFar, 1);
 
  var scores = team.map(function(m) {
    var weekRpts = reports.filter(function(r) {
      return matchReportToMember(r, m) &&
             tsToDate(r.submittedAt || r.createdAt) >= weekStart;
    });
 
    // Submission score — 50 pts max
    var subScore = Math.min(Math.round((weekRpts.length / expected) * 50), 50);
 
    // Metric quality — 30 pts max
    var metricScore = 0;
    weekRpts.forEach(function(r) {
      var pos = Object.values(r.data || {}).filter(function(v) {
        return typeof v === 'number' && v > 0;
      }).length;
      if      (pos >= 4) metricScore = Math.max(metricScore, 30);
      else if (pos >= 2) metricScore = Math.max(metricScore, 18);
      else if (pos >= 1) metricScore = Math.max(metricScore, 8);
    });
 
    // Task completion — 20 pts max
    var myTasks   = tasks.filter(function(t) { return t.assignedTo === m.id; });
    var doneTasks = myTasks.filter(function(t) { return t.status === 'done'; }).length;
    var taskScore = myTasks.length > 0
      ? Math.min(Math.round((doneTasks / myTasks.length) * 20), 20)
      : 0;
 
    var total = subScore + metricScore + taskScore;
    return { m:m, score:total, subs:weekRpts.length, tasks:myTasks.length, done:doneTasks };
  });
 
  scores.sort(function(a, b) { return b.score - a.score; });
 
  var underperf = scores.filter(function(s) { return s.score < 40; }).length;
  var html = '';
 
  if (underperf) {
    html +=
      '<div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.15);' +
        'border-radius:5px;padding:8px 12px;margin-bottom:12px;' +
        'font-family:var(--mono);font-size:.58rem;color:var(--red);">' +
        '⚠ ' + underperf + ' member' + (underperf !== 1 ? 's' : '') + ' underperforming this week' +
      '</div>';
  }
 
  html += scores.map(function(s) {
    var color   = s.score >= 70 ? 'var(--green)' : s.score >= 40 ? 'var(--amber)' : 'var(--red)';
    var flag    = s.score >= 70 ? '✅' : s.score >= 40 ? '🟡' : '⚠️';
    var detailStr = s.subs + ' report' + (s.subs !== 1 ? 's' : '') +
                   ' · ' + s.done + '/' + s.tasks + ' tasks';
 
    return '<div style="padding:9px 0;border-bottom:1px solid rgba(200,155,20,.05);' +
        'display:flex;align-items:center;gap:8px;">' +
 
      // Flag emoji
      '<span style="font-size:.7rem;flex-shrink:0;width:18px;">' + flag + '</span>' +
 
      // Name + bar + detail
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:.76rem;font-weight:600;color:var(--white);' +
          'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
          escHtml(s.m.name || s.m.email || '—') +
        '</div>' +
        '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;' +
          'overflow:hidden;margin-top:5px;">' +
          '<div style="width:' + s.score + '%;height:100%;background:' + color + ';' +
            'border-radius:2px;transition:width .5s ease;"></div>' +
        '</div>' +
        // Detail line gets class so CSS can hide it at 440px
        '<div class="ov-ps-detail" style="font-family:var(--mono);font-size:.52rem;' +
          'color:var(--dimmer);margin-top:3px;">' +
          escHtml(detailStr) +
        '</div>' +
      '</div>' +
 
      // Score number
      '<div style="font-family:var(--mono);font-weight:700;font-size:.82rem;' +
        'color:' + color + ';flex-shrink:0;min-width:28px;text-align:right;">' +
        s.score +
      '</div>' +
 
    '</div>';
  }).join('');
 
  el.innerHTML = html;
}

function ovLatestReports(reports) {
  var el = document.getElementById('ov-latest-reports');
  if (!el) return;
  if (!reports.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>No reports submitted yet</div>';
    return;
  }
 
  var sorted = reports.slice().sort(function(a, b) {
    return tsToDate(b.submittedAt || b.createdAt) - tsToDate(a.submittedAt || a.createdAt);
  }).slice(0, 10);
 
  // Table: columns have CSS classes so we can hide them responsively
  var html =
    '<div class="table-scroll">' +
    '<table style="width:100%;min-width:0;"><thead><tr>' +
      '<th>Member</th>' +
      '<th class="ov-rpt-col-role">Role</th>' +
      '<th class="ov-rpt-col-date">Date</th>' +
      '<th class="ov-rpt-col-summary">Summary</th>' +
      '<th class="ov-rpt-col-metric">Top Metric</th>' +
      '<th>Submitted</th>' +
      '<th></th>' +
    '</tr></thead><tbody>';
 
  sorted.forEach(function(r) {
    var data    = r.data || {};
    var mKey    = '';
    var mVal    = '';
    var roleStr = (r.reportType || '').replace(/_/g, ' ');
 
    // Find first positive numeric metric for the "Top Metric" column
    Object.keys(data).some(function(k) {
      if (typeof data[k] === 'number' && data[k] > 0) {
        mKey = k.replace(/([A-Z])/g, ' $1').trim();
        mVal = data[k].toLocaleString();
        return true;
      }
    });
 
    var agoStr  = timeAgo(r.submittedAt || r.createdAt);
    var dateStr = fmtDate(r.date);
 
    html += '<tr>' +
 
      // Member — always visible; on mobile shows role badge + time inline
      '<td style="min-width:0;">' +
        '<div style="font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;">' +
          escHtml(r.userName || '—') +
        '</div>' +
        // Role badge shown inline only when role column is hidden (mobile)
        '<span class="ov-rpt-badge-inline badge badge-cyan" style="font-size:.5rem;margin-top:3px;">' +
          escHtml(roleStr) +
        '</span>' +
        // Submitted time shown inline only when submitted column is hidden (very small)
        '<div class="ov-rpt-ago-inline" style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);margin-top:2px;">' +
          escHtml(agoStr) +
        '</div>' +
      '</td>' +
 
      // Role — hidden ≤700px
      '<td class="ov-rpt-col-role">' +
        '<span class="badge badge-cyan" style="font-size:.52rem;">' +
          escHtml(roleStr) +
        '</span>' +
      '</td>' +
 
      // Date — hidden ≤480px
      '<td class="ov-rpt-col-date" style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);white-space:nowrap;">' +
        escHtml(dateStr) +
      '</td>' +
 
      // Summary — hidden ≤700px
      '<td class="ov-rpt-col-summary" style="font-size:.76rem;color:var(--dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
        escHtml((r.summary || '—').substring(0, 55)) +
      '</td>' +
 
      // Top Metric — hidden ≤480px
      '<td class="ov-rpt-col-metric" style="font-family:var(--mono);font-size:.62rem;white-space:nowrap;">' +
        (mVal
          ? '<span style="color:var(--dimmer);">' + escHtml(mKey) + ': </span>' +
            '<strong style="color:var(--gold);">' + escHtml(mVal) + '</strong>'
          : '<span style="color:var(--dimmer);">—</span>') +
      '</td>' +
 
      // Submitted — always visible on desktop, replaced by inline on very small screens
      '<td class="ov-rpt-col-submitted" style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);white-space:nowrap;">' +
        escHtml(agoStr) +
      '</td>' +
 
      // Action
      '<td>' +
        '<button class="action-btn" onclick="viewReport(\'' + r.id + '\')">View</button>' +
      '</td>' +
 
    '</tr>';
  });
 
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function buildClientOptions(currentVal) {
  var d    = window._data || {};
  var html = '<option value="">— Select client / lead —</option>';
  var crmL = (d.crm_leads || []);
  var srcIds = new Set(crmL.map(function(l){ return l.sourceId; }).filter(Boolean));
  var SL   = {new_lead:'New Lead',contacted:'Contacted',qualified:'Qualified',proposal:'Proposal',won:'Won ✅',lost:'Lost'};

  if (crmL.length) {
    html += '<optgroup label="── CRM Pipeline ──">';
    crmL.forEach(function(l) {
      var v = V_MAP[l.ventureId] || {};
      html += '<option value="crm|' + l.id + '"' + (currentVal === 'crm|' + l.id ? ' selected' : '') + '>' +
        escHtml(l.name || '—') + ' — ' + escHtml(v.name || l.ventureId || '—') +
        ' [' + (SL[l.status] || l.status) + ']</option>';
    });
    html += '</optgroup>';
  }

  var clients = (d.clients || []);
  if (clients.length) {
    html += '<optgroup label="── Active Clients ──">';
    clients.forEach(function(c) {
      var v = V_MAP[c.ventureId] || {};
      html += '<option value="client|' + c.id + '"' + (currentVal === 'client|' + c.id ? ' selected' : '') + '>' +
        escHtml(c.name || '—') + ' — ' + escHtml(v.name || '—') + '</option>';
    });
    html += '</optgroup>';
  }

  var intakes = (d.leads || []).filter(function(l){ return !srcIds.has(l.id); });
  if (intakes.length) {
    html += '<optgroup label="── Intake Leads ──">';
    intakes.forEach(function(l) {
      var nm = ((l.firstName || '') + ' ' + (l.lastName || '')).trim() || l.email || '—';
      html += '<option value="intake|' + l.id + '"' + (currentVal === 'intake|' + l.id ? ' selected' : '') + '>' +
        escHtml(nm) + ' — ' + escHtml(l.email || '') + '</option>';
    });
    html += '</optgroup>';
  }

  var inquiries = (d.inquiries || []).filter(function(i){ return !srcIds.has(i.id); });
  if (inquiries.length) {
    html += '<optgroup label="── Service Inquiries ──">';
    inquiries.forEach(function(i) {
      html += '<option value="inquiry|' + i.id + '"' + (currentVal === 'inquiry|' + i.id ? ' selected' : '') + '>' +
        escHtml(i.name || '—') + ' — ' + escHtml(i.email || '') + ' [' + serviceLabel(i.service) + ']</option>';
    });
    html += '</optgroup>';
  }

  var msgs = (d.messages || []).filter(function(m){ return !srcIds.has(m.id); });
  if (msgs.length) {
    html += '<optgroup label="── Contact Messages ──">';
    msgs.forEach(function(m) {
      html += '<option value="message|' + m.id + '"' + (currentVal === 'message|' + m.id ? ' selected' : '') + '>' +
        escHtml(m.name || '—') + ' — ' + escHtml(m.email || '') + '</option>';
    });
    html += '</optgroup>';
  }
  return html;
}

function resolvePayClient(val) {
  if (!val) return {};
  var parts = val.split('|'), type = parts[0], id = parts[1];
  var d = window._data || {};
  if (type === 'crm') {
    var l = (d.crm_leads || []).find(function(x){ return x.id === id; });
    return l ? { name:l.name, email:l.email, phone:l.phone, leadId:l.id, ventureId:l.ventureId, biz:l.businessName } : {};
  }
  if (type === 'client') {
    var c = (d.clients || []).find(function(x){ return x.id === id; });
    return c ? { name:c.name, email:c.email||'', phone:c.contact||'', leadId:c.leadId||'', ventureId:c.ventureId, biz:'' } : {};
  }
  if (type === 'intake') {
    var l = (d.leads || []).find(function(x){ return x.id === id; });
    if (!l) return {};
    return { name:((l.firstName||'')+' '+(l.lastName||'')).trim(), email:l.email, phone:l.phone||'', leadId:id, ventureId:'studio', biz:'' };
  }
  if (type === 'inquiry') {
    var i = (d.inquiries || []).find(function(x){ return x.id === id; });
    if (!i) return {};
    var vm={brand_launch:'studio',sales_system:'studio',systemization:'studio',platform_dev:'studio',
            web3_dev:'gata',gata_onboard:'gata',venture_build:'studio',enterprise_sw:'studio'};
    return { name:i.name, email:i.email, phone:i.phone||'', leadId:id, ventureId:vm[i.service]||'studio', biz:i.businessName||'' };
  }
  if (type === 'message') {
    var m = (d.messages || []).find(function(x){ return x.id === id; });
    return m ? { name:m.name, email:m.email, phone:'', leadId:id, ventureId:'studio', biz:'' } : {};
  }
  return {};
}

    html += '</optgroup>';
  });
  return html;
}

function buildPayProposalOptions(leadId) {
  var sel = document.getElementById('pay-proposal-link'); if (!sel) return;
  var props = leadId ? (window._data ? window._data.proposals || [] : []).filter(function(p){ return p.leadId === leadId; }) : [];
  sel.innerHTML = '<option value="">— Not linked to a proposal —</option>' + props.map(function(p) {
    return '<option value="' + p.id + '">' + escHtml(p.title || 'Untitled') + ' · ₦' + Number(p.amount||0).toLocaleString() + ' [' + (p.status||'draft') + ']</option>';
  }).join('');
  if (props.length === 1) { sel.value = props[0].id; onPayProposalChange(); }

// ── Venture Access Control ────────────────────────────────────
function getMyVentures() {
  if (!window._data || !window._currentUser) return null;
  var role = window._userRole;
  if (role === 'founder' || role === 'ops_lead') return null; // see all
  var me = (window._data.team_members||[]).find(function(m){
    return (m.email||'').toLowerCase() === (window._currentUser.email||'').toLowerCase();
  });
  if (!me || !me.ventures || !me.ventures.length) return null; // no restriction set
  return me.ventures;
}

function canAccessVentureData(ventureId) {
  var myV = getMyVentures();
  if (myV === null) return true;          // unrestricted
  if (!ventureId) return true;            // no venture tag — visible to all
  return myV.indexOf(ventureId) !== -1;
}

// ── Phase Timeline Builder ─────────────────────────────────────
function buildPhaseTimeline(phaseHistory, currentPhase) {
  var history = (phaseHistory || []).slice();
  if (!history.length && currentPhase) {
    history = [{ phase:currentPhase, startedAt:new Date().toISOString(), note:'' }];
  }
  if (!history.length) {
    return '<div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);padding:8px 0;">No phase history recorded yet.</div>';
  }
  return '<div style="display:flex;flex-direction:column;gap:0;">' +
    history.slice().reverse().map(function(entry, i, arr) {
      var cfg     = getPhaseConfig(entry.phase);
      var isLast  = i === arr.length - 1;
      var isCurr  = i === 0;
      return '<div style="display:flex;gap:12px;padding-bottom:' + (isLast?'0':'18') + 'px;position:relative;">' +
        (!isLast ? '<div style="position:absolute;left:11px;top:24px;bottom:0;width:1px;background:var(--border);"></div>' : '') +
        '<div style="width:23px;height:23px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;border:1.5px solid ' + cfg.color + ';background:' + (isCurr?'rgba(255,255,255,.08)':'var(--bg)') + ';position:relative;z-index:1;">' +
          cfg.icon +
        '</div>' +
        '<div style="flex:1;padding-top:1px;">' +
          '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">' +
            '<div style="font-family:var(--mono);font-size:.62rem;font-weight:' + (isCurr?'700':'400') + ';color:' + cfg.color + ';">' + escHtml(cfg.label) + '</div>' +
            (isCurr ? '<span class="badge badge-green" style="font-size:.48rem;">Current</span>' : '') +
          '</div>' +
          '<div style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);margin-top:2px;">' + fmtDate(entry.startedAt) + '</div>' +
          (entry.note ? '<div style="font-size:.74rem;color:var(--dim);margin-top:5px;padding:5px 9px;background:rgba(255,255,255,.03);border-radius:4px;line-height:1.5;">' + escHtml(entry.note) + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

function crmFromIntake(l) {
  var r   = l.responses || {};

  var q3  = r.q3_revenue   && r.q3_revenue[0]   || '';

  var q4  = r.q4_pain      && r.q4_pain[0]      || '';
  var q10 = r.q10_goal     && r.q10_goal[0]     || '';
  var vId = 'studio';
  if (q1 === 'security_firm') vId = 'tek1security';
  else if (q1 === 'solar_vendor') vId = 'pawa';
  else if ((l.primaryRoute||'').includes('GATA')) vId = 'gata';
  else if ((l.primaryRoute||'').includes('Poverty')) vId = 'p2p';
  var seg = (q1 === 'security_firm' || q1 === 'solar_vendor' || q1 === 'company_team') ? 'type3' : 'type1';
  var dv  = q6 === 'premium_ready' ? 1500000 : q6 === 'can_invest' ? 500000 : q6 === 'low_cost' ? 100000 : 0;
  var name = ((l.firstName || '') + ' ' + (l.lastName || '')).trim() || l.email || 'Unknown';
  return {
    sourceType:'intake', sourceId:l.id,
    name:name, email:l.email||'', phone:l.phone||'', businessName:'',
    ventureId:vId, segment:seg, dealValue:dv,
    dealTier: dv>=1000000?3:dv>=250000?2:1,
    source:'intake_form', status:'new_lead',
    assignedTo:'', assignedName:'Unassigned', assignmentType:'auto',
    notes:'', intakeScore:l.score||0, intakeTier:l.tier||'',

    budget:q6, painPoint:q4, desiredOutcome:q10, currentStage:r.q2_stage&&r.q2_stage[0]||'',
    addedBy:'system', addedByName:'Auto-Synced',
    createdAt: new Date().toISOString()
  };
}

function crmFromInquiry(i) {

}

async function syncLeadsToCRM() {
  if (!window._data) return;
  var existing = window._data.crm_leads || [];
  var existingSrcIds = new Set(existing.map(function(l){ return l.sourceId; }).filter(Boolean));
  var writes = [];
  (window._data.leads || []).forEach(function(l) {
    if (!existingSrcIds.has(l.id)) writes.push(window._saveDoc('crm_leads', crmFromIntake(l)));
  });
  (window._data.inquiries || []).forEach(function(i) {
    if (!existingSrcIds.has(i.id)) writes.push(window._saveDoc('crm_leads', crmFromInquiry(i)));
  });
  (window._data.messages || []).forEach(function(m) {
    if (!existingSrcIds.has(m.id)) writes.push(window._saveDoc('crm_leads', crmFromMessage(m)));
  });
  if (writes.length > 0) {
    await Promise.all(writes);
    toast(writes.length + ' lead' + (writes.length !== 1 ? 's' : '') + ' synced to CRM ✓', 'success');
    await window._loadAll();
  }
}

function buildStageRadios(currentStage) {

        'background:' + (isActive ? cfg.bg : 'rgba(255,255,255,.02)') + ';' +

async function deleteVenture(id) {
  if (!confirm('Remove this venture from the portfolio? This cannot be undone.')) return;
  var seed = isSeedVenture(id);
  var dbV  = (window._data ? window._data.ventures || [] : []).find(function(v){ return v.id === id; });
  try {
    if (seed) {
      // Seed ventures are hardcoded — mark as deleted in Firestore so they're suppressed
      var sv = VENTURES_SEED.find(function(v){ return v.id === id; });
      await window._setDoc('ventures', id, { name:(sv||{}).name||id, deleted:true });
    } else if (dbV) {
      await window._deleteDoc('ventures', id);
    }
    toast('Venture removed from portfolio ✓', 'success');
    closeDrawer();
    window._loadAll();
  } catch(e) { toast('Delete failed: ' + (e.message||e), 'error'); }
}

async function readFileAsBase64(file) {
  return new Promise(function(resolve, reject) {
    if (file.size > 204800) { resolve({ tooBig:true, name:file.name }); return; }
    var r = new FileReader();
    r.onload  = function() { resolve({ data:r.result, name:file.name }); };
    r.onerror = function() { reject(new Error('File read failed')); };
    r.readAsDataURL(file);
  });
}

function applyFinDateQuick(val) {
  if (!val) return;
  var now = new Date(), fmt = function(d){return d.toISOString().split('T')[0];};
  var from = '', to = fmt(now);
  if (val==='today')     { from = to; }
  else if (val==='week') { var m=new Date(now);m.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));from=fmt(m); }
  else if (val==='month')     { from = fmt(new Date(now.getFullYear(),now.getMonth(),1)); }
  else if (val==='lastmonth') { from=fmt(new Date(now.getFullYear(),now.getMonth()-1,1));to=fmt(new Date(now.getFullYear(),now.getMonth(),0)); }
  else if (val==='3months')   { var d=new Date(now);d.setMonth(d.getMonth()-3);from=fmt(d); }
  else if (val==='year')      { from=fmt(new Date(now.getFullYear(),0,1)); }
  var fEl=document.getElementById('fin-f-from'), tEl=document.getElementById('fin-f-to');
  if (fEl) fEl.value=from; if (tEl) tEl.value=to;
  applyFinFilters();
}

<script>
// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(window._tt);window._tt=setTimeout(function(){t.className='';},3200);}
function fmtDate(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}
function fmtTime(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function timeAgo(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);var diff=Date.now()-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return Math.floor(diff/86400000)+'d ago';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tierBadge(tier){if(!tier)return'<span class="badge badge-dim">—</span>';if(tier.includes('A'))return'<span class="badge badge-green">Tier A</span>';if(tier.includes('B'))return'<span class="badge badge-gold">Tier B</span>';return'<span class="badge badge-blue">Tier C</span>';}
function scoreBadge(score){var s=parseInt(score)||0;var cls=s>=70?'tier-a':s>=40?'tier-b':'tier-c';return'<div class="score-ring '+cls+'">'+s+'</div>';}
function statusBadge(status){var map={paid:'badge-green',pending:'badge-gold',partial:'badge-orange',overdue:'badge-red',draft:'badge-dim',sent:'badge-cyan',accepted:'badge-green',declined:'badge-red',active:'badge-cyan',completed:'badge-green',cancelled:'badge-red','in-progress':'badge-purple','on-hold':'badge-orange',interview:'badge-cyan',hired:'badge-green',rejected:'badge-red',phase1:'badge-amber',phase2:'badge-blue',phase3:'badge-green',employed:'badge-green',open:'badge-green',filled:'badge-red',closed:'badge-dim'};var cls=map[status]||'badge-dim';return'<span class="badge '+cls+'">'+escHtml(status||'—')+'</span>';}
function serviceLabel(svc){var map={brand_launch:'01 · Brand Launch',sales_system:'02 · Sales System',systemization:'03 · Systemization',platform_dev:'04 · Platform Dev',web3_dev:'05 · Web3 Dev',gata_onboard:'06 · GATA',venture_build:'07 · Venture Build',enterprise_sw:'08 · Enterprise SW'};return map[svc]||svc||'—';}
function initials(name){if(!name)return'?';var p=name.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function phaseBadge(a){
  var s=a.status||'pending';
  if(s==='phase1')return'<span class="badge badge-amber">Phase 1</span>';
  if(s==='phase2')return'<span class="badge badge-blue">Phase 2</span>';
  if(s==='phase3')return'<span class="badge badge-green">Phase 3</span>';
  if(s==='hired'||s==='employed')return'<span class="badge badge-green">Confirmed</span>';
  if(s==='interview')return'<span class="badge badge-cyan">Interview</span>';
  if(s==='rejected')return'<span class="badge badge-red">Rejected</span>';
  return'<span class="badge badge-dim">Pending</span>';
}

// ═══════════════════════════════════════
// NAV & PANEL ROUTING
// ═══════════════════════════════════════
function toggleSidebar(){var sb=document.getElementById('main-sidebar');var ov=document.getElementById('mob-overlay');sb.classList.toggle('open');ov.classList.toggle('open');}
function closeSidebar(){document.getElementById('main-sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('open');}
function showPanelMob(name,el){showPanel(name,document.querySelector('.nav-item[data-panel="'+name+'"]'));document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.remove('active');});if(el)el.classList.add('active');}

var PANEL_TITLES={overview:'Overview → Dashboard',leads:'Intake Leads → Diagnostic Results',inquiries:'Inquiries → Service Forms',messages:'Messages → Contact Inbox',applicants:'Applicants → Careers Portal',crm:'CRM Pipeline → Lead Kanban',people:'People → Unified Profiles',proposals:'Proposals → Quotes & Offers',payments:'Payments → Revenue Tracking',assignments:'Assignments → Routing',ventures:'Ventures → Portfolio',tasks:'Task Board → Kanban',clients:'Clients → Onboarding',finance:'Finance → P&L Intelligence',team:'Team Members → Active Staff',vacancies:'Vacancies → Role Management',reports:'Daily Reports → Accountability',sops:'SOPs → Procedures & Reference',settings:'Settings → Configuration'};

function showPanel(name, el) {
  // Guard — only switch if panel exists
  var panel = document.getElementById('panel-' + name);
  if (!panel) return;

  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  panel.classList.add('active');
  if (el) el.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.panel === name);
  });

  var title = PANEL_TITLES[name] || name;
  var parts = title.split(' → ');
  var ptEl  = document.getElementById('panel-title');
  if (ptEl) ptEl.innerHTML = escHtml(parts[0]) + (parts[1] ? ' <span>→ ' + escHtml(parts[1]) + '</span>' : '');

  // Scroll content area to top
  var ca = document.getElementById('content-area');
  if (ca) ca.scrollTop = 0;

  // Push to browser history (avoid duplicate entries)
  var hash = '#' + name;
  if (window.location.hash !== hash) {
    history.pushState({ panel:name }, '', hash);
  }

  closeSidebar();
}

function showPanelMob(name, el) {
  showPanel(name, document.querySelector('.nav-item[data-panel="' + name + '"]'));
  document.querySelectorAll('.bnav-item').forEach(function(b) { b.classList.remove('active'); });
  if (el) el.classList.add('active');
}

// Handle browser Back/Forward
window.addEventListener('popstate', function(e) {
  var panelName = (e.state && e.state.panel) || 'overview';
  var navEl = document.querySelector('.nav-item[data-panel="' + panelName + '"]');
  showPanel(panelName, navEl);
  // Keep hash in sync without pushing new state
  if (window.location.hash !== '#' + panelName) {
    history.replaceState({ panel:panelName }, '', '#' + panelName);
  }
});

// On initial load — read hash and navigate to it
function initHashNav() {
  var hash = window.location.hash.replace('#', '');
  if (hash && document.getElementById('panel-' + hash)) {
    var navEl = document.querySelector('.nav-item[data-panel="' + hash + '"]');
    showPanel(hash, navEl);
    // Replace initial history entry with state
    history.replaceState({ panel:hash }, '', '#' + hash);
  } else {
    history.replaceState({ panel:'overview' }, '', '#overview');
  }
}
