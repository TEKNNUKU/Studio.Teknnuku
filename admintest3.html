async function submitProposalAndMoveLead(leadId) {
  var l = (window._data.crm_leads||[]).find(function(x){return x.id===leadId;});
  if (!l) return;
  var title  = (document.getElementById('pl-title') ||{}).value||'';
  var amount = parseFloat((document.getElementById('pl-amount')||{}).value)||0;
  if (!title)  { toast('Proposal title is required','error'); return; }
  if (!amount) { toast('Amount is required','error'); return; }
  try {
    var propId = await window._saveDoc('proposals', {
      title:title,
      service:(document.getElementById('pl-service')||{}).value||'',
      personName:l.name||'', personEmail:l.email||'',
      amount:amount,
      validUntil:(document.getElementById('pl-valid')||{}).value||'',
      body:(document.getElementById('pl-body')||{}).value||'',
      status:'sent', leadId:leadId,
      sentAt:new Date().toISOString()
    });
    await window._updateDoc('crm_leads', leadId, {
      status:'proposal', proposalId:propId,
      proposalAt:new Date().toISOString(),
      dealValue:amount,
      dealTier:amount>=1000000?3:amount>=250000?2:1
    });
    toast('Proposal created and lead moved to Proposal ✓','success');
    closeDrawer();
    await window._loadAll();
  } catch(e) { toast('Error: '+(e.message||e),'error'); }
}

// ── Ventures ──────────────────────────────────────────────────
function renderVentures(dbVentures, tasks, crm_leads, clients, financials) {
  // Suppress seed ventures that have been deleted via Firestore tombstone
  var deletedIds = new Set(
    dbVentures.filter(function(v){ return v.deleted; }).map(function(v){ return v.id; })
  );

  // Merged list: seed ventures not overridden/deleted + all non-deleted DB ventures
  var allV = [
    ...VENTURES_SEED.filter(function(v){
      return !dbVentures.find(function(dv){ return dv.id === v.id; }) && !deletedIds.has(v.id);
    }),
    ...dbVentures.filter(function(v){ return !v.deleted; })
  ];

  // KPIs
  var elT = document.getElementById('ven-kpi-total');    if(elT) elT.textContent = allV.length;
  var elR = document.getElementById('ven-kpi-revenue');  if(elR) elR.textContent = allV.filter(function(v){ return (v.stage||'').toLowerCase()==='revenue'; }).length;
  var elB = document.getElementById('ven-kpi-building'); if(elB) elB.textContent = allV.filter(function(v){ return (v.stage||'').toLowerCase()==='building'; }).length;

  var grid = document.getElementById('ventures-grid'); if (!grid) return;

  // Build stat maps
  var finMap = {}, taskMap = {}, leadMap = {}, clientMap = {};
  financials.forEach(function(f) {
    if (!finMap[f.ventureId]) finMap[f.ventureId] = {i:0, e:0};
    if (f.type==='income') finMap[f.ventureId].i += parseFloat(f.amount)||0;
    else                   finMap[f.ventureId].e += parseFloat(f.amount)||0;
  });
  tasks.forEach(function(t) {
    if (!taskMap[t.ventureId]) taskMap[t.ventureId] = {tot:0, done:0};
    taskMap[t.ventureId].tot++;
    if (t.status==='done') taskMap[t.ventureId].done++;
  });
  crm_leads.forEach(function(l){ leadMap[l.ventureId]   = (leadMap[l.ventureId]||0)   + 1; });
  clients.forEach(function(c){   clientMap[c.ventureId] = (clientMap[c.ventureId]||0) + 1; });

  if (!allV.length) {
    grid.innerHTML = '<div class="empty-state" style="padding:48px;"><div class="empty-icon">🏢</div>No ventures in portfolio</div>';
    return;
  }

  var canEdit = canAccess('settings') || window._userRole === 'founder' || window._userRole === 'ops_lead';

  var STAGE_COLORS = {
    idea:'badge-dim', building:'badge-amber', revenue:'badge-green', scaling:'badge-cyan'
  };
  var STAGE_BORDER = {
    idea:'rgba(242,237,228,.1)', building:'rgba(245,158,11,.2)',
    revenue:'rgba(34,197,94,.2)', scaling:'rgba(0,188,212,.2)'
  };

  grid.innerHTML = allV.map(function(v) {
    var f      = finMap[v.id]  || {i:0, e:0};
    var tm     = taskMap[v.id] || {tot:0, done:0};
    var profit = f.i - f.e;
    var h      = tm.tot > 0 ? Math.round((tm.done / tm.tot) * 100) : (v.health || 0);
    var hc     = h >= 70 ? 'hf-green' : h >= 40 ? 'hf-yellow' : 'hf-red';
    var sc     = (v.stage||'idea').toLowerCase();
    var isDbV  = !!dbVentures.find(function(dv){ return dv.id === v.id && !dv.deleted; });
    var isSeed = isSeedVenture(v.id);

    return '<div class="venture-card" style="border-color:' + (STAGE_BORDER[sc]||'rgba(200,155,20,.12)') + ';">' +

      // ── Header ─────────────────────────────────────────────
      '<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;">' +
        '<div style="width:40px;height:40px;border-radius:9px;background:' + escHtml(v.color||'var(--gold)') + ';display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:17px;color:#080808;flex-shrink:0;">' +
          escHtml((v.name||'?')[0]) +
        '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);">' + escHtml(v.name) + '</div>' +
          '<div style="font-size:.72rem;color:var(--dimmer);margin-top:2px;">' + escHtml(v.focus||'') + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">' +
          '<span class="badge ' + (STAGE_COLORS[sc]||'badge-dim') + '">' + escHtml(v.stage||'Idea') + '</span>' +
          (isSeed ? '<span style="font-family:var(--mono);font-size:.48rem;color:var(--dimmer);letter-spacing:.08em;">SEED</span>' : '') +
        '</div>' +
      '</div>' +

      // ── Stats grid ──────────────────────────────────────────
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;text-align:center;">' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Leads</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--gold);">' + (leadMap[v.id]||0) + '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Clients</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:1.2rem;color:var(--cyan);">' + (clientMap[v.id]||0) + '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Revenue</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.82rem;color:var(--green);">₦' + (f.i >= 1000000 ? (f.i/1000000).toFixed(1)+'M' : f.i >= 1000 ? Math.round(f.i/1000)+'k' : f.i.toLocaleString()) + '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.03);border-radius:6px;padding:8px 4px;">' +
          '<div style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Net</div>' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.82rem;color:' + (profit>=0?'var(--gold)':'var(--red)') + ';">' + (profit<0?'−':'') + '₦' + (Math.abs(profit) >= 1000000 ? (Math.abs(profit)/1000000).toFixed(1)+'M' : Math.abs(profit) >= 1000 ? Math.round(Math.abs(profit)/1000)+'k' : Math.abs(profit).toLocaleString()) + '</div>' +
        '</div>' +
      '</div>' +

      // ── Health bar ──────────────────────────────────────────
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:' + (canEdit ? '12' : '0') + 'px;">' +
        '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);width:52px;">Health</div>' +
        '<div class="health-bar" style="flex:1;margin:0;"><div class="health-fill ' + hc + '" style="width:' + h + '%;"></div></div>' +
        '<span style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);min-width:30px;text-align:right;">' + h + '%</span>' +
      '</div>' +

      // ── Edit / Delete ───────────────────────────────────────
      (canEdit ?
        '<div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid rgba(200,155,20,.08);">' +
          '<button class="action-btn" style="flex:1;justify-content:center;" onclick="openEditVenture(\'' + v.id + '\')">' +
            '✏ Edit' + (isSeed && !isDbV ? ' Stage' : '') +
          '</button>' +
          '<button class="action-btn danger" style="flex:1;justify-content:center;" onclick="deleteVenture(\'' + v.id + '\')">' +
            '🗑 Remove' +
          '</button>' +
        '</div>'
        : '') +

    '</div>';
  }).join('');
}

function saveVenture(id) {
  var name    = (document.getElementById('ven-name')  ||{}).value||'';
  var focus   = (document.getElementById('ven-focus') ||{}).value||'';
  var stageEl = document.querySelector('input[name="ven-stage-r"]:checked');
  var stage   = stageEl ? stageEl.value : 'Idea';

  if (!name.trim()) { toast('Venture name is required', 'error'); return; }

  var isNew  = !id;
  var seed   = id ? isSeedVenture(id) : false;
  var dbV    = id ? (window._data ? window._data.ventures||[] : []).find(function(v){ return v.id===id && !v.deleted; }) : null;

  // Preserve colour and segment from seed definition when saving to Firestore
  var seedV  = seed ? VENTURES_SEED.find(function(v){ return v.id === id; }) : null;
  var data   = {
    name:    name.trim(),
    focus:   focus.trim(),
    stage:   stage,
    color:   (dbV && dbV.color)   || (seedV && seedV.color)   || 'linear-gradient(135deg,var(--gold),var(--goldL))',
    segment: (dbV && dbV.segment) || (seedV && seedV.segment) || 'type1'
  };

  var fn;
  if (isNew) {
    // Brand-new venture → auto-generated Firestore ID
    fn = window._saveDoc('ventures', data);
  } else {
    // Seed venture (first save) or existing DB venture with known ID → setDoc preserves/creates the doc
    fn = window._setDoc('ventures', id, data);
  }

  fn.then(function() {
    toast('Venture saved ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e) { toast('Save failed: ' + (e.message||e), 'error'); });
}

// Determine whether the current user can see a given task
// Non-privileged roles only see tasks assigned to them or unassigned tasks
// on ventures relevant to their role
function taskVisibleToUser(task) {
  var role = window._userRole;
  // Founder and ops lead see everything
  if (role === 'founder' || role === 'ops_lead') return true;

  var cu = window._currentUser;
  if (!cu) return false;

  var d  = window._data || {};
  var me = (d.team_members||[]).find(function(m){
    return (m.email||'').toLowerCase() === (cu.email||'').toLowerCase();
  });

  // Determine which ventures this role is responsible for
  // Use the TEAM_FOR_ROLE map — Delivery team sees all ventures by default
  var deliveryRoles = ['tech_product_lead','developer','onboarding_specialist'];
  var salesRoles    = ['sales_manager','inbound_closer','outbound_closer'];
  var contentRoles  = ['content_lead','content_creator','outreach_lead_gen'];

  // If task is assigned to me specifically — always visible
  if (me && task.assignedTo === me.id) return true;

  // Unassigned tasks visible to Delivery roles on any venture
  if (!task.assignedTo && deliveryRoles.indexOf(role) !== -1) return true;

  // Sales roles see tasks on ventures they're assigned to (no venture restriction)
  if (salesRoles.indexOf(role) !== -1) return true;

  // Content roles see tasks on any venture
  if (contentRoles.indexOf(role) !== -1) return true;

  // CS Manager: sees tasks on their assigned clients' ventures
  if (role === 'customer_success_manager') {
    var myClients = (d.clients||[]).filter(function(c){ return c.csManager === (me && me.id); });
    var myVentures = new Set(myClients.map(function(c){ return c.ventureId; }));
    if (myVentures.has(task.ventureId)) return true;
  }

  // Admin/Finance: no task visibility beyond assigned
  return false;
}

  var opts = '<option value="">All Members</option>' +

  members.forEach(function(m) {

      escHtml(m.name||m.email||'—') + ' · ' + escHtml(ROLE_LABELS[m.role]||m.role||'') +

function renderTasks(tasks, members) {
  // Rebuild member filter dropdown
  var mfEl = document.getElementById('tf-member');
  if (mfEl) {
    var cur = mfEl.value;
    mfEl.innerHTML = buildTaskMemberOptions(cur);
    if (cur) mfEl.value = cur;
  }

  var memberMap = {};
  members.forEach(function(m){ memberMap[m.id] = m; });

  var today = new Date(); today.setHours(0,0,0,0);

  // Step 1: apply role-based visibility
  var visible = tasks.filter(function(t){ return taskVisibleToUser(t); });

  // Step 2: apply active filters
  var f = _taskFilters;
  var filtered = visible.filter(function(t) {
    if (f.venture && t.ventureId !== f.venture) return false;
    if (f.status  && t.status    !== f.status)  return false;
    if (f.member === '__unassigned__' && t.assignedTo) return false;
    if (f.member && f.member !== '__unassigned__' && t.assignedTo !== f.member) return false;
    if (f.search && !(t.title||'').toLowerCase().includes(f.search)) return false;
    return true;
  });

  // KPIs — from role-scoped visible set (not filtered)
  var total   = visible.length;
  var wip     = visible.filter(function(t){ return t.status==='in_progress'; }).length;
  var overdue = visible.filter(function(t){ return t.status!=='done' && t.deadline && new Date(t.deadline) < today; }).length;
  var done    = visible.filter(function(t){ return t.status==='done'; }).length;
  setText('task-kpi-total',   total);
  setText('task-kpi-wip',     wip);
  setText('task-kpi-overdue', overdue);

  // Count label reflects filtered set
  var lbl = document.getElementById('task-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + total + ' task' + (total!==1?'s':'');

  var board = document.getElementById('tasks-board'); if (!board) return;

  var COLS = [
    { k:'todo',        l:'To Do',       dot:'var(--dimmer)', accent:'rgba(242,237,228,.06)' },
    { k:'in_progress', l:'In Progress', dot:'var(--gold)',   accent:'rgba(200,155,20,.06)'  },
    { k:'review',      l:'Review',      dot:'var(--amber)',  accent:'rgba(245,158,11,.06)'  },
    { k:'done',        l:'Done ✅',     dot:'var(--green)',  accent:'rgba(34,197,94,.06)'   }
  ];

  // If a specific status is filtered, show only that column
  var colsToShow = f.status ? COLS.filter(function(c){ return c.k === f.status; }) : COLS;
  var colStyle   = f.status
    ? 'grid-template-columns:1fr;max-width:420px;'
    : 'grid-template-columns:repeat(4,1fr);';
  board.style.cssText = 'display:grid;gap:12px;' + colStyle + 'overflow-x:auto;padding-bottom:8px;';

  board.innerHTML = colsToShow.map(function(col) {
    var ct = filtered.filter(function(t){ return t.status === col.k; });

    return '<div class="kanban-col">' +
      '<div class="kanban-col-header" style="background:' + col.accent + ';">' +
        '<div class="kanban-col-title">' +
          '<div class="col-dot" style="background:' + col.dot + '"></div>' + col.l +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          (ct.length ? '<span style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);">' +
            ct.reduce(function(s,t){ return s + (t.priority==='high'?1:0); },0) + ' 🔥' +
          '</span>' : '') +
          '<div class="col-count">' + ct.length + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="kanban-col-body">' +
      (ct.length
        ? ct.map(function(t) {
            var v        = V_MAP[t.ventureId] || {};
            var od       = t.deadline && new Date(t.deadline) < today && t.status !== 'done';
            var assignee = t.assignedTo ? memberMap[t.assignedTo] : null;
            var PRI_STYLE = {
              high:   'color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);',
              medium: 'color:var(--amber);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);',
              low:    'color:var(--dimmer);background:rgba(255,255,255,.04);border:1px solid rgba(242,237,228,.06);'
            };
            var priStyle = PRI_STYLE[t.priority||'low'];

            return '<div class="kanban-item" onclick="openTaskDrawer(\'' + t.id + '\')" style="' +
              (od ? 'border-color:rgba(239,68,68,.3);' : '') + '">' +

              // Priority pill
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">' +
                '<span style="font-family:var(--mono);font-size:.5rem;letter-spacing:.06em;padding:2px 7px;border-radius:3px;' + priStyle + '">' +
                  (t.priority==='high'?'🔥 HIGH':t.priority==='medium'?'🟡 MED':'⚪ LOW') +
                '</span>' +
                (od ? '<span style="font-family:var(--mono);font-size:.5rem;color:var(--red);">OVERDUE</span>' : '') +
              '</div>' +

              // Title
              '<div class="kanban-item-title" style="margin-bottom:7px;">' + escHtml(t.title||'—') + '</div>' +

              // Tags
              (t.ventureId
                ? '<div style="margin-bottom:7px;"><span class="venture-tag">' + escHtml(v.name||t.ventureId) + '</span></div>'
                : '') +

              // Deadline
              (t.deadline

              // Assignee footer
              '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid rgba(200,155,20,.06);">' +
                (assignee

                        escHtml(initials(assignee.name||assignee.email||'?')) +

                      '<span style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
                        escHtml((assignee.name||assignee.email||'').split(' ')[0]) +
                      '</span>' +
                    '</div>'
                  : '<span style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);">Unassigned</span>'
                ) +
                '<span style="font-family:var(--mono);font-size:.5rem;color:var(--dimmer);">' + timeAgo(t.createdAt) + '</span>' +
              '</div>' +

            '</div>';
          }).join('')
        : '<div class="empty-state" style="padding:18px;font-size:.62rem;">' +
            '<div style="font-size:1.1rem;margin-bottom:4px;">📋</div>Empty' +
          '</div>'
      ) +
      '</div></div>';
  }).join('');
}

function applyClientFilters() {
  var fQ  = ((document.getElementById('cl-f-search')    ||{}).value||'').toLowerCase().trim();
  var fP  = (document.getElementById('cl-f-payment')    ||{}).value||'';
  var fO  = (document.getElementById('cl-f-onboarding') ||{}).value||'';
  var fV  = (document.getElementById('cl-f-venture')    ||{}).value||'';
  var fS  = (document.getElementById('cl-f-status')     ||{}).value||'';
  var clients = window._data ? window._data.clients || [] : [];

  var filtered = clients.filter(function(c) {
    if (fS && c.status !== fS) return false;
    if (fP && c.paymentStatus   !== fP) return false;
    if (fO && c.onboardingStatus!== fO) return false;
    if (fV && c.ventureId       !== fV) return false;
    if (fQ) {
      var hay = ((c.name||'')+(c.email||'')+(c.businessName||'')+(c.phone||'')+(c.contact||'')).toLowerCase();
      if (!hay.includes(fQ)) return false;
    }
    return true;
  });

  renderClientsTable(filtered, window._data ? window._data.team_members || [] : []);
  var lbl = document.getElementById('cl-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + clients.length + ' client' + (clients.length !== 1 ? 's' : '');
}

function renderClients(clients, members) {
  // KPIs
  var active    = clients.filter(function(c){ return c.status !== 'churned'; }).length;
  var pending   = clients.filter(function(c){ return c.onboardingStatus === 'pending'; }).length;
  var onboarded = clients.filter(function(c){ return c.onboardingStatus === 'complete'; }).length;
  var mrr       = clients.filter(function(c){ return c.status !== 'churned'; })
                         .reduce(function(s,c){ return s + (parseFloat(c.monthlyValue)||0); }, 0);
  setText('cl-kpi-active',    active);
  setText('cl-kpi-pending',   pending);
  setText('cl-kpi-onboarded', onboarded);
  setText('cl-kpi-mrr',       '₦' + mrr.toLocaleString());

  var lbl = document.getElementById('cl-count-label');
  if (lbl) lbl.textContent = clients.length + ' client' + (clients.length !== 1 ? 's' : '');

  renderClientsTable(clients, members);
}

function renderClientsTable(clients, members) {
 // Venture-based data restriction
  clients = clients.filter(function(c){ return canAccessVentureData(c.ventureId); });
  var tbody = document.getElementById('clients-tbody'); if (!tbody) return;

  if (!clients.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">' +

  var memberMap = {};
  (members || []).forEach(function(m) { memberMap[m.id] = m; });

  var OB_COLORS = {
    pending:     'var(--red)',
    in_progress: 'var(--amber)',
    complete:    'var(--green)'

    pending:     '⏳ Pending',

    return new Date(b.wonAt||b.createdAt||0) - new Date(a.wonAt||a.createdAt||0);

        '<div style="font-size:.78rem;color:var(--white);">' + escHtml(c.package || c.serviceLabel || '—') + '</div>' +
        (c.serviceId ? '<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">' + escHtml(c.serviceId) + '</div>' : '') +
        (c.paymentDuration ? '<div style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">' + escHtml(c.paymentDuration) + '</div>' : '') +

      // Contract value
      '<td style="font-family:var(--mono);font-weight:700;color:var(--gold);">' + (amt ? '₦' + amt.toLocaleString() : '—') + '</td>' +
      // Payment
      '<td>' + payBadge + '</td>' +
      // Onboarding
      '<td>' +
        '<div style="font-family:var(--mono);font-size:.62rem;color:' + obColor + ';">' + obLabel + '</div>' +
        '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px;width:80px;">' +
          '<div style="width:' + (c.onboardingStatus==='complete'?'100':c.onboardingStatus==='in_progress'?'50':'8') + '%;height:100%;background:' + obColor + ';border-radius:2px;transition:width .5s;"></div>' +

      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">' + escHtml(cs ? cs.name || cs.email : '—') + '</td>' +

}

// ── Client update — status, onboarding, CS manager only ───────
function saveClientUpdate(id) {
  var data = {
    onboardingStatus: (document.getElementById('cl-u-ob')       || {}).value || 'pending',
    onboardingNotes:  (document.getElementById('cl-u-ob-notes') || {}).value || '',
    csManager:        (document.getElementById('cl-u-cs')        || {}).value || '',
    paymentStatus:    (document.getElementById('cl-u-pay')       || {}).value || 'pending',
    status:           (document.getElementById('cl-u-st')        || {}).value || 'active'
  };
  window._updateDoc('clients', id, data).then(function() {
    toast('Client updated ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e) { toast('Update failed: ' + (e.message || e), 'error'); });
}

// ── Finance ────────────────────────────────────────────────────
var _finTxFilter='';
function filterTransactions(type){_finTxFilter=type;renderFinance(window._data.financials||[],window._data.clients||[]);}
function renderFinance(financials, clients) {
  // ── All-time stats (always full dataset, never filtered) ───
  var allFin = window._data ? window._data.financials || [] : [];
  var allPay = window._data ? window._data.payments   || [] : [];
  var totRev = 0, totExp = 0;
  allFin.forEach(function(f){ var a=parseFloat(f.amount)||0; if(f.type==='income')totRev+=a; else totExp+=a; });
  var net    = totRev - totExp;
  var margin = totRev > 0 ? Math.round((net/totRev)*100) : 0;
  var pendAmt= 0, overdAmt= 0;
  allPay.forEach(function(p){ var a=parseFloat(p.amount)||0; if(p.status==='pending')pendAmt+=a; if(p.status==='overdue')overdAmt+=a; });

  setText('fin-stat-rev',      '₦' + totRev.toLocaleString());
  setText('fin-stat-exp',      '₦' + totExp.toLocaleString());
  setText('fin-stat-profit',   (net<0?'−':'') + '₦' + Math.abs(net).toLocaleString());
  setText('fin-stat-margin',   margin + '% net margin');
  setText('fin-stat-liability','₦' + (pendAmt + overdAmt).toLocaleString());
  setText('fin-stat-liability-meta', '₦'+pendAmt.toLocaleString()+' pending · ₦'+overdAmt.toLocaleString()+' overdue');
  var pc = document.getElementById('fin-profit-card');
  if (pc) pc.className = 'kpi-card ' + (net >= 0 ? 'green' : 'red');

  // ── Per-venture P&L ───────────────────────────────────────
  if (!_vplCollapsed) {
    var vd = {};
    VENTURES_SEED.forEach(function(v){ vd[v.id]={name:v.name,i:0,e:0}; });
    allFin.forEach(function(f){
      if (!vd[f.ventureId]) vd[f.ventureId]={name:f.ventureId||'Other',i:0,e:0};
      if (f.type==='income') vd[f.ventureId].i+=parseFloat(f.amount)||0;
      else vd[f.ventureId].e+=parseFloat(f.amount)||0;
    });
    var plEl = document.getElementById('fin-venture-pl');
    var plData = Object.values(vd).filter(function(v){return v.i||v.e;});
    if (plEl) {
      if (!plData.length) {
        plEl.innerHTML = '<div class="empty-state" style="padding:20px;"><div class="empty-icon">📊</div>No financial records yet</div>';
      } else {
        plEl.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;">' +
          plData.map(function(v) {
            var np = v.i - v.e, col = np>=0?'var(--green)':'var(--red)';
            var share = totRev>0?Math.min(Math.round(v.i/totRev*100),100):0;
            return '<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;">' +
              '<div style="font-family:var(--display);font-weight:700;font-size:.84rem;margin-bottom:10px;">' + escHtml(v.name) + '</div>' +
              '<div class="fin-row"><span class="fin-row-label">Revenue</span><span class="fin-income">₦'+v.i.toLocaleString()+'</span></div>' +
              '<div class="fin-row"><span class="fin-row-label">Expenses</span><span class="fin-expense">₦'+v.e.toLocaleString()+'</span></div>' +
              '<div class="fin-row" style="border-top:1px solid rgba(200,155,20,.08);margin-top:5px;padding-top:7px;">' +
                '<span style="font-weight:600;color:var(--white);font-size:.82rem;">Net</span>' +
                '<span style="font-family:var(--mono);font-weight:700;color:'+col+';">'+(np<0?'−':'')+'₦'+Math.abs(np).toLocaleString()+'</span>' +
              '</div>' +
              '<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px;">' +
                '<div style="width:'+share+'%;height:100%;background:var(--gold);border-radius:2px;"></div>' +
              '</div>' +
              '<div style="font-family:var(--mono);font-size:.52rem;color:var(--dimmer);margin-top:3px;">'+share+'% of total revenue</div>' +
            '</div>';
          }).join('') +
        '</div>';
      }
    }
  }

  // ── Apply filters to transactions ─────────────────────────
  var filtered = allFin.filter(function(f) {
    if (!canAccessVentureData(f.ventureId)) return false;
    if (_finFilters.type     && f.type       !== _finFilters.type)     return false;
    if (_finFilters.venture  && f.ventureId  !== _finFilters.venture)  return false;
    if (_finFilters.category && f.category   !== _finFilters.category) return false;
    if (_finFilters.search) {
      var hay = ((f.description||'')+(f.category||'')+(f.invoiceRef||'')+(f.notes||'')).toLowerCase();
      if (!hay.includes(_finFilters.search)) return false;
    }
    if (_finFilters.from) {
      var fd = (f.date || f.createdAt || '').substring(0,10);
      if (fd && fd < _finFilters.from) return false;
    }
    if (_finFilters.to) {
      var td = (f.date || f.createdAt || '').substring(0,10);
      if (td && td > _finFilters.to) return false;
    }
    return true;
  });

  filtered.sort(function(a,b){
    return ((b.date||b.createdAt||'').substring(0,10)).localeCompare((a.date||a.createdAt||'').substring(0,10));
  });

  var countEl = document.getElementById('fin-tx-count');
  if (countEl) countEl.textContent = filtered.length + ' transaction' + (filtered.length!==1?'s':'');

  var tbody = document.getElementById('finance-tbody'); if (!tbody) return;
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">💰</div>No transactions match your filters</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(f) {
    var v       = V_MAP[f.ventureId] || {name: f.ventureId||'—'};
    var isInc   = f.type === 'income';
    var amt     = parseFloat(f.amount)||0;
    var isAuto  = f.autoCreated || f.paymentId;
    var hasDoc  = f.invoiceFile||f.invoiceUrl||f.receiptFile||f.receiptUrl||f.externalLink;
    return '<tr>' +
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);white-space:nowrap;">' + fmtDate(f.date||f.createdAt) + '</td>' +
      '<td><span class="venture-tag">' + escHtml(v.name) + '</span></td>' +
      '<td><span class="badge '+(isInc?'badge-green':'badge-red')+'">' + escHtml((f.type||'').toUpperCase()) + '</span></td>' +
      '<td style="font-size:.74rem;color:var(--dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(f.category||'—') + '</td>' +

async function saveTransaction() {
  var type  = (document.getElementById('tx-type') ||{}).value||'';
  var vId   = (document.getElementById('tx-v')    ||{}).value||'';
  var amt   = parseFloat((document.getElementById('tx-amt')||{}).value)||0;
  var date  = (document.getElementById('tx-date') ||{}).value||'';
  if (!type||!vId||!amt||!date) { toast('Type, venture, amount and date are required','error'); return; }

  var data = {
    type:          type,
    ventureId:     vId,
    category:      (document.getElementById('tx-cat')   ||{}).value||'',
    amount:        amt,
    date:          date,
    paymentMethod: (document.getElementById('tx-method')||{}).value||'',
    description:   (document.getElementById('tx-desc')  ||{}).value||'',
    invoiceRef:    (document.getElementById('tx-ref')   ||{}).value||'',
    externalLink:  (document.getElementById('tx-link')  ||{}).value||'',
    invoiceUrl:    (document.getElementById('tx-inv-url')||{}).value||'',
    receiptUrl:    (document.getElementById('tx-rct-url')||{}).value||'',
    notes:         (document.getElementById('tx-notes') ||{}).value||''
  };

  // Preserve existing stored file if not replaced
  var keepInv = document.getElementById('tx-inv-keep');
  var keepRct = document.getElementById('tx-rct-keep');
  if (keepInv && keepInv.value==='1') {
    var fd=document.getElementById('tx-inv-file-data'), fn=document.getElementById('tx-inv-file-name');
    if (fd&&fd.value) { data.invoiceFile=fd.value; data.invoiceFileName=fn?fn.value:''; }
  }
  if (keepRct && keepRct.value==='1') {
    var rd=document.getElementById('tx-rct-file-data'), rn=document.getElementById('tx-rct-file-name');
    if (rd&&rd.value) { data.receiptFile=rd.value; data.receiptFileName=rn?rn.value:''; }
  }

  // Invoice file upload
  var invInput = document.getElementById('tx-inv-file');
  if (invInput && invInput.files && invInput.files[0]) {
    var invRes = await readFileAsBase64(invInput.files[0]);
    if (invRes.tooBig) { toast('Invoice file too large (max 200KB) — paste a link instead','error'); return; }
    data.invoiceFile = invRes.data; data.invoiceFileName = invRes.name;
    delete data.invoiceUrl;
  }

  // Receipt file upload
  var rctInput = document.getElementById('tx-rct-file');
  if (rctInput && rctInput.files && rctInput.files[0]) {
    var rctRes = await readFileAsBase64(rctInput.files[0]);
    if (rctRes.tooBig) { toast('Receipt file too large (max 200KB) — paste a link instead','error'); return; }
    data.receiptFile = rctRes.data; data.receiptFileName = rctRes.name;
    delete data.receiptUrl;
  }

  var btn = document.getElementById('tx-save-btn');
  if (btn) { btn.textContent='Saving…'; btn.disabled=true; }

  var fn = _editingTxId
    ? window._updateDoc('financials', _editingTxId, data)
    : window._saveDoc('financials', data);

  fn.then(function() {
    toast('Transaction saved ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e) {
    toast('Save failed: '+(e.message||e), 'error');
    if (btn) { btn.textContent='💾 Save Transaction'; btn.disabled=false; }
  });
}

  var subj = encodeURIComponent('Re: ' + (subject || 'Your Message') + ' — ' + (FW_CONFIG.companyName || 'TEKNNUKU Studio'));
  var body = encodeURIComponent('Hi ' + (name || 'there') + ',\n\nThank you for reaching out.\n\n');
  window.open('mailto:' + encodeURIComponent(email) + '?subject=' + subj + '&body=' + body, '_blank');
  toast('Opening email client…', 'success');
}

function markMessageReplied(id) {
  window._updateDoc('contact_messages', id, { status:'replied', repliedAt:new Date().toISOString() }).then(function() {
    toast('Marked as replied ✓', 'success');
    window._loadAll();
  }).catch(function(e) { toast('Update failed: ' + (e.message||e), 'error'); });
}
function deleteRecord(col,id){if(!confirm('Delete this record? This cannot be undone.'))return;window._deleteDoc(col,id).then(function(){toast('Deleted ✓','success');window._loadAll();}).catch(function(){toast('Delete failed','error');});}

// ═══════════════════════════════════════════════════════════════
//  QUICK CREATE FAB
// ═══════════════════════════════════════════════════════════════
var _fabOpen = false;

function toggleFAB() {
  _fabOpen = !_fabOpen;
  var menu = document.getElementById('fab-menu');
  var btn  = document.getElementById('fab-main');
  if (menu) menu.classList.toggle('open', _fabOpen);
  if (btn)  btn.textContent = _fabOpen ? '✕' : '＋';
}

function closeFAB() {
  _fabOpen = false;
  var menu = document.getElementById('fab-menu');
  var btn  = document.getElementById('fab-main');
  if (menu) menu.classList.remove('open');
  if (btn)  btn.textContent = '＋';
}

function fabCreate(type) {
  closeFAB();
  setTimeout(function() {
    if (type === 'proposal')   { openProposalDrawer(null, ''); }
    if (type === 'payment')    { openPaymentDrawer(null, '', '', ''); }
    if (type === 'assignment') { openAssignmentDrawer(null, '', ''); }
    if (type === 'task')       { openAddTask(); }
  }, 80);
}

// Close FAB when drawer opens or clicking elsewhere
document.addEventListener('click', function(e) {
  if (_fabOpen && !e.target.closest('#quick-fab')) closeFAB();
});

// Show FAB after login — hide on login screen
function updateFABVisibility() {
  var fab = document.getElementById('quick-fab');
  if (!fab) return;
  var canCreate = canAccess('proposals') || canAccess('payments') || canAccess('assignments') || canAccess('tasks');
  fab.style.display = canCreate ? 'flex' : 'none';
}
  
function _bindKeydown() {
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (_fabOpen) { closeFAB(); return; }
      closeDrawer();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      var gs = document.getElementById('global-search');
      if (gs) gs.focus();
    }
    // Ctrl/Cmd + Shift + P → quick proposal
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') {
      e.preventDefault(); fabCreate('proposal');
    }
    // Ctrl/Cmd + Shift + M → quick payment
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'M') {
      e.preventDefault(); fabCreate('payment');
    }
  });
}

// Wire up cross-app switcher links
(function() {
  var siteLink = document.getElementById('sw-site-link');
  var osLink   = document.getElementById('sw-os-link');
  if (siteLink) siteLink.href = (window.TEKNNUKU_URLS||{}).mainSite || 'https://teknnuku-studio.vercel.app';
  if (osLink)   osLink.href   = (window.TEKNNUKU_URLS||{}).commandCenter || 'https://teknnuku-os.vercel.app';
  // Hide OS link for roles that don't need it
  window._onRoleResolved_callbacks = window._onRoleResolved_callbacks || [];
  window._onRoleResolved_callbacks.push(function(role) {
    if (osLink && ['founder','ops_lead','sales_manager','tech_product_lead','developer','admin_finance_officer'].indexOf(role) === -1) {
      osLink.style.display = 'none';
    }
  });
})();

document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-pass').focus();});
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>

<!-- QUICK CREATE FAB -->
<div id="quick-fab">
  <div id="fab-menu">
    <button class="fab-option" onclick="fabCreate('proposal')"><span class="fab-dot" style="background:var(--gold);"></span>New Proposal</button>
    <button class="fab-option" onclick="fabCreate('payment')"><span class="fab-dot" style="background:var(--green);"></span>Log Payment</button>
    <button class="fab-option" onclick="fabCreate('assignment')"><span class="fab-dot" style="background:var(--cyan);"></span>New Assignment</button>

  </div>
  <button id="fab-main" onclick="toggleFAB()" title="Quick Create">＋</button>
</div>
