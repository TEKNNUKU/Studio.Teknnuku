var rec  = d.fin_receivables || [];
var pal  = d.fin_payables    || [];
var inv  = d.fin_investments || [];

  var totRev = 0, totExp = 0;
fin.forEach(function(f){ var a=parseFloat(f.amount)||0; if(f.type==='income')totRev+=a; else totExp+=a; });
var netProfit = totRev - totExp;

  // Cash available = sum of all account balances
var cashAvail = accts.reduce(function(s,a){ return s+(parseFloat(a.balance)||0); },0);

  // Outstanding receivables
var outRec = rec.filter(function(r){return r.status!=='Paid';}).reduce(function(s,r){return s+(parseFloat(r.outstandingAmount)||0);},0);

// Outstanding payables
var outPal = pal.filter(function(p){return p.status!=='Paid';}).reduce(function(s,p){return s+(parseFloat(p.outstandingAmount)||0);},0);

  // Pending payments (reserve estimate)
var pendPay = pay.filter(function(p){return p.status==='pending';}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);

  // Investments total
var invTotal = inv.reduce(function(s,i){return s+(parseFloat(i.amount)||0);},0);

  // Founder drawings (equity entries of type Drawings)
var drawings = (d.fin_equity||[]).filter(function(e){return e.type==='Drawings (Withdrawal)';}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);

  el.innerHTML =
'<div class="eyebrow" style="margin-bottom:14px;">Financial Snapshot</div>' +
'<div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:20px;">' +
'<div class="kpi-card gold"><div class="kpi-icon">📈</div><div class="kpi-label">Total Revenue</div><div class="kpi-value">₦'+totRev.toLocaleString()+'</div><div class="kpi-meta">all income logged</div></div>' +
'<div class="kpi-card red"><div class="kpi-icon">📉</div><div class="kpi-label">Total Expenses</div><div class="kpi-value">₦'+totExp.toLocaleString()+'</div><div class="kpi-meta">all outgoings</div></div>' +
'<div class="kpi-card '+(netProfit>=0?'green':'red')+'"><div class="kpi-icon">💰</div><div class="kpi-label">Net Profit</div><div class="kpi-value">'+(netProfit<0?'−':'')+'₦'+Math.abs(netProfit).toLocaleString()+'</div><div class="kpi-meta">'+(totRev>0?Math.round(netProfit/totRev*100):0)+'% margin</div></div>' +
'<div class="kpi-card cyan"><div class="kpi-icon">💵</div><div class="kpi-label">Cash Available</div><div class="kpi-value">₦'+cashAvail.toLocaleString()+'</div><div class="kpi-meta">across all accounts</div></div>' +
'<div class="kpi-card amber"><div class="kpi-icon">📥</div><div class="kpi-label">Outstanding Receivables</div><div class="kpi-value">₦'+outRec.toLocaleString()+'</div><div class="kpi-meta">owed to us</div></div>' +
'<div class="kpi-card purple"><div class="kpi-icon">📤</div><div class="kpi-label">Outstanding Payables</div><div class="kpi-value">₦'+outPal.toLocaleString()+'</div><div class="kpi-meta">we owe others</div></div>' +
(pendPay?'<div class="kpi-card orange"><div class="kpi-icon">⏳</div><div class="kpi-label">Reserve (Pending)</div><div class="kpi-value">₦'+pendPay.toLocaleString()+'</div><div class="kpi-meta">invoiced, not yet paid</div></div>':'') +
(drawings?'<div class="kpi-card amber"><div class="kpi-icon">👤</div><div class="kpi-label">Founder Drawings</div><div class="kpi-value">₦'+drawings.toLocaleString()+'</div><div class="kpi-meta">total withdrawn</div></div>':'') +
(invTotal?'<div class="kpi-card green"><div class="kpi-icon">🌱</div><div class="kpi-label">Investor Funds</div><div class="kpi-value">₦'+invTotal.toLocaleString()+'</div><div class="kpi-meta">total raised</div></div>':'') +
'</div>' +

  // Quick links
'<div class="eyebrow" style="margin-bottom:12px;">Quick Navigation</div>' +
'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px;">' +
  ['pl','cashflow','accounts','transfers','assets','liabilities','equity','receivables','payables','withdrawals','investments','ledger','budget'].map(function(t){
    var ICONS={pl:'📈',cashflow:'💸',accounts:'🏦',transfers:'🔄',assets:'🏗️',liabilities:'⚠️',equity:'💎',receivables:'📥',payables:'📤',withdrawals:'👤',investments:'🌱',ledger:'📒',budget:'🎯'};
    var LABELS={pl:'P&L',cashflow:'Cash Flow',accounts:'Accounts',transfers:'Transfers',assets:'Assets',liabilities:'Liabilities',equity:'Equity',receivables:'Receivables',payables:'Payables',withdrawals:'Drawings',investments:'Investments',ledger:'Ledger',budget:'Budget'};
    return '<button onclick="switchFinTab(\''+t+'\')" style="background:rgba(255,255,255,.03);border:1px solid rgba(242,237,228,.08);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;font-family:var(--mono);font-size:.65rem;color:var(--dim);" onmouseover="this.style.borderColor=\'rgba(200,155,20,.3)\'" onmouseout="this.style.borderColor=\'rgba(242,237,228,.08)\'">' +
      '<div style="font-size:1.3rem;margin-bottom:6px;">'+ICONS[t]+'</div>' +
      escHtml(LABELS[t]) +
    '</button>';
  }).join('') +
'</div>' +

// Accounts summary
(accts.length ? '<div class="eyebrow" style="margin-bottom:10px;">Account Balances</div>' +
  '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px;">' +
    accts.map(function(a){
      var color = parseFloat(a.balance)>=0?'var(--green)':'var(--red)';
      return '<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;">' +
        '<div style="font-size:.82rem;font-weight:600;color:var(--white);margin-bottom:4px;">'+escHtml(a.name||'—')+'</div>' +
        '<div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);margin-bottom:8px;">'+escHtml(a.type||'Account')+' · '+escHtml(a.currency||'NGN')+'</div>' +
        '<div style="font-family:var(--display);font-weight:800;font-size:1.4rem;color:'+color+';">'+escHtml(a.currency==='NGN'?'₦':a.currency+' ')+(parseFloat(a.balance)||0).toLocaleString()+'</div>' +
      '</div>';
    }).join('') +
  '</div>' : '') +

// Recent transactions
'<div class="eyebrow" style="margin-bottom:10px;">Recent Transactions</div>' +
'<div class="table-wrap">' +
  '<div class="table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>FIN Ref</th></tr></thead><tbody>' +
    (function(){
      var recent = (d.financials||[]).slice(0,10);
      if (!recent.length) return '<tr><td colspan="5"><div class="empty-state" style="padding:20px;"><div class="empty-icon">💰</div>No transactions yet</div></td></tr>';
      return recent.map(function(f){
        return '<tr><td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+fmtDate(f.date||f.createdAt)+'</td>' +
          '<td><span class="badge '+(f.type==='income'?'badge-green':'badge-red')+'">'+escHtml((f.type||'').toUpperCase())+'</span></td>' +
          '<td style="font-size:.78rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escHtml(f.description||'—')+'</td>' +
          '<td style="font-family:var(--mono);font-weight:700;color:'+(f.type==='income'?'var(--green)':'var(--red)')+';white-space:nowrap;">'+(f.type==='income'?'+':'−')+'₦'+(parseFloat(f.amount)||0).toLocaleString()+'</td>' +
          '<td style="font-family:var(--mono);font-size:.6rem;color:var(--gold);">'+escHtml(f.finRef||'—')+'</td>' +
        '</tr>';
      }).join('');
    })() +
  '</tbody></table></div>' +
'</div>';
}

// ── Accounts ──────────────────────────────────────────────────
function renderFinAccounts() {
var el = document.getElementById('fin-sub-accounts'); if (!el) return;
var accts = window._data ? window._data.fin_accounts || [] : [];
var isFounder = window._userRole === 'founder';
var canAdd = isFounder || window._userRole === 'ops_lead' || window._userRole === 'admin_finance_officer';

  var totalByCurrency = {};
accts.forEach(function(a) {
var cur = a.currency || 'NGN';
totalByCurrency[cur] = (totalByCurrency[cur]||0) + (parseFloat(a.balance)||0);
});

  el.innerHTML =
'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">' +
'<div class="eyebrow" style="margin-bottom:0;">Where Our Money Lives</div>' +
(canAdd ? '<button class="btn-primary" style="padding:9px 16px;font-size:.75rem;" onclick="openFinAccountDrawer(null)">+ Add Account</button>' : '') +
'</div>' +

(Object.keys(totalByCurrency).length
  ? '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">' +
      Object.entries(totalByCurrency).map(function(e){
        return '<div style="background:rgba(200,155,20,.06);border:1px solid rgba(200,155,20,.18);border-radius:8px;padding:12px 18px;">' +
          '<div style="font-family:var(--mono);font-size:.54rem;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;">Total '+escHtml(e[0])+'</div>' +
          '<div style="font-family:var(--display);font-weight:800;font-size:1.5rem;color:var(--gold);">'+(e[0]==='NGN'?'₦':e[0]+' ')+e[1].toLocaleString()+'</div>' +

          '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">' +
            '<div>' +
              '<div style="font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--white);">'+escHtml(a.name||'—')+'</div>' +
              '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);margin-top:2px;">'+escHtml(a.type||'Account')+' · '+escHtml(a.currency||'NGN')+'</div>' +
            '</div>' +
            (a.isDefault?'<span class="badge badge-gold" style="font-size:.48rem;">Default</span>':'') +
          '</div>' +

          (a.accountNumber?'<div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);margin-bottom:8px;">Acct: '+escHtml(a.accountNumber)+'</div>':'') +
          (a.notes?'<div style="font-size:.72rem;color:var(--dimmer);margin-bottom:10px;">'+escHtml(a.notes)+'</div>':'') +
          (canAdd?'<div style="display:flex;gap:6px;">' +

'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">' +
'<div class="form-field"><div class="form-label">Account Name *</div><input class="form-input" id="fac-name" value="'+escHtml(a?a.name||'':'')+'" placeholder="e.g. Flutterwave, Business Bank, USDT Wallet"></div>' +

FIN_ACCOUNT_TYPES.map(function(t){return'<option value="'+t+'"'+(a&&a.type===t?' selected':'')+'>'+t+'</option>';}).join('') +
'</select></div>' +
'</div>' +
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">' +
'<div class="form-field"><div class="form-label">Currency</div><select class="form-select" id="fac-cur">' +
FIN_CURRENCIES.map(function(c){return'<option value="'+c+'"'+(a&&a.currency===c?' selected':(!a&&c==='NGN'?' selected':''))+'>'+c+'</option>';}).join('') +
'</select></div>' +
'<div class="form-field"><div class="form-label">Opening Balance</div><input class="form-input" id="fac-bal" type="number" value="'+(a?a.balance||'0':'0')+'"></div>' +
'<div class="form-field"><div class="form-label">Account / Wallet Number</div><input class="form-input" id="fac-accno" value="'+escHtml(a?a.accountNumber||'':'')+'" placeholder="Optional"></div>' +
'</div>' +
'<div class="form-field" style="margin-bottom:10px;"><div class="form-label">Notes</div><input class="form-input" id="fac-notes" value="'+escHtml(a?a.notes||'':'')+'" placeholder="e.g. Primary operating account"></div>' +
'<label style="display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.62rem;color:var(--dim);cursor:pointer;margin-bottom:14px;"><input type="checkbox" id="fac-default"'+(a&&a.isDefault?' checked':'')+' style="accent-color:var(--gold);"> Set as default account</label>' +
'<div class="btn-row">' +
'<button class="btn-primary" onclick="saveFinAccount(\''+(a?a.id:'')+'\')">💾 '+(a?'Update':'Add')+' Account</button>' +
'<button class="btn-secondary" onclick="closeDrawer()">Cancel</button>' +
'</div>' +
'</div>';
openDrawer(a?'Edit Account':'Add Account', a?escHtml(a.name||'Account'):'New Account', html);

  function saveFinAccount(id) {
var name = (document.getElementById('fac-name')||{}).value||'';
if (!name.trim()) { toast('Account name required','error'); return; }
var data = {
name:          name.trim(),
type:          (document.getElementById('fac-type')  ||{}).value||'Bank Account',
currency:      (document.getElementById('fac-cur')   ||{}).value||'NGN',
balance:       parseFloat((document.getElementById('fac-bal')||{}).value)||0,
accountNumber: (document.getElementById('fac-accno') ||{}).value||'',
notes:         (document.getElementById('fac-notes') ||{}).value||'',
isDefault:     !!(document.getElementById('fac-default')||{}).checked
};
var fn = id ? window._updateDoc('fin_accounts',id,data) : window._saveDoc('fin_accounts',data);
fn.then(function(){ toast('Account saved ✓','success'); closeDrawer(); window._loadAll().then(renderFinAccounts); });
}

  function openFinAccountTopUp(id) {
var a = (window._data.fin_accounts||[]).find(function(x){return x.id===id;}); if (!a) return;
var html = '<div style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);margin-bottom:14px;">Manually adjust the balance of <strong style="color:var(--white);">'+escHtml(a.name)+'</strong>.<br>Use this for reconciliation, incoming transfers recorded elsewhere, or opening balance corrections.</div>' +
'<div class="drawer-form">' +
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">' +
'<div class="form-field"><div class="form-label">Adjustment Type</div><select class="form-select" id="ftu-dir"><option value="add">+ Add / Deposit</option><option value="sub">− Deduct / Withdrawal</option></select></div>' +
'<div class="form-field"><div class="form-label">Amount ('+escHtml(a.currency||'NGN')+')</div><input class="form-input" id="ftu-amt" type="number" min="0" placeholder="0"></div>' +
'</div>' +
'<div class="form-field"><div class="form-label">Reason / Note</div><input class="form-input" id="ftu-note" placeholder="e.g. Received from client, transfer from Flutterwave…"></div>' +
'<div class="btn-row"><button class="btn-primary" onclick="saveAccountAdjustment(\''+id+'\','+a.balance+')">Apply Adjustment</button><button class="btn-secondary" onclick="closeDrawer()">Cancel</button></div>' +
'</div>';
openDrawer('Adjust Balance', escHtml(a.name), html);
}

  function saveAccountAdjustment(id, currentBalance) {
var dir  = (document.getElementById('ftu-dir')||{}).value||'add';
var amt  = parseFloat((document.getElementById('ftu-amt')||{}).value)||0;
var note = (document.getElementById('ftu-note')||{}).value||'Manual adjustment';
if (!amt) { toast('Amount required','error'); return; }
var newBal = dir==='add' ? currentBalance+amt : currentBalance-amt;
window._updateDoc('fin_accounts', id, { balance:newBal })
.then(function(){ toast('Balance updated ✓ · New balance: '+newBal.toLocaleString(),'success'); closeDrawer(); window._loadAll().then(renderFinAccounts); });
}

  // ── Transfers ─────────────────────────────────────────────────

var transfers = window._data ? window._data.fin_transfers||[] : [];
var accts     = window._data ? window._data.fin_accounts||[] : [];
var acctMap   = {}; accts.forEach(function(a){ acctMap[a.id]=a; });

  async function saveFinTransfer() {
var fromId = (document.getElementById('ftr-from')||{}).value||'';
var toId   = (document.getElementById('ftr-to')  ||{}).value||'';
var amt    = parseFloat((document.getElementById('ftr-amt') ||{}).value)||0;
var date   = (document.getElementById('ftr-date')||{}).value||new Date().toISOString().split('T')[0];
var status = (document.getElementById('ftr-status')||{}).value||'completed';
var note   = (document.getElementById('ftr-note') ||{}).value||'';
if (!fromId||!toId) { toast('Both accounts required','error'); return; }
if (fromId===toId)  { toast('Cannot transfer to the same account','error'); return; }
if (!amt)           { toast('Amount required','error'); return; }

    var accts  = window._data.fin_accounts||[];
var fromA  = accts.find(function(a){return a.id===fromId;});
var toA    = accts.find(function(a){return a.id===toId;});
if (!fromA||!toA) { toast('Account not found','error'); return; }

    await window._saveDoc('fin_transfers',{
fromAccountId:fromId, fromAccountName:fromA.name,
toAccountId:toId,     toAccountName:toA.name,
amount:amt, date:date, status:status, note:note
});
    
if (status==='completed') {
await window._updateDoc('fin_accounts',fromId,{balance:(fromA.balance||0)-amt});
await window._updateDoc('fin_accounts',toId,  {balance:(toA.balance||0)+amt});
}
toast('Transfer recorded ✓','success');
closeDrawer();
window._loadAll().then(renderFinTransfers);
}

  async function markTransferComplete(id) {
var t = (window._data.fin_transfers||[]).find(function(x){return x.id===id;}); if (!t) return;
var accts = window._data.fin_accounts||[];
var fromA = accts.find(function(a){return a.id===t.fromAccountId;});
var toA   = accts.find(function(a){return a.id===t.toAccountId;});
await window._updateDoc('fin_transfers',id,{status:'completed'});
if (fromA) await window._updateDoc('fin_accounts',fromA.id,{balance:(fromA.balance||0)-(parseFloat(t.amount)||0)});
if (toA)   await window._updateDoc('fin_accounts',toA.id,  {balance:(toA.balance||0)+(parseFloat(t.amount)||0)});
toast('Transfer marked complete · Balances updated ✓','success');
window._loadAll().then(renderFinTransfers);
}

    function crmFromIntake(l) {
  var r   = l.responses || {};
  var q1  = r.q1_identity  && r.q1_identity[0]  || '';
  var q3  = r.q3_revenue   && r.q3_revenue[0]   || '';
  var q6  = r.q6_budget    && r.q6_budget[0]    || '';
  var q4  = r.q4_pain      && r.q4_pain[0]      || '';
  var q10 = r.q10_goal     && r.q10_goal[0]     || '';
  var vId = 'studio';
  if (q1 === 'security_firm') vId = 'tek1security';
  else if (q1 === 'solar_vendor') vId = 'pawa';
  else if ((l.primaryRoute||'').includes('GATA')) vId = 'gata';
  else if ((l.primaryRoute||'').includes('Poverty')) vId = 'p2p';
  var seg = (q1 === 'security_firm' || q1 === 'solar_vendor' || q1 === 'company_team') ? 'type3' : 'type1';
  var dv  = q6 === 'premium_ready' ? 1500000 : q6 === 'can_invest' ? 500000 : q6 === 'low_cost' ? 100000 : 0;
  var name = ((l.firstName || '') + ' ' + (l.lastName || '')).trim() || l.email || 'Unknown';
  return {
    sourceType:'intake', sourceId:l.id,
    name:name, email:l.email||'', phone:l.phone||'', businessName:'',
    ventureId:vId, segment:seg, dealValue:dv,
    dealTier: dv>=1000000?3:dv>=250000?2:1,
    source:'intake_form', status:'new_lead',
    assignedTo:'', assignedName:'Unassigned', assignmentType:'auto',
    notes:'', intakeScore:l.score||0, intakeTier:l.tier||'',
    intakePrimaryRoute:l.primaryRoute||'',
    budget:q6, painPoint:q4, desiredOutcome:q10, currentStage:r.q2_stage&&r.q2_stage[0]||'',
    addedBy:'system', addedByName:'Auto-Synced',
    createdAt: new Date().toISOString()
  };
}

function crmFromInquiry(i) {
  var vMap = {

  };

async function syncLeadsToCRM() {
  if (!window._data) return;
  var existing = window._data.crm_leads || [];
  var existingSrcIds = new Set(existing.map(function(l){ return l.sourceId; }).filter(Boolean));
  var writes = [];
  (window._data.leads || []).forEach(function(l) {
    if (!existingSrcIds.has(l.id)) writes.push(window._saveDoc('crm_leads', crmFromIntake(l)));
  });
  (window._data.inquiries || []).forEach(function(i) {
    if (!existingSrcIds.has(i.id)) writes.push(window._saveDoc('crm_leads', crmFromInquiry(i)));
  });
  (window._data.messages || []).forEach(function(m) {
    if (!existingSrcIds.has(m.id)) writes.push(window._saveDoc('crm_leads', crmFromMessage(m)));
  });
  if (writes.length > 0) {
    await Promise.all(writes);
    toast(writes.length + ' lead' + (writes.length !== 1 ? 's' : '') + ' synced to CRM ✓', 'success');
    await window._loadAll();
  }
}

function isSeedVenture(id) {
  return VENTURES_SEED.some(function(v){ return v.id === id; });
}

// ── Merged ventures list (seed + custom, minus deleted) — single source of truth ──
function getAllVentures() {
  var dbV = window._data ? window._data.ventures || [] : [];
  var deletedIds = new Set(dbV.filter(function(v){ return v.deleted; }).map(function(v){ return v.id; }));
  var seedFiltered = VENTURES_SEED.filter(function(v){
    return !dbV.find(function(dv){ return dv.id === v.id; }) && !deletedIds.has(v.id);
  });
  var customActive = dbV.filter(function(v){ return !v.deleted; });
  return seedFiltered.concat(customActive);
}

function buildVentureDropdownOptions(selectedVal, includeBlank, blankLabel) {
  var ventures = getAllVentures();
  var html = includeBlank ? '<option value="">' + escHtml(blankLabel || 'Select…') + '</option>' : '';
  html += ventures.map(function(v) {
    return '<option value="' + v.id + '"' + (selectedVal === v.id ? ' selected' : '') + '>' + escHtml(v.name) + '</option>';
  }).join('');
  return html;
}

// Rebuilds every venture filter dropdown in the DOM so newly added ventures appear
// without requiring a full panel rebuild / re-login
function refreshVentureFilterDropdowns() {
  document.querySelectorAll('select.venture-filter-select').forEach(function(sel) {
    var cur = sel.value;
    var blankOpt = sel.querySelector('option[value=""]');
    var blankLabel = blankOpt ? blankOpt.textContent : 'All Ventures';
    sel.innerHTML = buildVentureDropdownOptions(cur, true, blankLabel);
    if (cur) sel.value = cur;
  });
}

async function deleteVenture(id) {
  if (!confirm('Remove this venture from the portfolio? This cannot be undone.')) return;
  var seed = isSeedVenture(id);
  var dbV  = (window._data ? window._data.ventures || [] : []).find(function(v){ return v.id === id; });
  try {
    if (seed) {
      // Seed ventures are hardcoded — mark as deleted in Firestore so they're suppressed
      var sv = VENTURES_SEED.find(function(v){ return v.id === id; });
      await window._setDoc('ventures', id, { name:(sv||{}).name||id, deleted:true });
    } else if (dbV) {
      await window._deleteDoc('ventures', id);
    }
    toast('Venture removed from portfolio ✓', 'success');
    closeDrawer();
    window._loadAll();
  } catch(e) { toast('Delete failed: ' + (e.message||e), 'error'); }
}

async function readFileAsBase64(file) {
  return new Promise(function(resolve, reject) {
    if (file.size > 204800) { resolve({ tooBig:true, name:file.name }); return; }
    var r = new FileReader();
    r.onload  = function() { resolve({ data:r.result, name:file.name }); };
    r.onerror = function() { reject(new Error('File read failed')); };
    r.readAsDataURL(file);
  });
}

function applyFinDateQuick(val) {
  if (!val) return;
  var now = new Date(), fmt = function(d){return d.toISOString().split('T')[0];};
  var from = '', to = fmt(now);
  if (val==='today')     { from = to; }
  else if (val==='week') { var m=new Date(now);m.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));from=fmt(m); }
  else if (val==='month')     { from = fmt(new Date(now.getFullYear(),now.getMonth(),1)); }
  else if (val==='lastmonth') { from=fmt(new Date(now.getFullYear(),now.getMonth()-1,1));to=fmt(new Date(now.getFullYear(),now.getMonth(),0)); }
  else if (val==='3months')   { var d=new Date(now);d.setMonth(d.getMonth()-3);from=fmt(d); }
  else if (val==='year')      { from=fmt(new Date(now.getFullYear(),0,1)); }
  var fEl=document.getElementById('fin-f-from'), tEl=document.getElementById('fin-f-to');
  if (fEl) fEl.value=from; if (tEl) tEl.value=to;
  applyFinFilters();
}

  _finFilters.method   = (document.getElementById('fin-f-method')  ||{}).value||'';
  _finFilters.from     = (document.getElementById('fin-f-from')    ||{}).value||'';

  renderFinance(window._data?window._data.financials||[]:[], window._data?window._data.clients||[]:[]);
}

<script>
// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(window._tt);window._tt=setTimeout(function(){t.className='';},3200);}
function fmtDate(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}
function fmtTime(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);if(isNaN(d))return'—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function timeAgo(v){if(!v)return'—';var d=v&&v.seconds?new Date(v.seconds*1000):new Date(v);var diff=Date.now()-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return Math.floor(diff/86400000)+'d ago';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tierBadge(tier){if(!tier)return'<span class="badge badge-dim">—</span>';if(tier.includes('A'))return'<span class="badge badge-green">Tier A</span>';if(tier.includes('B'))return'<span class="badge badge-gold">Tier B</span>';return'<span class="badge badge-blue">Tier C</span>';}
function scoreBadge(score){var s=parseInt(score)||0;var cls=s>=70?'tier-a':s>=40?'tier-b':'tier-c';return'<div class="score-ring '+cls+'">'+s+'</div>';}
function statusBadge(status){var map={paid:'badge-green',pending:'badge-gold',partial:'badge-orange',overdue:'badge-red',draft:'badge-dim',sent:'badge-cyan',accepted:'badge-green',declined:'badge-red',active:'badge-cyan',completed:'badge-green',cancelled:'badge-red','in-progress':'badge-purple','on-hold':'badge-orange',interview:'badge-cyan',hired:'badge-green',rejected:'badge-red',phase1:'badge-amber',phase2:'badge-blue',phase3:'badge-green',employed:'badge-green',open:'badge-green',filled:'badge-red',closed:'badge-dim'};var cls=map[status]||'badge-dim';return'<span class="badge '+cls+'">'+escHtml(status||'—')+'</span>';}
function serviceLabel(svc){var map={brand_launch:'01 · Brand Launch',sales_system:'02 · Sales System',systemization:'03 · Systemization',platform_dev:'04 · Platform Dev',web3_dev:'05 · Web3 Dev',gata_onboard:'06 · GATA',venture_build:'07 · Venture Build',enterprise_sw:'08 · Enterprise SW'};return map[svc]||svc||'—';}
function initials(name){if(!name)return'?';var p=name.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function phaseBadge(a){
  var s=a.status||'pending';
  if(s==='phase1')return'<span class="badge badge-amber">Phase 1</span>';
  if(s==='phase2')return'<span class="badge badge-blue">Phase 2</span>';
  if(s==='phase3')return'<span class="badge badge-green">Phase 3</span>';
  if(s==='hired'||s==='employed')return'<span class="badge badge-green">Confirmed</span>';
  if(s==='interview')return'<span class="badge badge-cyan">Interview</span>';
  if(s==='rejected')return'<span class="badge badge-red">Rejected</span>';
  return'<span class="badge badge-dim">Pending</span>';
}

// ═══════════════════════════════════════
// NAV & PANEL ROUTING
// ═══════════════════════════════════════
function toggleSidebar(){var sb=document.getElementById('main-sidebar');var ov=document.getElementById('mob-overlay');sb.classList.toggle('open');ov.classList.toggle('open');}
function closeSidebar(){document.getElementById('main-sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('open');}
function showPanelMob(name,el){showPanel(name,document.querySelector('.nav-item[data-panel="'+name+'"]'));document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.remove('active');});if(el)el.classList.add('active');}

var PANEL_TITLES={overview:'Overview → Dashboard',leads:'Intake Leads → Diagnostic Results',inquiries:'Inquiries → Service Forms',messages:'Messages → Contact Inbox',applicants:'Applicants → Careers Portal',crm:'CRM Pipeline → Lead Kanban',people:'People → Unified Profiles',proposals:'Proposals → Quotes & Offers',payments:'Payments → Revenue Tracking',assignments:'Assignments → Routing',ventures:'Ventures → Portfolio',tasks:'Task Board → Kanban',clients:'Clients → Onboarding',finance:'Finance → P&L Intelligence',team:'Team Members → Active Staff',vacancies:'Vacancies → Role Management',reports:'Daily Reports → Accountability',sops:'SOPs → Procedures & Reference',settings:'Settings → Configuration'};

function showPanel(name, el) {
  // Guard — only switch if panel exists
  var panel = document.getElementById('panel-' + name);
  if (!panel) return;

  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  panel.classList.add('active');
  if (el) el.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.panel === name);
  });

  var title = PANEL_TITLES[name] || name;
  var parts = title.split(' → ');
  var ptEl  = document.getElementById('panel-title');
  if (ptEl) ptEl.innerHTML = escHtml(parts[0]) + (parts[1] ? ' <span>→ ' + escHtml(parts[1]) + '</span>' : '');

  // Scroll content area to top
  var ca = document.getElementById('content-area');
  if (ca) ca.scrollTop = 0;

  // Push to browser history (avoid duplicate entries)
  var hash = '#' + name;
  if (window.location.hash !== hash) {
    history.pushState({ panel:name }, '', hash);
  }

  closeSidebar();
}

function showPanelMob(name, el) {
  showPanel(name, document.querySelector('.nav-item[data-panel="' + name + '"]'));
  document.querySelectorAll('.bnav-item').forEach(function(b) { b.classList.remove('active'); });
  if (el) el.classList.add('active');
}

// Handle browser Back/Forward
window.addEventListener('popstate', function(e) {
  var panelName = (e.state && e.state.panel) || 'overview';
  var navEl = document.querySelector('.nav-item[data-panel="' + panelName + '"]');
  showPanel(panelName, navEl);
  // Keep hash in sync without pushing new state
  if (window.location.hash !== '#' + panelName) {
    history.replaceState({ panel:panelName }, '', '#' + panelName);
  }
});

// On initial load — read hash and navigate to it
function initHashNav() {
  var hash = window.location.hash.replace('#', '');
  if (hash && document.getElementById('panel-' + hash)) {
    var navEl = document.querySelector('.nav-item[data-panel="' + hash + '"]');
    showPanel(hash, navEl);
    // Replace initial history entry with state
    history.replaceState({ panel:hash }, '', '#' + hash);
  } else {
    history.replaceState({ panel:'overview' }, '', '#overview');
  }
}

function renderActivity(d) {
  var feed = document.getElementById('activity-feed'); if (!feed) return;
  var myId = getMyMemberId();
  var cu   = window._currentUser;
  var items = [];

  // Determine which activity types this role should see
  var showLeads      = canSeeKPI('kpi_leads');
  var showInquiries  = canSeeKPI('kpi_inquiries');
  var showMessages   = canSeeKPI('kpi_messages');
  var showApplicants = canSeeKPI('kpi_applicants');

  // For closers/outreach: build set of sourceIds for their assigned CRM leads
  var mySourceIds = null;
  if (myId) {
    var scope = (ROLE_DATA_SCOPE[window._userRole||''] || {}).crm || 'all';
    if (scope === 'assigned') {
      mySourceIds = new Set(
        (d.crm_leads || [])
          .filter(function(l){ return l.assignedTo === myId; })
          .map(function(l){ return l.sourceId; })
          .filter(Boolean)
      );
    }
  }

  if (showLeads) {
    d.leads.forEach(function(l) {
      if (mySourceIds && !mySourceIds.has(l.id)) return;
      items.push({
        icon:'📥', bg:'rgba(200,155,20,.1)',
        title:((l.firstName||'?')+' '+(l.lastName||'')+' completed diagnostic').trim(),
        meta:'Tier '+(l.tier||'?')+' · Score '+(l.score||0),
        time:l.completedAt||l.createdAt,
        onClick:function(){ openLeadDrawer(l); }
      });
    });
  }

  if (showInquiries) {
    d.inquiries.forEach(function(i) {
      items.push({
        icon:'📋', bg:'rgba(0,188,212,.1)',
        title:(i.name||'?')+' — '+serviceLabel(i.service),
        meta:i.email||'',
        time:i.submittedAt||i.createdAt,
        onClick:function(){ openInquiryDrawer(i); }
      });
    });
  }

  if (showMessages) {
    d.messages.forEach(function(m) {
      items.push({
        icon:'💬', bg:'rgba(168,85,247,.1)',
        title:(m.name||'?')+' sent a message',
        meta:m.subject||'General',
        time:m.sentAt||m.createdAt,
        onClick:function(){ openMessageDrawer(m); }
      });
    });
  }

  if (showApplicants) {
    (d.applicants||[]).forEach(function(a) {
      var info=a.personalInfo||{};
      items.push({
        icon:'🎯', bg:'rgba(249,115,22,.1)',
        title:(info.name||a.name||'?')+' applied for '+(ROLE_LABELS[a.positionApplied]||a.positionTitle||'—'),
        meta:'Score: '+(a.score||0)+' · Status: '+(a.status||'pending'),
        time:a.submittedAt||a.createdAt,
        onClick:function(){ openApplicantDrawer(a); }
      });
    });
  }

  // Tasks / assignments — show own completed items for operational roles
  if (!showLeads && canSeeKPI('kpi_tasks')) {
    var myTasks = scopeRecords(d.tasks||[], 'tasks')
      .filter(function(t){ return t.status === 'done'; })
      .slice(0, 5);
    myTasks.forEach(function(t) {
      items.push({
        icon:'✅', bg:'rgba(34,197,94,.1)',
        title:'Task completed: ' + (t.title||'—'),
        meta:(V_MAP[t.ventureId]||{}).name||'',
        time:t.updatedAt||t.createdAt,
        onClick:function(){ openTaskDrawer(t.id); }
      });
    });
  }

  items.sort(function(a,b){
    var at=a.time&&a.time.seconds?a.time.seconds*1000:new Date(a.time||0).getTime();
    var bt=b.time&&b.time.seconds?b.time.seconds*1000:new Date(b.time||0).getTime();
    return bt-at;
  });

  if (!items.length) {
    feed.innerHTML = '<div class="empty-state"><div class="empty-icon">⬡</div>No recent activity to show</div>';
    return;
  }

  feed.innerHTML = items.slice(0, 14).map(function(item) {
    return '<div class="activity-item">' +
      '<div class="activity-icon" style="background:'+item.bg+'">'+item.icon+'</div>' +
      '<div class="activity-body">' +
        '<div class="activity-title">'+escHtml(item.title)+'</div>' +
        '<div class="activity-meta">'+escHtml(item.meta)+'</div>' +
      '</div>' +
      '<div class="activity-time">'+timeAgo(item.time)+'</div>' +
    '</div>';
  }).join('');

  feed.querySelectorAll('.activity-item').forEach(function(el, i) {
    if (items[i]) el.onclick = items[i].onClick;
  });
}

var _leadsFilters = {
  search:'', tier:'', source:'', route:'', status:'',
  budget:'', stage:'', from:'', to:''
};

function applyLeadsFilters() {
  _leadsFilters.search = ((document.getElementById('lf-search') ||{}).value||'').toLowerCase().trim();
  _leadsFilters.tier   = (document.getElementById('lf-tier')   ||{}).value||'';

  _leadsFilters.route  = (document.getElementById('lf-route')  ||{}).value||'';

  _leadsFilters.from   = (document.getElementById('lf-from')   ||{}).value||'';
  _leadsFilters.to     = (document.getElementById('lf-to')     ||{}).value||'';
  renderLeads(window._data ? window._data.leads || [] : []);
}

function clearLeadsFilters() {
  ['lf-search','lf-tier','lf-source','lf-route','lf-status',
   'lf-budget','lf-stage','lf-from','lf-to'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  Object.keys(_leadsFilters).forEach(function(k){ _leadsFilters[k] = ''; });
  renderLeads(window._data ? window._data.leads || [] : []);

// Compute lead's pipeline status from linked data
function getLeadPipelineStatus(leadId, email) {
  var d = window._data || {};
  var crm = (d.crm_leads || []).find(function(l) { return l.sourceId === leadId; });
  if (crm) {
    if (crm.status === 'won')      return 'won';
    if (crm.status === 'proposal') return 'proposal';
    if (crm.status === 'qualified')return 'qualified';
    if (crm.status === 'contacted')return 'contacted';
    return 'in_crm';
  }
  var hasAssignment = (d.assignments || []).some(function(a) {
    return (a.personEmail || '').toLowerCase() === (email || '').toLowerCase();
  });
  if (hasAssignment) return 'assigned';
  return 'new';
}

function buildLeadsFilterOptions(leads) {
  // Collect unique routes
  var routes = {}, budgets = {}, stages = {}, sources = {};
  leads.forEach(function(l) {
    if (l.primaryRoute)                           routes[l.primaryRoute]  = 1;
    var r = l.responses || {};
    if (r.q6_budget && r.q6_budget[0])            budgets[r.q6_budget[0]] = 1;
    if (r.q2_stage  && r.q2_stage[0])             stages[r.q2_stage[0]]   = 1;
    if (r.q7_source && r.q7_source[0])            sources[r.q7_source[0]] = 1;
    else if (r.q1_referral && r.q1_referral[0])   sources[r.q1_referral[0]] = 1;
    else if (l.source)                            sources[l.source] = 1;
  });

  var routeEl = document.getElementById('lf-route');
  if (routeEl) {
    var cur = routeEl.value;
    routeEl.innerHTML = '<option value="">All Routes</option>' +
      Object.keys(routes).sort().map(function(r) {
        return '<option value="' + escHtml(r) + '"' + (cur === r ? ' selected' : '') + '>' + escHtml(r) + '</option>';
      }).join('');
    if (cur) routeEl.value = cur;
  }

  var budgetEl = document.getElementById('lf-budget');
  if (budgetEl) {
    var curB = budgetEl.value;
    var BUDGET_LBL = { free_only:'Free Only', low_cost:'Low Cost', can_invest:'Can Invest', premium_ready:'Premium Ready' };
    budgetEl.innerHTML = '<option value="">All Budgets</option>' +
      ['free_only','low_cost','can_invest','premium_ready'].map(function(b) {
        return '<option value="' + b + '"' + (curB === b ? ' selected' : '') + '>' + (BUDGET_LBL[b] || b) + '</option>';
      }).join('');
    if (curB) budgetEl.value = curB;
  }

  var stageEl = document.getElementById('lf-stage');
  if (stageEl) {
    var curS = stageEl.value;
    stageEl.innerHTML = '<option value="">All Stages</option>' +
      Object.keys(stages).sort().map(function(s) {
        return '<option value="' + escHtml(s) + '"' + (curS === s ? ' selected' : '') + '>' + escHtml(s.replace(/_/g,' ')) + '</option>';
      }).join('');
    if (curS) stageEl.value = curS;
  }

  var srcEl = document.getElementById('lf-source');
  if (srcEl) {
    var curSrc = srcEl.value;
    var hasCustom = Object.keys(sources).length > 0;
    srcEl.innerHTML = '<option value="">All Sources</option>' +
      '<option value="intake_form"' + (curSrc === 'intake_form' ? ' selected' : '') + '>Intake Form</option>' +
      (hasCustom ? Object.keys(sources).sort().map(function(s) {
        return '<option value="' + escHtml(s) + '"' + (curSrc === s ? ' selected' : '') + '>' + escHtml(s.replace(/_/g,' ')) + '</option>';
      }).join('') : '') +
      '<option value="direct"'   + (curSrc === 'direct'   ? ' selected' : '') + '>Direct Entry</option>' +
      '<option value="referral"' + (curSrc === 'referral' ? ' selected' : '') + '>Referral</option>';
    if (curSrc) srcEl.value = curSrc;
  }
}
  
// ═══════════════════════════════════════
// LEADS
// ═══════════════════════════════════════
function renderLeads(leads) {
  // Populate dynamic filter dropdowns
  buildLeadsFilterOptions(leads);

  var BUDGET_LBL = {
    free_only:'Free Only', low_cost:'Low Cost',
    can_invest:'Can Invest', premium_ready:'Premium Ready'
  };
  var STATUS_LBL = {
    new:'New', assigned:'Assigned', in_crm:'In CRM',
    contacted:'Contacted', qualified:'Qualified', proposal:'Proposal', won:'Won ✅'
  };
  var STATUS_BADGE = {
    new:'badge-dim', assigned:'badge-blue', in_crm:'badge-cyan',
    contacted:'badge-purple', qualified:'badge-amber', proposal:'badge-gold', won:'badge-green'
  };

  // Apply all filters
  var f = _leadsFilters;
  var filtered = leads.filter(function(l) {
    var r    = l.responses || {};
    var name = ((l.firstName||'')+' '+(l.lastName||'')).toLowerCase();
    var budg = (r.q6_budget && r.q6_budget[0]) || '';
    var stg  = (r.q2_stage  && r.q2_stage[0])  || '';
    var src  = r.q7_source && r.q7_source[0] ? r.q7_source[0]
             : r.q1_referral && r.q1_referral[0] ? r.q1_referral[0]
             : l.source || 'intake_form';
    var route = l.primaryRoute || '';
    var dateStr = ((l.completedAt || l.createdAt || '') + '').substring(0, 10);
    if (dateStr.length < 10 && (l.completedAt || l.createdAt)) {
      var d = l.completedAt && l.completedAt.seconds
        ? new Date(l.completedAt.seconds * 1000)
        : new Date(l.completedAt || l.createdAt);
      dateStr = isNaN(d) ? '' : d.toISOString().substring(0, 10);
    }
    var pipeStatus = getLeadPipelineStatus(l.id, l.email);
    var tierLabel  = (parseInt(l.score)||0) >= 70 ? 'Tier A' : (parseInt(l.score)||0) >= 40 ? 'Tier B' : 'Tier C';

    if (f.search  && !(name + (l.email||'') + (l.phone||'')).toLowerCase().includes(f.search)) return false;
    if (f.tier    && tierLabel !== f.tier) return false;
    if (f.status  && pipeStatus !== f.status) return false;

    if (f.from    && dateStr && dateStr < f.from) return false;
    if (f.to      && dateStr && dateStr > f.to)   return false;

  });

var _inqFilters = { search:'', service:'', from:'', to:'', timeFrom:'', timeTo:'', dow:'' };

function applyInquiryQuickDate(val) {
  if (!val) return;
  var now = new Date(), fmt = function(d){ return d.toISOString().split('T')[0]; };
  var from = '', to = fmt(now);
  if (val === 'today') {
    from = to;
  } else if (val === 'yesterday') {
    var y = new Date(now); y.setDate(now.getDate()-1);
    from = to = fmt(y);
  } else if (val === 'week') {
    var m = new Date(now); m.setDate(now.getDate() - (now.getDay()===0?6:now.getDay()-1));
    from = fmt(m);
  } else if (val === 'lastweek') {
    var thisMon = new Date(now); thisMon.setDate(now.getDate() - (now.getDay()===0?6:now.getDay()-1));
    var lastMon = new Date(thisMon); lastMon.setDate(thisMon.getDate()-7);
    var lastSun = new Date(thisMon); lastSun.setDate(thisMon.getDate()-1);
    from = fmt(lastMon); to = fmt(lastSun);
  } else if (val === 'month') {
    from = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
  } else if (val === 'lastmonth') {
    from = fmt(new Date(now.getFullYear(), now.getMonth()-1, 1));
    to   = fmt(new Date(now.getFullYear(), now.getMonth(), 0));
  } else if (val === 'year') {
    from = fmt(new Date(now.getFullYear(), 0, 1));
  } else if (val === 'lastyear') {
    from = fmt(new Date(now.getFullYear()-1, 0, 1));
    to   = fmt(new Date(now.getFullYear()-1, 11, 31));
  }
  var fEl = document.getElementById('inq-from'), tEl = document.getElementById('inq-to');
  if (fEl) fEl.value = from;
  if (tEl) tEl.value = to;
  applyInquiryFilters();
}

function applyInquiryFilters() {
  _inqFilters.search   = ((document.getElementById('inq-search')    ||{}).value||'').toLowerCase().trim();
  _inqFilters.service  = (document.getElementById('inq-service')    ||{}).value||'';
  _inqFilters.from     = (document.getElementById('inq-from')       ||{}).value||'';
  _inqFilters.to       = (document.getElementById('inq-to')         ||{}).value||'';
  _inqFilters.timeFrom = (document.getElementById('inq-time-from')  ||{}).value||'';
  _inqFilters.timeTo   = (document.getElementById('inq-time-to')    ||{}).value||'';
  _inqFilters.dow      = (document.getElementById('inq-dow')        ||{}).value||'';
  renderInquiries(window._data ? window._data.inquiries || [] : []);
}

function clearInquiryFilters() {
  ['inq-search','inq-service','inq-quick','inq-from','inq-to','inq-time-from','inq-time-to','inq-dow'].forEach(function(id){
    var el = document.getElementById(id); if (el) el.value = '';
  });
  Object.keys(_inqFilters).forEach(function(k){ _inqFilters[k] = ''; });
  renderInquiries(window._data ? window._data.inquiries || [] : []);
}

// INQUIRIES
// ═══════════════════════════════════════
function renderInquiries(inquiries) {
  var f = _inqFilters;

  var filtered = (inquiries||[]).filter(function(i) {
    var d = tsToDate(i.submittedAt || i.createdAt);
    var dateStr = isNaN(d) ? '' : d.toISOString().split('T')[0];
    var timeStr = isNaN(d) ? '' : d.toTimeString().substring(0,5); // HH:MM
    var dow     = isNaN(d) ? '' : String(d.getDay());

    if (f.service && i.service !== f.service) return false;

    if (f.search) {
      var hay = ((i.name||'')+(i.email||'')+(i.businessName||'')).toLowerCase();
      if (!hay.includes(f.search)) return false;
    }

    if (f.from && dateStr && dateStr < f.from) return false;
    if (f.to   && dateStr && dateStr > f.to)   return false;

    if (f.timeFrom && timeStr && timeStr < f.timeFrom) return false;
    if (f.timeTo   && timeStr && timeStr > f.timeTo)   return false;

    if (f.dow !== '' && dow !== f.dow) return false;

    return true;
  });

  // Count label
  var lbl = document.getElementById('inq-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + (inquiries||[]).length + ' inquir' + ((inquiries||[]).length !== 1 ? 'ies' : 'y');

  var tbody = document.getElementById('inquiries-tbody'); if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">' +
      '<div class="empty-icon">📋</div>' +
      '<div>No inquiries match your filters</div>' +
      '<div style="margin-top:8px;"><button class="action-btn" onclick="clearInquiryFilters()">Clear Filters</button></div>' +
    '</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(i) {
    return '<tr>' +
      '<td><div style="font-weight:600;">' + escHtml(i.name||'—') + '</div>' +
        '<div style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">' + escHtml(i.email||'') + '</div></td>' +
      '<td><span class="badge badge-cyan">' + escHtml(serviceLabel(i.service)) + '</span></td>' +
      '<td>' + escHtml(i.businessName||'—') + '</td>' +
      '<td style="font-family:var(--mono);font-size:.72rem;">' + escHtml(i.phone||'—') + '</td>' +
      '<td style="font-family:var(--mono);font-size:.65rem;color:var(--dimmer);">' + fmtTime(i.submittedAt||i.createdAt) + '</td>' +
      '<td><div class="row-actions">' +
        '<button class="action-btn" onclick="openInquiryDrawer(window._data.inquiries.find(function(x){return x.id===\'' + i.id + '\'}))">View</button>' +
        '<button class="action-btn success" onclick="quickProposal(\'' + i.id + '\',\'' + escHtml(i.name||'') + '\',\'' + escHtml(i.email||'') + '\')">Propose</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

var _msgFilters = { search:'', subject:'', sender:'', status:'' };

function applyMsgFilters() {
  _msgFilters.search  = ((document.getElementById('mf-search')  ||{}).value||'').toLowerCase().trim();
  _msgFilters.subject = ((document.getElementById('mf-subject') ||{}).value||'').toLowerCase().trim();
  _msgFilters.sender  = ((document.getElementById('mf-sender')  ||{}).value||'').toLowerCase().trim();
  _msgFilters.status  = (document.getElementById('mf-status')   ||{}).value||'';
  renderMessages(window._data ? window._data.messages || [] : []);
}

function clearMsgFilters() {
  ['mf-search','mf-subject','mf-sender','mf-status'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.value = '';
  });
  Object.keys(_msgFilters).forEach(function(k){ _msgFilters[k] = ''; });
  renderMessages(window._data ? window._data.messages || [] : []);
}

// Compute per-message reply status from linked data
function getMsgStatus(m) {
  var d = window._data || {};
  // Won — linked to a CRM lead that's won
  var crmLead = (d.crm_leads || []).find(function(l) {
    return l.sourceId === m.id || (m.email && (l.email||'').toLowerCase() === m.email.toLowerCase());
  });
  if (crmLead) {
    if (crmLead.status === 'won')      return 'won';
    if (crmLead.status === 'proposal') return 'proposal';
    if (crmLead.status === 'qualified')return 'qualified';
    if (crmLead.status === 'contacted')return 'contacted';
    return 'in_crm';
  }
  if (m.replied === true || m.status === 'replied') return 'replied';
  if (m.status === 'archived')                       return 'archived';
  return 'unread';
}

function buildMsgSubjectOptions(messages) {
  var subjects = {};
  messages.forEach(function(m) { if (m.subject) subjects[m.subject.toLowerCase()] = m.subject; });
  var el = document.getElementById('mf-subject'); if (!el) return;
  var cur = el.value;
  el.innerHTML = '<option value="">All Subjects</option>' +
    Object.values(subjects).sort().map(function(s) {
      return '<option value="' + escHtml(s.toLowerCase()) + '"' + (cur === s.toLowerCase() ? ' selected' : '') + '>' + escHtml(s) + '</option>';
    }).join('');
  if (cur) el.value = cur;
}

function buildMsgSenderOptions(messages) {
  var senders = {};
  messages.forEach(function(m) {
    if (m.name && m.email) senders[m.email.toLowerCase()] = m.name;
  });
  var el = document.getElementById('mf-sender'); if (!el) return;
  var cur = el.value;
  el.innerHTML = '<option value="">All Senders</option>' +
    Object.entries(senders).sort(function(a,b){ return a[1].localeCompare(b[1]); }).map(function(e) {
      return '<option value="' + escHtml(e[0]) + '"' + (cur === e[0] ? ' selected' : '') + '>' + escHtml(e[1]) + '</option>';
    }).join('');
  if (cur) el.value = cur;
}

// MESSAGES
// ═══════════════════════════════════════
function renderMessages(messages) {
  // Build dynamic dropdowns
  buildMsgSubjectOptions(messages);
  buildMsgSenderOptions(messages);

  // KPIs — always computed from full list
  var total   = messages.length;
  var unread  = 0, replied = 0, inCrm = 0;
  messages.forEach(function(m) {
    var s = getMsgStatus(m);
    if (s === 'unread')                                           unread++;
    else if (s === 'replied')                                     replied++;
    if (['in_crm','contacted','qualified','proposal','won'].indexOf(s) !== -1) inCrm++;
  });
  setText('msg-kpi-total',  total);
  setText('msg-kpi-unread', unread);
  setText('msg-kpi-replied',replied);
  setText('msg-kpi-crm',    inCrm);

  // Apply filters
  var f = _msgFilters;
  var filtered = messages.filter(function(m) {
    var pipeStatus = getMsgStatus(m);
    var body       = (m.message || '').toLowerCase();
    var senderEmail = (m.email  || '').toLowerCase();
    var senderName  = (m.name   || '').toLowerCase();
    var subjectLc   = (m.subject || '').toLowerCase();

    if (f.search  && !( senderName.includes(f.search) || senderEmail.includes(f.search) || body.includes(f.search) || subjectLc.includes(f.search) )) return false;
    if (f.subject && subjectLc  !== f.subject)  return false;
    if (f.sender  && senderEmail !== f.sender)   return false;
    if (f.status  && pipeStatus  !== f.status)   return false;
    return true;
  });

  // Count label
  var lbl = document.getElementById('msg-count-label');
  if (lbl) lbl.textContent = filtered.length + ' of ' + total + ' message' + (total !== 1 ? 's' : '');

  var tbody = document.getElementById('messages-tbody');
  if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">' +
      '<div class="empty-icon">💬</div>' +
      '<div>No messages match your filters</div>' +
      '<div style="margin-top:8px;"><button class="action-btn" onclick="clearMsgFilters()">Clear Filters</button></div>' +
    '</div></td></tr>';
    return;
  }

  var STATUS_LABEL = {
    unread:'Unread', replied:'Replied', archived:'Archived',
    in_crm:'In CRM', contacted:'Contacted', qualified:'Qualified',
    proposal:'Proposal', won:'Won ✅'
  };
  var STATUS_BADGE = {
    unread:'badge-red', replied:'badge-green', archived:'badge-dim',
    in_crm:'badge-cyan', contacted:'badge-purple', qualified:'badge-amber',
    proposal:'badge-gold', won:'badge-green'
  };
  var STATUS_DOT = {
    unread:'var(--red)', replied:'var(--green)', archived:'var(--dimmer)',
    in_crm:'var(--cyan)', contacted:'var(--purple)', qualified:'var(--amber)',
    proposal:'var(--gold)', won:'var(--green)'
  };

  var SUBJECT_BADGE = {
    general:'badge-dim', support:'badge-cyan', partnership:'badge-purple',
    inquiry:'badge-gold', pricing:'badge-amber', complaint:'badge-red',
    feedback:'badge-green', other:'badge-dim'
  };

  tbody.innerHTML = filtered.map(function(m) {
    var pipeStatus = getMsgStatus(m);
    var preview    = (m.message || '').replace(/\s+/g, ' ').substring(0, 70) + ((m.message||'').length > 70 ? '…' : '');
    var subLc      = (m.subject || 'general').toLowerCase();
    var isUnread   = pipeStatus === 'unread';
    var dot        = STATUS_DOT[pipeStatus] || 'var(--dimmer)';

    return '<tr style="' + (isUnread ? 'background:rgba(168,85,247,.03);' : '') + '">' +

      // Sender
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
          '<div style="position:relative;flex-shrink:0;">' +
            '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:12px;color:#080808;">' +
              escHtml(initials(m.name || m.email || '?')) +
            '</div>' +
            (isUnread ? '<div style="position:absolute;top:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--card);"></div>' : '') +
          '</div>' +
          '<div>' +
            '<div style="font-weight:' + (isUnread ? '700' : '600') + ';font-size:.82rem;color:var(--white);">' + escHtml(m.name || '—') + '</div>' +
            '<div style="font-family:var(--mono);font-size:.58rem;color:var(--dimmer);">' + escHtml(m.email || '') + '</div>' +
          '</div>' +
        '</div>' +
      '</td>' +

      // Subject
      '<td>' +
        '<span class="badge ' + (SUBJECT_BADGE[subLc] || 'badge-dim') + '">' +
          escHtml(m.subject || 'general') +
        '</span>' +
      '</td>' +

      // Preview
      '<td style="color:var(--dim);font-size:.78rem;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
        (isUnread ? '<strong style="color:var(--white);">' + escHtml(preview) + '</strong>' : escHtml(preview)) +
      '</td>' +

      // Status
      '<td>' +
        '<div style="display:flex;align-items:center;gap:5px;">' +
          '<div style="width:6px;height:6px;border-radius:50%;background:' + dot + ';flex-shrink:0;"></div>' +

            escHtml(STATUS_LABEL[pipeStatus] || pipeStatus) +

      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);white-space:nowrap;">' +
        fmtTime(m.sentAt || m.createdAt) +

      '<td><div class="row-actions">' +
        '<button class="action-btn" onclick="openMessageDrawer(window._data.messages.find(function(x){return x.id===\'' + m.id + '\'}))">Read</button>' +
        (m.email ? '<button class="action-btn success" onclick="replyToMessage(\'' + escHtml(m.email) + '\',\'' + escHtml(m.name||'') + '\',\'' + escHtml(m.subject||'') + '\')" style="color:var(--green);">✉ Reply</button>' : '') +
        '<button class="action-btn" onclick="quickProposal(null,\'' + escHtml(m.name||'') + '\',\'' + escHtml(m.email||'') + '\')" style="color:var(--gold);border-color:rgba(200,155,20,.3);">Propose</button>' +
        (pipeStatus === 'unread' ? '<button class="action-btn" onclick="markMessageReplied(\'' + m.id + '\')" style="color:var(--dimmer);">✓ Mark Replied</button>' : '') +
      '</div></td>' +

    '</tr>';
  }).join('');
}

function filterApplicantsByRole(role){document.querySelectorAll('#applicants-tbody tr[data-role]').forEach(function(r){r.style.display=!role||r.dataset.role===role?'':'none';});}
function filterApplicantsByStatus(status){document.querySelectorAll('#applicants-tbody tr[data-status]').forEach(function(r){r.style.display=!status||r.dataset.status===status?'':'none';});}

function updateApplicantStatus(id,status){
  var labels={interview:'Shortlisted for interview',hired:'Marked as hired',rejected:'Moved to recycle bin',pending:'Moved back to pending',phase1:'Probation Phase 1 started',phase2:'Advanced to Phase 2',phase3:'Advanced to Phase 3',employed:'Confirmed as employee'};
  var data = { status: status };
  if (status === 'rejected') {
    var a = (window._data.applicants||[]).find(function(x){ return x.id === id; });
    data.rejectedAt = new Date().toISOString();
    data.prevStatus = a ? (a.status||'pending') : 'pending';
  }
  window._updateDoc('applicants',id,data).then(function(){toast(labels[status]||'Status updated','success');window._loadAll();}).catch(function(e){toast('Update failed: '+(e.message||e),'error');});
}

function moveApplicantStage(id, newStage) {
  var a = (window._data.applicants||[]).find(function(x){ return x.id === id; });
  if (!a) return;
  if (['phase1','phase2','phase3','employed'].indexOf(newStage) !== -1) {
    var phases = (a.phases||[]).slice();
    phases.push({phase:newStage,label:PROBATION_PHASES.find(function(p){return p.key===newStage;})?PROBATION_PHASES.find(function(p){return p.key===newStage;}).label:newStage,startedAt:new Date().toISOString(),note:'Manually moved by admin'});
    window._updateDoc('applicants',id,{status:newStage,phases:phases}).then(function(){
      toast('Moved to '+newStage,'success');
      if(newStage==='employed') promoteToTeamMember(a);
      window._loadAll();
    });
  } else {
    updateApplicantStatus(id, newStage);
  }
}

// ── RECYCLE BIN ──────────────────────────────────────────────
var RECYCLE_RETENTION_DAYS = 50;

function restoreApplicant(id) {
  var a = (window._data.applicants||[]).find(function(x){ return x.id === id; });
  if (!a) return;
  var restoreTo = a.prevStatus || 'pending';
  window._updateDoc('applicants', id, { status: restoreTo, rejectedAt: null, prevStatus: null })
    .then(function(){ toast('Applicant restored ✓','success'); window._loadAll(); closeDrawer(); })
    .catch(function(e){ toast('Restore failed: '+(e.message||e),'error'); });
}

function permanentlyDeleteApplicant(id) {
  if (!confirm('Permanently delete this applicant? This cannot be undone.')) return;
  window._deleteDoc('applicants', id).then(function(){ toast('Permanently deleted','success'); window._loadAll(); closeDrawer(); });
}

// Auto-purge applicants rejected more than RECYCLE_RETENTION_DAYS ago
function autoPurgeRecycleBin(applicants) {
  var now = Date.now();
  (applicants||[]).forEach(function(a) {
    if (a.status !== 'rejected' || !a.rejectedAt) return;
    var rejDate = new Date(a.rejectedAt).getTime();
    if (isNaN(rejDate)) return;
    var daysAgo = (now - rejDate) / 86400000;
    if (daysAgo >= RECYCLE_RETENTION_DAYS) {
      window._deleteDoc('applicants', a.id);
    }
  });
}

function daysUntilPurge(rejectedAt) {
  if (!rejectedAt) return RECYCLE_RETENTION_DAYS;
  var rejDate = new Date(rejectedAt).getTime();
  if (isNaN(rejDate)) return RECYCLE_RETENTION_DAYS;
  var daysAgo = (Date.now() - rejDate) / 86400000;
  return Math.max(0, Math.ceil(RECYCLE_RETENTION_DAYS - daysAgo));
}

function startProbation(id){

  var a=window._data.applicants.find(function(x){return x.id===id;});if(!a)return;

    if(next==='employed'){

function renderRecycleBin(recycled) {
  var tbody = document.getElementById('recycle-bin-tbody');
  if (!tbody) return;
  if (!recycled.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">🗑</div>Recycle bin is empty</div></td></tr>';
    return;
  }
  recycled.sort(function(a,b){ return new Date(b.rejectedAt||0)-new Date(a.rejectedAt||0); });
  tbody.innerHTML = recycled.map(function(a) {
    var info = a.personalInfo||{};
    var daysLeft = daysUntilPurge(a.rejectedAt);
    var urgent = daysLeft <= 7;
    return '<tr style="'+(urgent?'background:rgba(239,68,68,.04);':'')+'">' +
      '<td><div style="font-weight:600;">'+escHtml(info.name||a.name||'—')+'</div>' +

      '<td>'+escHtml(ROLE_LABELS[a.positionApplied]||a.positionApplied||'—')+'</td>' +
      '<td>'+scoreBadge(a.score)+'</td>' +
      '<td style="font-family:var(--mono);font-size:.62rem;color:var(--dimmer);">'+fmtDate(a.rejectedAt)+'</td>' +
      '<td><span class="badge '+(urgent?'badge-red':'badge-amber')+'">'+daysLeft+' day'+(daysLeft!==1?'s':'')+'</span></td>' +
      '<td><div class="row-actions">' +
        '<button class="action-btn success" onclick="restoreApplicant(\''+a.id+'\')">↺ Restore</button>' +

  }).join('');
}

function filterTeam(q) {
  var ql = (q||'').toLowerCase();
  var filtered = (window._teamCache||[]).filter(function(m) {
    var vNames = (m.ventures||[]).map(function(vId){ return (V_MAP[vId]||{}).name||''; }).join(' ');
    return (m.name||'').toLowerCase().includes(ql) ||
           (m.email||'').toLowerCase().includes(ql) ||
           (m.roleLabel||'').toLowerCase().includes(ql) ||
           (m.team||'').toLowerCase().includes(ql) ||
           vNames.toLowerCase().includes(ql);
  });
  displayTeam(filtered);
}

function saveTeamMember() {
  var name  = (document.getElementById('tm-name')  ||{}).value||'';
  var email = (document.getElementById('tm-email') ||{}).value||'';
  var role  = (document.getElementById('tm-role')  ||{}).value||'';
  var phase = (document.getElementById('tm-phase') ||{}).value||'onboarding';
  var note  = (document.getElementById('tm-phase-note')||{}).value||'';
  var phone = (document.getElementById('tm-phone') ||{}).value||'';

  if (!name.trim())  { toast('Name is required', 'error');  return; }
  if (!email.trim()) { toast('Email is required', 'error'); return; }
  if (!role)         { toast('Role is required', 'error');  return; }

  var ventures = getSelectedVentures();
  var phaseCfg = getPhaseConfig(phase);
  var isConfirmed = phase === 'employed' || phase === 'promoted';

  var data = {
    name:            name.trim(),
    email:           email.trim(),
    phone:           phone.trim(),
    role:            role,
    roleLabel:       ROLE_LABELS[role] || role,
    team:            TEAM_FOR_ROLE[role] || 'Other',
    employmentPhase: phase,
    employmentStage: isConfirmed ? 'employed' : 'probation',
    status:          isConfirmed ? 'employed' : 'probation',
    ventures:        ventures,
    phaseHistory:    [{ phase:phase, label:phaseCfg.label, startedAt:new Date().toISOString(), note:note }],
    joinedAt:        new Date().toISOString()
  };

  window._saveDoc('team_members', data).then(function() {
    toast('Team member added ✓', 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e){ toast('Failed: ' + (e.message||e), 'error'); });
}

function updateTeamStage(id) {
  // Legacy shim — forwards to new phase system
  var stage = (document.getElementById('tm-stage-'+id)||{}).value||'';
  if (!stage) return;
  var phaseMap = { probation:'phase1', employed:'employed', suspended:'suspended', terminated:'terminated' };
  var phase = phaseMap[stage] || stage;
  window._updateDoc('team_members', id, { employmentStage:stage, employmentPhase:phase }).then(function(){
    toast('Stage updated ✓', 'success'); window._loadAll(); closeDrawer();
  });
}

function updateTeamPhase(id) {
  var phase = (document.getElementById('tm-new-phase')||{}).value||'';
  var note  = (document.getElementById('tm-phase-note')||{}).value||'';
  if (!phase) { toast('Please select a phase', 'error'); return; }

  var m = (window._data.team_members||[]).find(function(x){ return x.id===id; });
  if (!m) return;

  var phaseCfg = getPhaseConfig(phase);
  var history  = (m.phaseHistory||[]).slice();
  history.push({ phase:phase, label:phaseCfg.label, startedAt:new Date().toISOString(), note:note });

  var isConfirmed = phase === 'employed' || phase === 'promoted';
  var stageMap    = { employed:'employed', promoted:'employed', suspended:'suspended', terminated:'terminated' };

  window._updateDoc('team_members', id, {
    employmentPhase: phase,
    employmentStage: stageMap[phase] || 'probation',
    status:          stageMap[phase] || 'probation',
    phaseHistory:    history
  }).then(function() {
    toast(phaseCfg.icon + ' Phase updated: ' + phaseCfg.label, 'success');
    closeDrawer();
    window._loadAll();
  }).catch(function(e){ toast('Update failed: ' + (e.message||e), 'error'); });
}

function updateTeamVentures(id) {
  var ventures = getSelectedVentures();
  window._updateDoc('team_members', id, { ventures:ventures }).then(function() {
    toast('Venture access updated ✓ · ' + (ventures.length ? ventures.length + ' venture(s) assigned' : 'Unrestricted access'), 'success');
    window._loadAll();
  }).catch(function(e){ toast('Update failed: ' + (e.message||e), 'error'); });
}

function renderVacancies(config, applicants, teamMembers) {
  var el = document.getElementById('vacancies-list'); if (!el) return;

  // Build status + doc map keyed by roleId
  var docMap = {};
  config.forEach(function(c) { if (c.roleId) docMap[c.roleId] = c; });

  // Separate custom (non-seed) vacancies from seed roles
  var customVacancies = config.filter(function(c) {
    return c.custom === true && c.roleId;
  });

  // ── Standard (seed) roles grouped by team ─────────────────
  var allRoles = [
    { team:'Operations',     roles:['ops_lead'] },
    { team:'Sales',          roles:['sales_manager','inbound_closer','outbound_closer'] },
    { team:'Lead Generation',roles:['content_lead','content_creator','outreach_lead_gen'] },
    { team:'Delivery',       roles:['tech_product_lead','developer','onboarding_specialist'] },
    { team:'Customer Success',roles:['customer_success_manager'] },
    { team:'Admin & Finance', roles:['admin_finance_officer'] }
  ];

  var STATUS_ICONS = { open:'🟢', trial:'🟡', filled:'🔴', closed:'⚫' };
  var STATUS_LBL   = { open:'Open', trial:'On Trial', filled:'Filled', closed:'Closed' };
  var STATUS_BADGE = { open:'badge-green', trial:'badge-amber', filled:'badge-red', closed:'badge-dim' };

  var html = '';

  allRoles.forEach(function(group) {
    var color = TEAM_COLORS[group.team] || '#C89B14';
    html += '<div style="margin-bottom:28px;">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
        '<div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:' + color + ';">' + escHtml(group.team) + '</div>' +
        '<div style="flex:1;height:1px;background:rgba(200,155,20,.1);"></div>' +
      '</div>';

    group.roles.forEach(function(roleId) {
      var label     = ROLE_LABELS[roleId] || roleId;
      var slots     = ROLE_SLOTS[roleId]  || 1;
      var cfg       = docMap[roleId]      || { status:'open' };
      var status    = cfg.status          || 'open';
      var appCount  = applicants.filter(function(a){ return a.positionApplied === roleId; }).length;
      var hiredCount = teamMembers.filter(function(m){ return m.role === roleId; }).length;
      var details   = getVacancyDetails(roleId, cfg);
      var slotsLeft = Math.max(0, slots - hiredCount);

      html += buildVacancyCard(roleId, label, cfg, status, slots, slotsLeft, appCount, hiredCount, details, false, STATUS_ICONS, STATUS_LBL, STATUS_BADGE, color);
    });

    html += '</div>';
  });

  // ── Custom roles ───────────────────────────────────────────
  if (customVacancies.length) {
    html += '<div style="margin-bottom:28px;">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
        '<div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--purple);">Custom Roles</div>' +
        '<div style="flex:1;height:1px;background:rgba(200,155,20,.1);"></div>' +
        '<span class="badge badge-purple" style="font-size:.5rem;">' + customVacancies.length + '</span>' +
      '</div>';

    customVacancies.forEach(function(cfg) {
      var roleId    = cfg.roleId;
      var label     = cfg.title || cfg.roleId || 'Custom Role';
      var status    = cfg.status || 'open';
      var slots     = cfg.slots  || 1;
      var appCount  = applicants.filter(function(a){ return a.positionApplied === roleId; }).length;
      var hiredCount = teamMembers.filter(function(m){ return m.role === roleId; }).length;
      var slotsLeft = Math.max(0, slots - hiredCount);
      var details   = getVacancyDetails(roleId, cfg);
      html += buildVacancyCard(roleId, label, cfg, status, slots, slotsLeft, appCount, hiredCount, details, true, STATUS_ICONS, STATUS_LBL, STATUS_BADGE, '#a855f7');
    });

    html += '</div>';
  }

  el.innerHTML = html;
}

function buildVacancyCard(roleId, label, cfg, status, slots, slotsLeft, appCount, hiredCount, details, isCustom, STATUS_ICONS, STATUS_LBL, STATUS_BADGE, accentColor) {
  var STAGE_BORDER = { open:'rgba(34,197,94,.12)', trial:'rgba(245,158,11,.12)', filled:'rgba(239,68,68,.12)', closed:'rgba(242,237,228,.06)' };
  var hasReqs = details.requirements && details.requirements.length;
  var hasResp = details.responsibilities && details.responsibilities.length;

  return '<div style="background:var(--card);border:1px solid ' + (STAGE_BORDER[status]||'var(--border)') + ';border-radius:10px;margin-bottom:10px;overflow:hidden;">' +

    // ── Card header — always visible ──────────────────────────
    '<div style="padding:14px 18px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;" onclick="toggleVacancyExpand(\'' + roleId + '\')">' +

      // Left: info
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">' +
          '<div style="font-family:var(--display);font-weight:700;font-size:.92rem;color:var(--white);">' + escHtml(label) + '</div>' +
          '<span class="badge ' + (STATUS_BADGE[status]||'badge-dim') + '" style="font-size:.52rem;">' + (STATUS_ICONS[status]||'') + ' ' + (STATUS_LBL[status]||status) + '</span>' +
          (isCustom ? '<span class="badge badge-purple" style="font-size:.48rem;">Custom</span>' : '') +
        '</div>' +
        (details.summary ? '<div style="font-size:.76rem;color:var(--dimmer);margin-bottom:6px;line-height:1.5;">' + escHtml(details.summary.substring(0,120)) + (details.summary.length>120?'…':'') + '</div>' : '') +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
          '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">📋 ' + slots + ' slot' + (slots!==1?'s':'') + ' · ' + slotsLeft + ' open</span>' +
          '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">🎯 ' + appCount + ' applicant' + (appCount!==1?'s':'') + '</span>' +
          '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">✅ ' + hiredCount + ' hired</span>' +
          '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">🏠 ' + escHtml(details.location||'Remote') + '</span>' +
          '<span style="font-family:var(--mono);font-size:.56rem;color:var(--dimmer);">⏱ ' + escHtml(details.type||'Full-Time') + '</span>' +
        '</div>' +
      '</div>' +

      // Right: status selector + expand arrow
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;">' +
        '<select class="vacancy-status-select" data-role="' + roleId + '" data-config-id="' + (cfg.id||'') + '" onchange="updateVacancyStatus(this);event.stopPropagation();">' +
          ['open','trial','filled','closed'].map(function(s){
            return '<option value="' + s + '"' + (status===s?' selected':'') + '>' + (STATUS_ICONS[s]||'') + ' ' + (STATUS_LBL[s]||s) + '</option>';
          }).join('') +
        '</select>' +
        '<div id="vexpand-arrow-' + roleId + '" style="font-family:var(--mono);font-size:.6rem;color:var(--dimmer);">▼ Details</div>' +
      '</div>' +

    '</div>' +

    // ── Expandable detail body ────────────────────────────────
    '<div id="vexpand-' + roleId + '" style="display:none;border-top:1px solid var(--border);">' +
      '<div style="padding:16px 18px;">' +

        // Tabs
        '<div class="tab-bar" style="margin-bottom:14px;">' +
          '<button class="tab-btn active" onclick="switchVacancyTab(\'' + roleId + '\',\'overview\',this)">Overview</button>' +
          '<button class="tab-btn" onclick="switchVacancyTab(\'' + roleId + '\',\'requirements\',this)">Requirements</button>' +
          '<button class="tab-btn" onclick="switchVacancyTab(\'' + roleId + '\',\'compensation\',this)">Compensation</button>' +
          '<button class="tab-btn" onclick="switchVacancyTab(\'' + roleId + '\',\'applicants\',this)">Applicants (' + appCount + ')</button>' +
          '<button class="tab-btn" onclick="switchVacancyTab(\'' + roleId + '\',\'edit\',this)">✏ Edit</button>' +
        '</div>' +

        // Tab: Overview
        '<div id="vtab-' + roleId + '-overview">' +
          '<div style="font-size:.82rem;color:var(--dim);line-height:1.75;margin-bottom:14px;">' + escHtml(details.summary||'No summary added yet.') + '</div>' +
          (hasResp ? '<div style="font-family:var(--mono);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;">Responsibilities</div>' +
            '<ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:5px;">' +
            details.responsibilities.map(function(r){ return '<li style="display:flex;gap:8px;align-items:flex-start;font-size:.78rem;color:var(--dim);"><span style="color:var(--gold);flex-shrink:0;margin-top:2px;">▹</span>' + escHtml(r) + '</li>'; }).join('') +
            '</ul>' : '') +
        '</div>' +

        // Tab: Requirements

function saveNewCustomVacancy() {

  var summary = (document.getElementById('newv-summary')||{}).value||'';

  var type    = (document.getElementById('newv-type')   ||{}).value||'Full-Time';

  if (!title.trim())  { toast('Role title is required', 'error');        return; }

function canSeeKPI(key) {
  var role = window._userRole || 'developer';
  if (role === 'founder') return true;
  return (ROLE_KPI_MAP[key] || []).indexOf(role) !== -1;
}

  return ROLE_CONTEXT[window._userRole || 'developer'] ||
    { icon:'⬡', title:'Dashboard', focus:'Your workspace', color:'var(--gold)' };
}

function getMyMemberId() {
  var cu = window._currentUser; if (!cu) return null;
  var me = (window._data ? window._data.team_members || [] : []).find(function(m) {
    return (m.email || '').toLowerCase() === (cu.email || '').toLowerCase();
  });
  return me ? me.id : null;
}

function getManagedMemberIds() {
  var role = window._userRole || '';
  var d    = window._data    || {};
  var myId = getMyMemberId();
  var MANAGED = {
    sales_manager:     ['inbound_closer','outbound_closer'],
    content_lead:      ['content_creator','outreach_lead_gen'],
    tech_product_lead: ['developer','onboarding_specialist']
  };
  if (role === 'ops_lead' || role === 'founder') return null; // null = unrestricted
  var managed = MANAGED[role];
  if (!managed) return myId ? [myId] : [];
  var ids = (d.team_members || [])
    .filter(function(m) { return managed.indexOf(m.role) !== -1; })
    .map(function(m) { return m.id; });
  if (myId) ids.push(myId);
  return ids;
}

function scopeRecords(records, collection) {
  var role = window._userRole || 'developer';
  if (role === 'founder' || role === 'ops_lead') return records;
  var scope = (ROLE_DATA_SCOPE[role] || {})[collection] || 'own';
  if (scope === 'all')  return records;
  if (scope === 'none') return [];
  var myId    = getMyMemberId();
  var managed = getManagedMemberIds();
  var cu      = window._currentUser;

  if (scope === 'team') {
    if (managed === null) return records;
    return records.filter(function(r) {
      return managed.indexOf(r.assignedTo) !== -1 ||
             managed.indexOf(r.userId)     !== -1 ||
             (!r.assignedTo && collection === 'tasks'); // unassigned tasks visible to leads
    });
  }
  if (scope === 'assigned') {
    return records.filter(function(r) { return r.assignedTo === myId; });
  }
  // 'own' — by assignment, userId, userName match, or CS manager
  return records.filter(function(r) {
    if (r.assignedTo === myId) return true;
    if (cu && r.userId === cu.uid) return true;
    if (r.csManager === myId) return true;
    if (cu && r.userName) {
      return r.userName === cu.email ||
        (window._data ? window._data.team_members || [] : []).some(function(m) {
          return m.id === myId && (m.name === r.userName || m.email === r.userName);
        });
    }
    return false;
  });
}

// Derive all category tags for a person
function getPersonCategories(p) {
  var cats = [];
  var types = p.records.map(function(r){ return r.type; });
  var unique = [];
  types.forEach(function(t){ if (unique.indexOf(t) === -1) unique.push(t); });

  if (unique.indexOf('lead')       !== -1) cats.push('lead');
  if (unique.indexOf('inquiry')    !== -1) cats.push('prospect');
  if (unique.indexOf('message')    !== -1 && cats.indexOf('prospect') === -1) cats.push('prospect');
  if (unique.indexOf('applicant')  !== -1) cats.push('applicant');
  if (unique.indexOf('payment')    !== -1 || unique.indexOf('proposal') !== -1) cats.push('client');

  // Check if they're an active client
  var d = window._data || {};
  var isClient = (d.clients || []).some(function(c){
    return (c.email || '').toLowerCase() === p.email.toLowerCase() ||
           (c.contact || '').toLowerCase() === p.email.toLowerCase();
  });
  if (isClient && cats.indexOf('client') === -1) cats.push('client');

  // Check if they're a team member
  var isTeam = (d.team_members || []).some(function(m){
    return (m.email || '').toLowerCase() === p.email.toLowerCase();
  });
  if (isTeam) cats.push('team');

  if (cats.length === 0) cats.push('contact');
  return cats;
}

    team:      { badge:'badge-purple', label:'Team',      icon:'👤' },
